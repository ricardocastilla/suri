function iconInline(key){ return `<span style="display:inline-flex;vertical-align:-3px">${icon(key,16)}</span>`; }

/* ---------------- PANTALLA: SEMANA --------------------------------- */
/* Semana calendario LUNES→DOMINGO que contiene la fecha de referencia. */
function weekRange(refStr){
  const d=new Date(refStr+'T12:00:00');
  const dow=(d.getDay()+6)%7; // 0=lunes ... 6=domingo
  const monday=addDays(refStr,-dow);
  const days=[]; for(let i=0;i<7;i++) days.push(addDays(monday,i));
  return days;
}
/* Mapa de calor como TABLA (filas=nutrientes, columnas=días lun-dom).
   Tabla real → alineación perfecta y sin traslapes en cualquier navegador. */
/* Cuña radial (relleno tipo "pay") desde las 12 en sentido horario, fracción f (0..1). */
function _radialWedge(cx,cy,r,f,color){
  if(f<=0) return '';
  if(f>=1) return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}"/>`;
  const a=f*2*Math.PI, x=(cx+r*Math.sin(a)).toFixed(2), y=(cy-r*Math.cos(a)).toFixed(2), big=f>0.5?1:0;
  return `<path d="M${cx},${cy} L${cx},${(cy-r).toFixed(2)} A${r},${r} 0 ${big} 1 ${x},${y} Z" fill="${color}"/>`;
}
function weekHeatmap(refStr, showWeekProgress){
  const G=goals(), g=G.values, sc=G.scope;
  const nuts=[['iron','Hierro'],['vitC','Vit C'],['vitA','Vit A'],['dha','Omega-3'],['calcium','Calcio'],['zinc','Zinc'],['choline','Colina'],['iodine','Yodo']];
  const dayLabels=['L','M','M','J','V','S','D'];
  const days=weekRange(refStr);
  const todayS=todayStr();

  // Progreso semanal (solo si se pide): acumulado/meta para nutrientes
  // semanales; días cumplidos/7 para los diarios (hierro, vit. C).
  // Importante: se suma sobre `days` (la MISMA semana calendario lun-dom que
  // dibujan las celdas), no sobre una ventana móvil de 7 días hacia atrás;
  // así el progreso siempre coincide con el calendario mostrado.
  let prog=null;
  if(showWeekProgress){
    const acc={iron:0,vitC:0,zinc:0,vitA:0,dha:0,calcium:0,choline:0,iodine:0};
    let ironLvl=0, vitcLvl=0;
    days.forEach(ds=>{ const d=state.days[ds]; if(d&&d.entries.length){ const ss=dayStats(d);
      for(const kk in acc) if(kk in ss) acc[kk]+=ss[kk];
      ironLvl += Math.min(1, (ss.iron||0)/g.iron);
      vitcLvl += Math.min(1, (ss.vitC||0)/g.vitC); } });
    const fmt=n=>{ const r=Math.round(n*10)/10; return Number.isInteger(r)?String(r):r.toFixed(1); };
    prog={};
    nuts.forEach(([k])=>{
      if(sc[k]==='día'){ const dn=(k==='iron'?ironLvl:vitcLvl); prog[k]={ratio:Math.min(1,dn/7), label:`${fmt(dn)}/7 d`}; }
      else { const v=acc[k]||0, t=g[k]||1; prog[k]={ratio:Math.min(1,v/t), label:`${fmt(v)}/${t}`}; }
    });
  }

  // Layout determinista en SVG: misma medida de celda en cualquier navegador.
  const nrows=nuts.length, labelW=70, headerH=36, cell=38, gap=6;
  const progW = showWeekProgress ? 74 : 0;            // ancho de la columna de progreso
  const progGap = showWeekProgress ? 10 : 0;          // separación tras el domingo
  const W = labelW + 7*cell + 6*gap + progGap + progW;
  const H = headerH + nrows*cell + (nrows-1)*gap;
  const colX = i => labelW + i*(cell+gap);
  const rowY = r => headerH + r*(cell+gap);
  const progX = labelW + 7*cell + 6*gap + progGap;    // x de inicio de la columna

  // PAD: margen alrededor del contenido para que el grosor de los bordes
  // (recuadro de "hoy", borde punteado, etc.) no se recorte en los extremos
  // —p. ej. el borde derecho del domingo o el inferior de la última fila—.
  const PAD = 3;

  let svg=`<svg viewBox="${-PAD} ${-PAD} ${W+PAD*2} ${H+PAD*2}" width="100%" style="display:block;max-width:${W+PAD*2}px;margin:0 auto" font-family="Quicksand,sans-serif">`;

  // encabezado de la columna de progreso
  if(showWeekProgress){
    svg+=`<text x="${progX+progW/2}" y="20" text-anchor="middle" font-size="13" font-weight="800" letter-spacing="0.3" fill="#857A6F" pointer-events="none">SEMANA</text>`;
  }

  // encabezados de día (hoy va recuadrado para distinguirlo)
  days.forEach((ds,i)=>{
    const dt=new Date(ds+'T12:00:00'), today=ds===todayS, future=ds>todayS, cx=colX(i)+cell/2;
    if(today){
      svg+=`<rect x="${colX(i)-2}" y="0" width="${cell+4}" height="${headerH-4}" rx="7" fill="#C3E2D3" stroke="#6E938B" stroke-width="1.5"/>`;
    }
    svg+=`<text x="${cx}" y="14" text-anchor="middle" font-size="13" font-weight="${today?800:700}" fill="${today?'#22382F':'#5C534B'}" pointer-events="none">${dayLabels[i]}</text>`;
    svg+=`<text x="${cx}" y="27" text-anchor="middle" font-size="10.5" font-weight="${today?800:600}" fill="${today?'#22382F':'#857A6F'}" pointer-events="none">${dt.getDate()}</text>`;
    // Hit-area transparente sobre el header — tocable para días pasados (lleva a registrar ese día)
    if(!today && !future){
      svg+=`<rect x="${colX(i)-2}" y="0" width="${cell+4}" height="${headerH-4}" rx="7" fill="transparent" data-recday="${ds}" style="cursor:pointer"/>`;
    }
  });

  // filas
  nuts.forEach(([k,lbl],r)=>{
    const cy=rowY(r), midY=cy+cell/2;
    // ícono más grande (40x40 escalado a 20) + etiqueta más legible
    svg+=`<g transform="translate(${labelW/2-10},${midY-16}) scale(0.5)">${ICON[k]}</g>`;
    svg+=`<text x="${labelW/2}" y="${midY+18}" text-anchor="middle" font-size="14" font-weight="800" fill="#2A2521">${lbl}</text>`;
    // celdas: CÍRCULOS que llenan la celda, con relleno radial proporcional a la meta
    days.forEach((ds,i)=>{
      const x=colX(i), day=state.days[ds], future=ds>todayS, isToday=ds===todayS, has=day&&day.entries.length;
      const cxc=x+cell/2, ccy=midY, cr=cell/2-1;
      let circle='';
      if(future){
        // Futuro: aún no — círculo casi blanco con borde suave.
        circle=`<circle cx="${cxc}" cy="${ccy}" r="${cr}" fill="#FCFAF5" stroke="#EDE3D0" stroke-width="1"/>`;
      } else if(!has){
        // Sin registrar (pasado/hoy sin datos): aro punteado.
        circle=`<circle cx="${cxc}" cy="${ccy}" r="${cr}" fill="#FFFFFF" stroke="#C3B393" stroke-width="1.5" stroke-dasharray="3 2"/>`;
      } else {
        const s=dayStats(day);
        const daily = sc[k]==='día' ? g[k] : Math.max(0.5, g[k]/7*2);
        const v=s[k]||0;
        if(v<=0){ // registrado pero sin ese nutriente: beige lleno
          circle=`<circle cx="${cxc}" cy="${ccy}" r="${cr}" fill="#EADBC4"/>`;
        } else { // base pálida + cuña radial del color del nutriente
          const frac=Math.min(1, v/daily);
          circle=`<circle cx="${cxc}" cy="${ccy}" r="${cr}" fill="#ECE3D4"/>`+_radialWedge(cxc,ccy,cr,frac,NUT_COLOR[k]);
        }
      }
      // hit-area transparente para tocar días pasados
      const hit = (!future && !isToday) ? `<rect x="${x}" y="${cy}" width="${cell}" height="${cell}" rx="9" fill="transparent" data-recday="${ds}" style="cursor:pointer"/>` : '';
      svg+=circle+hit;
    });
    // columna de progreso semanal a la derecha (solo si se pide)
    if(showWeekProgress && prog){
      const p=prog[k], barW=progW, barH=7, barY=midY-3;
      // pista
      svg+=`<rect x="${progX}" y="${barY}" width="${barW}" height="${barH}" rx="3.5" fill="#EEE6D7"/>`;
      // relleno
      if(p.ratio>0) svg+=`<rect x="${progX}" y="${barY}" width="${(barW*p.ratio).toFixed(1)}" height="${barH}" rx="3.5" fill="${NUT_COLOR[k]}"/>`;
      // fracción debajo de la barra
      svg+=`<text x="${progX+barW/2}" y="${midY+16}" text-anchor="middle" font-size="13" font-weight="700" fill="#857A6F" pointer-events="none">${p.label}</text>`;
    }
  });
  svg+=`</svg>`;

  return `${svg}
    <div class="hm-legend">
      <span>${_legendBox('full')} meta del día</span>
      <span>${_legendBox('part')} aporte parcial</span>
      <span>${_legendBox('none')} sin ese nutriente</span>
      <span>${_legendBox('empty')} sin registrar</span>
    </div>`;
}
/* Cuadro de leyenda como SVG: dimensiones fijas, idéntico en cualquier navegador. */
function _legendBox(kind){
  const S=24;
  if(kind==='full') return `<svg width="${S}" height="${S}" viewBox="0 0 24 24" style="vertical-align:middle"><circle cx="12" cy="12" r="11" fill="#6E938B"/></svg>`;
  if(kind==='part') return `<svg width="${S}" height="${S}" viewBox="0 0 24 24" style="vertical-align:middle"><circle cx="12" cy="12" r="11" fill="#ECE3D4"/><path d="M12,12 L12,1 A11,11 0 0 1 23,12 Z" fill="#6E938B"/></svg>`;
  if(kind==='none') return `<svg width="${S}" height="${S}" viewBox="0 0 24 24" style="vertical-align:middle"><circle cx="12" cy="12" r="11" fill="#EADBC4"/></svg>`;
  return `<svg width="${S}" height="${S}" viewBox="0 0 24 24" style="vertical-align:middle"><circle cx="12" cy="12" r="10.2" fill="#FFFFFF" stroke="#C3B393" stroke-width="1.5" stroke-dasharray="3 2"/></svg>`;
}
/* Narrativa semanal: el nutriente más flojo y el más constante */
function weekNarrative(endStr){
  const name=state.profile.name, G=goals(), g=G.values, wk=weekStats(endStr);
  if(!wk.daysWith) return `Aún no hay registros esta semana. En cuanto registres unos días, aquí verás los patrones de ${name}.`;
  const sem=['vitA','dha','calcium','zinc','choline','iodine'].map(k=>({k,name:({vitA:'vitamina A',dha:'omega-3',calcium:'calcio',zinc:'zinc',choline:'colina',iodine:'yodo'})[k],r:(wk[k]||0)/g[k]})).sort((a,b)=>a.r-b.r);
  const peor=sem[0], mejor=sem[sem.length-1];
  let txt=`${name} registró ${wk.daysWith} día${wk.daysWith>1?'s':''} esta semana. `;
  if(peor.r<1) txt+=`Lo que más ayudaría reforzar es <b>${peor.name}</b>. `;
  if(mejor.r>=1) txt+=`Va muy bien en ${mejor.name}. `;
  return txt;
}

function _onbArc(cx,cy,r,a0,a1){
  const p=d=>{const a=(d-90)*Math.PI/180;return [cx+r*Math.cos(a),cy+r*Math.sin(a)];};
  const [x0,y0]=p(a0),[x1,y1]=p(a1),lg=(a1-a0)%360>180?1:0;
  return `M ${x0.toFixed(2)} ${y0.toFixed(2)} A ${r} ${r} 0 ${lg} 1 ${x1.toFixed(2)} ${y1.toFixed(2)}`;
}
function _onbRing(){
  const segs=[['iron',1],['vitC',1],['vitA',.5],['dha',0],['calcium',.5],['zinc',1],['choline',0],['iodine',.5]];
  const cx=84,cy=84,R=68,SW=15,CR=3.6,seg=360/8,gap=4;
  const ri=R-SW/2, ro=R+SW/2; let p='';
  segs.forEach(([k,st],i)=>{
    const a0=-90+i*seg+gap/2, a1=-90+(i+1)*seg-gap/2;
    p+=`<path d="${_roundedSector(cx,cy,ri,ro,a0,a1,CR)}" fill="#ECE3D5"/>`;
    if(st>0){ const ve=a0+(a1-a0)*st; p+=`<path d="${_roundedSector(cx,cy,ri,ro,a0,ve,CR)}" fill="${NUT_COLOR[k]}"/>`; }
  });
  return `<svg viewBox="0 0 168 168" width="168" height="168">${p}<text x="84" y="80" text-anchor="middle" font-family="Fraunces" font-weight="900" font-size="38" fill="var(--euca-deep)">6<tspan font-size="18" fill="var(--ink-faint)"> / 8</tspan></text><text x="84" y="101" text-anchor="middle" font-family="Quicksand" font-weight="700" font-size="9.5" letter-spacing="1.4" fill="var(--ink-faint)">NUTRIENTES</text></svg>`;
}
function _onbChips(){
  const c=(em,nm,tint,on)=>`<div class="onb-chip${on?' on':''}">${on?'<span class="onb-ck">✓</span>':''}<span class="onb-em" style="background:${tint}22">${em}</span><span>${nm}</span></div>`;
  return `<div class="onb-chips">${c('🍗','Pollo','#C2776B',true)}${c('🥦','Brócoli','#8FB0A6',false)}${c('🍓','Fresa','#E0922E',false)}</div>`;

function _onbMatrix(){
  const rows=[['#C77E63',[2,2,1,0,1]],['#E0922E',[2,1,2,1,2]],['#9A7B43',[1,2,1,0,1]],['#52716A',[2,2,1,1,0]]];

}

  return `<div class="onb">
    <div class="onb-top"><span class="suri-mark-sm">Suri</span><button id="onb-skip" class="onb-skip">Saltar</button></div>
    <div id="onb-track" class="onb-track">${panels}</div>
    <div class="onb-foot"><div class="onb-dots">${dots}</div><button id="onb-btn" class="btn primary block onb-btn">Siguiente →</button></div>
  </div>`;

function bindOnboarding(){
  const track=document.getElementById('onb-track');
  const btn=document.getElementById('onb-btn');
  const skip=document.getElementById('onb-skip');
  if(!track||!btn) return;
  const panels=track.querySelectorAll('.onb-panel');
  const dots=document.querySelectorAll('.onb-dot');
  const last=panels.length-1;
  const cur=()=>Math.round(track.scrollLeft/track.clientWidth);
  const sync=()=>{ const i=Math.min(last,Math.max(0,cur()));
    dots.forEach((d,j)=>d.classList.toggle('on',j===i));
    btn.textContent = i===last ? 'Empezar ✦' : 'Siguiente →';
  };
  const finish=()=>{ state._onbDone=true; render(); };
  track.addEventListener('scroll',()=>{ window.requestAnimationFrame(sync); },{passive:true});
  btn.addEventListener('click',()=>{ const i=cur(); if(i>=last){ finish(); } else { track.scrollTo({left:(i+1)*track.clientWidth,behavior:'smooth'}); } });
  if(skip) skip.addEventListener('click',finish);
  sync();
}

function tabbar(){
  const tabs=[['hoy','Hoy'],['registrar','Registrar'],['semana','Semana'],['ajustes','Ajustes']];
  return `<div class="tabbar">${tabs.map(([k,l])=>`<button class="tab ${state.tab===k?'active':''}" data-tab="${k}">${TAB_IC[k]}<span>${l}</span></button>`).join('')}</div>`;
}
function render(){
  const app=document.getElementById('app');
  if(!state.ready){ app.innerHTML='<div class="empty" style="padding-top:80px">Cargando…</div>'; return; }
  if(!state.profile){
    if(!state._onbDone){ app.innerHTML=screenOnboarding(); bindOnboarding(); return; }
    app.innerHTML=screenWelcome(); bind(); return;
  }
  lifecycle();
  let body='';
  if(state.tab==='hoy') body=screenHoy();
  else if(state.tab==='registrar') body=screenRegistrar();
  else if(state.tab==='semana') body=screenSemana();
  else body=screenAjustes();
  // Primera vez en Hoy: mostrar el "cómo funciona" una sola vez por perfil.
  if(state.tab==='hoy' && !state.profile.seenNutInfo && !state.sheet){
    state.sheet={type:'nutInfo', page:1}; state.profile.seenNutInfo=true; saveProfile();
  }
  app.innerHTML=body+tabbar()+(state.sheet?sheetHTML():'')+(state.toast?`<div class="toast" id="suri-toast">${state.toast}</div>`:'');
  bind();
  // Al cambiar de pantalla (o entrar/salir de modo recuperación), posicionar arriba.
  const navKey = state.tab + '|' + (state.recoveryDate||'');
  if(window.__lastNav !== navKey){
    window.__lastNav = navKey;
    window.scrollTo(0,0);
    if(document.scrollingElement) document.scrollingElement.scrollTop=0;
    document.documentElement.scrollTop=0; document.body.scrollTop=0;
  }
}

/* ---------------- EVENTOS ------------------------------------------ */
window._search=v=>{
  state._q=v;
  // Re-render aislado: solo el contenedor de resultados, NO el input ni la pantalla.
  // Así no se pierden letras ni se desplaza la página al escribir.
  const box=document.getElementById('cat-results');
  if(!box || state.tab!=='registrar'){ render(); return; }
  const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const q=(v||'').toLowerCase().trim(), qn=norm(q);
  const day=ensureDay(state.recoveryDate||todayStr());
  const elig=eligibleFoods();
  let filtered = elig;
  const nutFilter = state._regNut;
  if(nutFilter) filtered = filtered.filter(f=>f.flags[nutFilter]==='A'||f.flags[nutFilter]==='M');
  if(q) filtered = filtered.filter(f=>norm(f.name).includes(qn));
  box.innerHTML = renderCatResults(day, q, qn, filtered, nutFilter, state._regGrp);
};
window._setMoveTo=v=>{ if(state.sheet && state.sheet.type==='moveDay'){ state.sheet.to=v; render(); } };
window._pouchSearch=v=>{
  const box=document.getElementById('pouch-search-results'); if(!box) return;
  const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const q=norm(v||''); if(q.length<2){ box.innerHTML=''; return; }
  const cur=new Set(state.sheet.pouch.ingredients||[]);
  const matches=D.foods.filter(f=>f.id>0&&norm(f.name).includes(q)&&!cur.has(f.id)).slice(0,6);
  box.innerHTML = matches.length
    ? matches.map(f=>`<button class="alg" data-pouchadd="${f.id}">＋ ${f.emoji} ${f.name.split('(')[0].trim()}</button>`).join('')
    : '<span class="faint">Sin coincidencias</span>';
};
window._importData=async function(input){
  const file = input.files?.[0]; if(!file) return;
  try{
    const txt = await file.text();
    const data = JSON.parse(txt);
    if(!data.profile || !data.days){ toast('Archivo no válido'); return; }
    if(!confirm('Reemplazar tus datos actuales con este respaldo? No se puede deshacer.')) return;
    state.profile = data.profile;
    state.settings = data.settings || state.settings;
    state.days = data.days;
    await Promise.all([saveProfile(), saveSettings(), saveDays()]);
    toast('Datos restaurados ✓'); render();
  }catch(e){ toast('No se pudo leer el archivo'); }
};
window._foodAvoidSearch=v=>{

  const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const q=norm(v||''); if(q.length<2){ box.innerHTML=''; return; }
  const cur=new Set((state._draft||state.profile||{}).avoidFoods||[]);

function readProfileForm(base){
  const g=id=>document.getElementById(id);
  const p=Object.assign({}, base||{});
  p.name=(g('pf-name')?.value||'').trim()||'Bebé';
  p.birth=g('pf-birth')?.value||p.birth;
  p.weight=g('pf-weight')?.value||'';
  p.notes=(g('pf-notes')?.value||'').trim();
  // supplements y allergies se manejan por chips en el draft, no por input de texto
  return p;
}
function bind(){
  const app=document.getElementById('app');
  app.onclick=async (ev)=>{
    // Cerrar modal SOLO si el clic fue directamente en el fondo (no en su contenido)
    if(ev.target.dataset && ev.target.dataset.sheetbg){ state.sheet=null; render(); return; }
    const el=ev.target.closest('[data-tab],[data-act],[data-toggle],[data-pref],[data-idea],[data-regnut],[data-reggrp],[data-grptoggle],[data-other],[data-othersub],[data-foodplus],[data-foodminus],[data-feed],[data-formplus],[data-formminus],[data-alg],[data-supp],[data-addavoid],[data-avoidfood],[data-pouchremove],[data-pouchadd],[data-recday]');
    if(window.__suriDebug){
      const info = el ? (el.dataset.act||el.dataset.grptoggle||el.dataset.tab||el.dataset.toggle||Object.keys(el.dataset).join(',')) : 'NO MATCH';
      const tag = el ? el.tagName : ev.target.tagName;
      window.__suriDbg(`click → ${tag} [${info}]`);
    }
    if(!el) return;

    // PREFERENCIA 👍/👎 — se evalúa ANTES que nada y corta, para que jamás
    // togglee el alimento ni navegue. Es independiente del consumo.
    if(el.dataset.pref){ ev.preventDefault(); ev.stopPropagation();
      const [val,id]=el.dataset.pref.split(':'); setPref(+id,val);
      // Marcar SOLO este botón como recién pulsado: la animación CSS aplica solo a este.
      // Se limpia tras la animación (~500ms) para no dispararla en cada re-render.
      state._pressedPref = `${val}:${id}`;
      toast(val==='like'?'Anotado: le gustó 👍':'Anotado: no le gustó 👎'); render();
      setTimeout(()=>{ state._pressedPref=null; }, 500);
      return; }

    // draft persistence for forms before navigating
    const inForm=document.getElementById('pf-name');
    if(inForm && (el.dataset.feed||el.dataset.formplus||el.dataset.formminus||el.dataset.alg||el.dataset.supp||el.dataset.addavoid||el.dataset.avoidfood||el.dataset.act==='saveProfile')){
      const cur=readProfileForm(state._draft||state.profile||{});
      state._draft=Object.assign({}, state._draft||{}, cur);
    }

    if(el.dataset.tab){ state.tab=el.dataset.tab; state.recoveryDate=null; state._q=''; state._regNut=null; state._regGrp=null; state._weekOffset=0; render(); return; }

    // IDEA (desde Hoy): no registra; lleva a Registrar y abre el grupo del alimento
    if(el.dataset.idea){ const f=FOOD[+el.dataset.idea]; state.tab='registrar'; state._regNut=null; state._regGrp=f?.group||null; state._openGroups={...(state._openGroups||{}),[f?.group]:true}; state._q=''; render(); return; }
    // Atajo "ver todos" de un nutriente (desde Hoy): Registrar pre-filtrado
    if(el.dataset.regnut){ state.tab='registrar'; state._regNut=el.dataset.regnut; state._regGrp=null; state._q=''; render(); return; }
    // Tocar un grupo en Hoy: Registrar con ese grupo abierto
    if(el.dataset.reggrp){ state.tab='registrar'; state._regNut=null; state._regGrp=el.dataset.reggrp; state._openGroups={...(state._openGroups||{}),[el.dataset.reggrp]:true}; state._q=''; render(); return; }
    // Expandir/colapsar grupo en Registrar
    if(el.dataset.grptoggle){ state._openGroups=state._openGroups||{}; const k=el.dataset.grptoggle; state._openGroups[k]=!state._openGroups[k]; render(); return; }

    if(el.dataset.toggle){
      const id=+el.dataset.toggle, day=ensureDay(state.recoveryDate||todayStr());
      const f=FOOD[id];
      const adding = !hasFood(day,id);
      // Al seleccionar desde una búsqueda, limpiar el filtro para que vuelvan
      // a mostrarse todos los alimentos (incluidos los ya marcados), no solo
      // el que se buscó. El input se re-renderiza vacío en el siguiente render.
      const wasSearching = !!state._q;
      if(wasSearching){ state._q=''; if(f && f.group){ state._openGroups={...(state._openGroups||{}), [f.group]:true}; } }
      // Detectar primera vez con fórmula → mensaje informativo educativo
      let firstFormula=false;
      if(adding && f && f.group==='formulas' && !state.profile.seenFormulaNote){
        firstFormula=true;
      }
      // Detectar primera exposición a alérgenos mayores (solo al AÑADIR, no al quitar)
      let firstAlg=null;
      if(adding && !state.recoveryDate && f && f.allergens.length){
        for(const a of f.allergens){
          const st=alergStatus(a);
          if(!st && allergenFirstSeen(a,true)){ firstAlg=a; break; }
        }
      }
      const before = state.recoveryDate ? null : nutrientsState(todayStr());
      toggleFood(day,id,!!state.recoveryDate);
      if(firstFormula){ state.profile.seenFormulaNote=true; saveProfile();
        state.sheet={type:'formulaInfo'}; render(); return; }
      // Si fue primera exposición, marcar como "probando" (se promueve a intro tras 48h)
      if(firstAlg){ setAlergStatus(firstAlg,'probando');
        state.sheet={type:'firstAllergen', allergen:firstAlg, foodId:id}; render(); return; }
      if(before){
        const after=nutrientsState(todayStr());
        const justDone=after.find(n=>(n.key==='iron'||n.key==='vitC') && n.val>=n.target && (before.find(b=>b.key===n.key)?.val||0)<n.target);
        if(justDone){ toast(`${justDone.name} cubierto 🎉`); render(); return; }
      }
      render(); return;
    }
    // Fórmulas: + / − tomas (cada toma es una entrada; suman a los nutrientes del día)
    if(el.dataset.foodplus){ ev.stopPropagation(); const day=ensureDay(state.recoveryDate||todayStr()); addEntry(day,+el.dataset.foodplus, !!state.recoveryDate); render(); return; }
    if(el.dataset.foodminus){ ev.stopPropagation(); const day=ensureDay(state.recoveryDate||todayStr()); removeEntry(day,+el.dataset.foodminus); render(); return; }
    // Crédito "otro" (nutriente fuera de catálogo). El "–" resta; el resto suma.
    if(el.dataset.othersub){ ev.stopPropagation(); const day=ensureDay(state.recoveryDate||todayStr()); subOther(day,el.dataset.othersub); render(); return; }
    if(el.dataset.other){ const day=ensureDay(state.recoveryDate||todayStr()); addOther(day,el.dataset.other); render(); return; }

    if(el.dataset.feed){ state._draft=state._draft||{}; state._draft.feeding=el.dataset.feed; render();
      if(el.dataset.feed==='Fórmula'||el.dataset.feed==='Mixta'){
        toast('💡 Registra cada toma de fórmula para sumar los nutrientes que aporta junto con los demás alimentos.', 4200); }
      else if(el.dataset.feed==='Materna'){
        toast('🤱 La leche materna es el mejor alimento del bebé: lo protege de infecciones, se adapta a sus necesidades y fortalece el vínculo. Suri no la suma a los nutrientes porque su composición varía y no se mide por toma; esas metas se cubren con los alimentos.', 7000); }
      return; }
    if(el.dataset.formplus){ state._draft=state._draft||{}; state._draft.formulaPerDay=Math.min(8,(state._draft.formulaPerDay||0)+1); render(); return; }
    if(el.dataset.formminus){ state._draft=state._draft||{}; state._draft.formulaPerDay=Math.max(0,(state._draft.formulaPerDay||0)-1); render(); return; }
    if(el.dataset.alg){ state._draft=state._draft||{allergies:[]}; state._draft.allergies=state._draft.allergies||[];
      const a=el.dataset.alg, cur=state._draft.allergies.find(x=>x.a===a);
      if(!cur) state._draft.allergies.push({a,s:'evitar'});
      else if(cur.s==='evitar') cur.s='intro';
      else state._draft.allergies=state._draft.allergies.filter(x=>x.a!==a);
      render(); return; }
    if(el.dataset.supp){ state._draft=state._draft||{}; state._draft.supplements=state._draft.supplements||[];
      const k=el.dataset.supp, i=state._draft.supplements.indexOf(k);
      i>=0? state._draft.supplements.splice(i,1) : state._draft.supplements.push(k);
      render(); return; }
    if(el.dataset.addavoid){ state._draft=state._draft||{}; state._draft.avoidFoods=[...(state._draft.avoidFoods||[])];
      const id=+el.dataset.addavoid; if(!state._draft.avoidFoods.includes(id)) state._draft.avoidFoods.push(id);
      render(); return; }
    if(el.dataset.avoidfood){ state._draft=state._draft||{}; state._draft.avoidFoods=(state._draft.avoidFoods||[]).filter(x=>x!==+el.dataset.avoidfood);
      render(); return; }
    if(el.dataset.recday){ state.recoveryDate=el.dataset.recday; state.sheet=null; state.tab='registrar'; render(); return; }
    if(el.dataset.pouchremove){
      // preservar nombre que el usuario está escribiendo antes del re-render
      const cur=document.getElementById('pouch-name')?.value;
      if(cur!=null) state.sheet.pouch.name=cur;
      const fid=+el.dataset.pouchremove;
      state.sheet.pouch.ingredients = state.sheet.pouch.ingredients.filter(x=>x!==fid);
      render(); return;
    }
    if(el.dataset.pouchadd){
      const cur=document.getElementById('pouch-name')?.value;
      if(cur!=null) state.sheet.pouch.name=cur;
      const fid=+el.dataset.pouchadd;
      if(!state.sheet.pouch.ingredients.includes(fid)) state.sheet.pouch.ingredients.push(fid);
      render(); return;
    }

    const act=el.dataset.act;
    const day=ensureDay(state.recoveryDate||todayStr());
    if(act==='goReg'){ state.tab='registrar'; state._regNut=null; state._regGrp=null; state._q=''; render(); }
    else if(act==='clearFilter'){ state._regNut=null; render(); }
    else if(act==='weekPrev'){ state._weekOffset=(state._weekOffset||0)+1; render(); }
    else if(act==='weekNext'){ state._weekOffset=Math.max(0,(state._weekOffset||0)-1); render(); }
    else if(act==='gohoy'){ state.tab='hoy'; state._regNut=null; state._regGrp=null; render(); }
    else if(act==='toggleEndOfDay'){ state.settings.endOfDayReminder = !(state.settings.endOfDayReminder!==false); saveSettings(); render(); }
    else if(act==='toggleDaysReminder'){ state.settings.daysReminder = !(state.settings.daysReminder!==false); saveSettings(); render(); }
    else if(act==='allowEarly'){ state.profile.allowEarly=true; saveProfile(); state.tab='registrar'; toast('Registro temprano activado'); render(); }
    else if(act==='recovery'){ state.sheet='recovery'; render(); }
    else if(act==='exitRecovery'){ state.recoveryDate=null; state._regNut=null; state._regGrp=null; render(); }
    else if(act==='firstAlgNext'){ state.sheet={...state.sheet, page:2}; render(); }
    else if(act==='firstAlgPrev'){ state.sheet={...state.sheet, page:1}; render(); }
    else if(act==='nutInfo'){ state.sheet={type:'nutInfo', page:1}; render(); }
    else if(act==='nutInfoNext'){ state.sheet={type:'nutInfo', page:2}; render(); }
    else if(act==='nutInfoPrev'){ state.sheet={type:'nutInfo', page:1}; render(); }
    else if(act && act.indexOf('info')===0 && INFO_SHEETS[act]){ state.sheet={type:'simpleInfo', key:act}; render(); }
    else if(act==='datosInfo'){ state.sheet={type:'simpleInfo', key:'datosInfo'}; render(); }
    else if(act==='hitosInfo'){ state.sheet={type:'simpleInfo', key:'hitosInfo'}; render(); }
    else if(act==='closeSheet'){ state.sheet=null; render(); }
    else if(act==='closeFirstAlg'){ state.sheet=null; render(); }
    else if(act==='reportReaction'){
      const a=state.sheet?.allergen, fid=state.sheet?.foodId;
      if(a){ setAlergStatus(a,'evitar');
        // quitar el alimento del día (no debe quedar registrado si hubo reacción)
        if(fid){ const day=ensureDay(state.recoveryDate||todayStr()); removeEntry(day,fid); }
        toast(`${a} marcado para evitar`); state.sheet=null; render(); }
    }
    else if(act==='moveDay'){
      const fromStr = state.recoveryDate || todayStr();
      state.sheet={type:'moveDay', from:fromStr, to:''};
      render();
    }
    else if(act && act.startsWith('moveDayConfirm:')){
      const mode = act.split(':')[1];  // 'simple' | 'merge' | 'replace'
      const fromStr = state.sheet.from, toStr = state.sheet.to;
      if(!toStr || toStr===fromStr){ toast('Elige una fecha distinta'); return; }
      const fromDay = state.days[fromStr];
      if(!fromDay || !fromDay.entries.length){ toast('Nada que mover'); state.sheet=null; render(); return; }
      const toDay = state.days[toStr] || ensureDay(toStr);
      if(mode==='replace'){
        toDay.entries = [...fromDay.entries];
        toDay.others = {...(fromDay.others||{})};
      } else if(mode==='merge'){
        toDay.entries = [...(toDay.entries||[]), ...fromDay.entries];
        const o={...(toDay.others||{})};
        for(const k in (fromDay.others||{})){ o[k]=(o[k]||0)+(fromDay.others[k]||0); }
        toDay.others=o;
      } else {
        // 'simple': el destino estaba vacío
        toDay.entries = [...fromDay.entries];
        toDay.others = {...(fromDay.others||{})};
      }
      // Limpiar el día de origen
      fromDay.entries = [];
      fromDay.others = {};
      await saveDays();
      const toLabel=new Date(toStr+'T12:00:00').toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'});
      toast(`Día movido a ${toLabel}`);
      state.sheet=null;
      // Si estábamos en modo recuperación de la fecha de origen, salir
      if(state.recoveryDate===fromStr){ state.recoveryDate=null; state.tab='hoy'; }
      window.__lastNav=null;
      render();
    }
    else if(act==='editProfile'){ state._draft=JSON.parse(JSON.stringify(state.profile)); state.sheet='editProfile'; render(); }
    else if(act==='newPouch'){
      // siguiente id negativo libre
      const pouches=state.profile?.pouches||[];
      const nextId = Math.min(-1, ...pouches.map(p=>p.id-1));
      state.sheet={type:'editPouch', pouch:{id:nextId, name:'', emoji:'🍱', ingredients:[], _isNew:true}};
      render();
    }
    else if(act && act.startsWith('editPouch:')){
      const id=parseInt(act.split(':')[1],10);
      const p=(state.profile?.pouches||[]).find(x=>x.id===id);
      if(p) state.sheet={type:'editPouch', pouch:JSON.parse(JSON.stringify(p))};
      render();
    }
    else if(act==='savePouch'){
      const p=state.sheet.pouch;
      const name=document.getElementById('pouch-name')?.value.trim();
      if(!name){ toast('Ponle un nombre al pouch'); return; }
      if(!p.ingredients.length){ toast('Añade al menos un ingrediente'); return; }
      p.name=name; delete p._isNew;
      state.profile.pouches=state.profile.pouches||[];
      const i=state.profile.pouches.findIndex(x=>x.id===p.id);
      if(i>=0) state.profile.pouches[i]=p; else state.profile.pouches.push(p);
      await saveProfile(); state.sheet=null; toast('Pouch guardado ✓'); render();
    }
    else if(act==='deletePouch'){
      const id=state.sheet.pouch.id;
      if(confirm('¿Eliminar este pouch? Los registros que ya hiciste no se pierden, pero el pouch dejará de aparecer.')){
        state.profile.pouches=(state.profile.pouches||[]).filter(x=>x.id!==id);
        await saveProfile(); state.sheet=null; render();
      }
    }
    else if(act==='saveProfile'){
      const p=readProfileForm(state._draft||state.profile||{});
      p.allergies=(state._draft||{}).allergies||state.profile?.allergies||[];
      p.feeding=(state._draft||{}).feeding||state.profile?.feeding||'';
      p.supplements=(state._draft||{}).supplements||state.profile?.supplements||[];
      p.avoidFoods=(state._draft||{}).avoidFoods||state.profile?.avoidFoods||[];
      if(!p.birth){ toast('Agrega la fecha de nacimiento'); return; }
      p.groupGoal=state.profile?.groupGoal||null;
      // Tomas de fórmula automáticas
      p.formulaPerDay = (state._draft||{}).formulaPerDay ?? state.profile?.formulaPerDay ?? 0;
      if(p.formulaPerDay>0){ p.formulaSince = state.profile?.formulaSince || todayStr(); }
      else { p.formulaSince = null; }
      state.profile=p; await saveProfile(); seedFormula(todayStr()); state.sheet=null; state._draft=null; state.tab='hoy'; window.__lastNav=null; render();
    }
    else if(act==='exportData'){
      const blob = new Blob([JSON.stringify({version:1, exportedAt:new Date().toISOString(),
        profile:state.profile, settings:state.settings, days:state.days}, null, 2)],
        {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href=url; a.download=`suri-respaldo-${todayStr()}.json`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
      toast('Respaldo descargado');
    }
    else if(act==='importData'){ document.getElementById('pf-importfile')?.click(); }
    else if(act==='reset'){ if(confirm('¿Borrar perfil, registros y ajustes? No se puede deshacer.')){ state.profile=null; state.days={}; state.settings={closeHour:22,reminderDays:2,endOfDayReminder:true,daysReminder:true}; await saveProfile(); await saveDays(); await saveSettings(); state.tab='hoy'; render(); } }
  };
}

/* ---------------- INIT --------------------------------------------- */
(async ()=>{
  const splashStart=Date.now();
  await loadAll(); seedFormula(todayStr()); render();
  // El splash se ve siempre al abrir; se desvanece tras un mínimo de 1.4s
  // (aunque la app ya esté lista) y se retira del DOM al terminar.
  const sp=document.getElementById('suri-splash');
  if(sp){
    const wait=Math.max(0, 1400-(Date.now()-splashStart));
    setTimeout(()=>{ sp.classList.add('hide'); setTimeout(()=>sp.remove(), 550); }, wait);
  }
})();
</script></body></html>
