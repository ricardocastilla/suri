<style>:root{
  --peach:#C8896E; --wheat:#E0CDA8; --euca:#6E938B; --cream:#FFC678; --mint:#92D4BD;
  --euca-dark:#3F5A52; --euca-deep:#22382F;
  --peach-dark:#8B4630;
  --ink:#2A2521; --ink-soft:#5C534B; --ink-faint:#857A6F;
  /* Fondo: off-white cálido, casi blanco pero con un toque crema para no sentir hospital.
     Las cards son blanco puro y la diferenciación viene de la SOMBRA, no del fondo. */
  --bg:#FBFAF5; --bg2:#F2EDDF; --card:#FFFFFF; --line:#E8DFCC;
  --mint-tint:#C3E2D3; --wheat-tint:#EFE2C5; --cream-tint:#FFE0B6; --peach-tint:#E8C7B5; --euca-tint:#C8DCD4;
  --ok:#4E8474; --warn:#B97B2C;
  /* Sombra mucho más presente: cards "flotan" sobre el fondo claro como Apple Health/Headspace */
  --shadow:0 1px 3px rgba(60,50,35,.06), 0 8px 24px rgba(60,50,35,.10), 0 32px 64px rgba(60,50,35,.06);
  --r:14px; --r-lg:20px; --r-pill:999px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Quicksand','Nunito',system-ui,-apple-system,'Segoe UI',sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.55;
  font-size:18px; -webkit-font-smoothing:antialiased;
}
h1,h2,h3{font-family:'Fraunces','Quicksand',Georgia,serif; font-weight:600; line-height:1.2; color:var(--euca-deep)}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
input,select{font-family:inherit; font-size:16px}

#app{max-width:480px; margin:0 auto; min-height:100%; position:relative; padding-bottom:88px}
.screen{padding:20px 18px 10px; animation:enter .32s cubic-bezier(.22,.61,.36,1)}
@keyframes enter{
  from{opacity:0; transform:translateY(8px)}
  to{opacity:1; transform:none}
}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes up{from{transform:translate(-50%,12px);opacity:0}to{transform:translate(-50%,0);opacity:1}}

.topbar{display:flex; align-items:flex-start; justify-content:space-between; gap:10px; padding:8px 2px 18px}
.topbar > div:first-child{flex:1; min-width:0}
.hello{font-size:13.5px; color:var(--ink-soft); font-weight:600; letter-spacing:.01em; margin-bottom:2px}
.babyname{font-size:26px; font-family:'Fraunces',Georgia,serif; font-weight:600;
  color:var(--ink); letter-spacing:-.015em; line-height:1.1}
.age-pill{background:var(--euca-tint); color:var(--euca-deep); font-size:13px; font-weight:800;
  padding:6px 12px; border-radius:var(--r-pill); white-space:nowrap; margin-top:4px}

/* cards */
.card{background:var(--card); border:none; border-radius:20px;
  padding:18px; box-shadow:var(--shadow); margin-bottom:16px}
.card h3{font-size:19px; margin-bottom:4px; color:var(--euca-deep);
  font-family:'Fraunces',Georgia,serif; font-weight:600; letter-spacing:-.01em}
.muted{color:var(--ink-soft); font-size:15px; font-weight:500}
.faint{color:var(--ink-soft); font-size:13.5px; font-weight:500}

/* objective hero */
.objective{background:linear-gradient(160deg,var(--euca-tint),var(--mint-tint));
  border:1px solid #D5E3DE; position:relative; overflow:hidden}
.obj-tag{display:inline-flex; align-items:center; gap:6px; background:var(--euca);
  color:#fff; font-size:11.5px; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
  padding:5px 11px; border-radius:var(--r-pill); margin-bottom:10px}
.obj-title{font-size:21px; color:var(--euca-deep); margin-bottom:6px}
.obj-intent{font-size:12px; font-weight:700; letter-spacing:.02em; color:var(--euca-dark); opacity:.85; margin-bottom:9px}
.obj-msg{font-size:14.5px; color:var(--euca-dark); margin-bottom:14px}
.obj-suglabel{font-size:11.5px; font-weight:600; color:var(--euca-dark); opacity:.8; margin-bottom:8px}
.obj-foods{display:flex; gap:8px; flex-wrap:wrap}
.bar-supp{font-size:11px; color:var(--euca-dark); background:var(--euca-tint); border:1px solid #D5E3DE;
  border-radius:9px; padding:5px 9px; margin-top:6px; line-height:1.45}

/* food chips */
.chip{display:inline-flex; align-items:center; gap:8px; background:var(--wheat-tint);
  border:1px solid #E7DCC9; border-radius:var(--r-pill); padding:8px 14px 8px 10px;
  font-size:14.5px; font-weight:600; color:var(--ink);
  transition:transform .18s cubic-bezier(.34,1.56,.64,1), background .22s, border-color .22s, color .22s;
  touch-action:manipulation; -webkit-tap-highlight-color:transparent}
.chip .em{font-size:18px; line-height:1; filter:saturate(.85); transition:filter .22s, transform .22s}
.chip.tint-mint{background:var(--mint-tint); border-color:#CDE6DC}
.chip.tint-peach{background:var(--peach-tint); border-color:#E9CEC1}
.chip.tint-cream{background:var(--cream-tint); border-color:#F4DDB6}
.chip:active{transform:scale(.96)}
.chip.sel{background:var(--euca); border-color:var(--euca); color:#fff}
.chip.sel .em{filter:none}
.chip.given{background:var(--mint); border-color:#A6D6C6; color:var(--euca-deep)}
.chip.given .em{filter:none; transform:scale(1.05)}

/* progress bars */
.bar-row{display:flex; align-items:center; gap:11px; padding:9px 0}
.bar-ic{width:38px; height:38px; flex:none; border-radius:11px; display:flex; align-items:center; justify-content:center}
.bar-main{flex:1; min-width:0}
.bar-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px}
.bar-name{font-size:14.5px; font-weight:700; color:var(--ink)}
.bar-val{font-size:12px; font-weight:700; color:var(--ink-soft)}
.bar-track{height:9px; background:var(--bg2); border-radius:var(--r-pill); overflow:hidden}
.barseg-track{display:flex; gap:3px}
.barseg{flex:1; height:12px; background:#ECE3D4; border-radius:3px; overflow:hidden}
.barseg-fill{display:block; height:100%; border-radius:3px 0 0 3px}
.bar-fill{height:100%; border-radius:var(--r-pill); width:0; transition:width .5s cubic-bezier(.4,0,.2,1)}
.bar-fill.done{background:var(--euca)}
.bar-fill.part{background:var(--mint)}
.bar-fill.iron{background:var(--peach)}
.bar-fill.iron.done{background:var(--peach-dark)}
.bar-sub{font-size:13px; color:var(--ink-soft); margin-top:4px; font-weight:500}

.section-label{font-size:12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
  color:var(--ink-faint); margin:6px 2px 8px}

/* big register button */
.fab-reg{width:100%; background:var(--euca); color:#fff; font-weight:700; font-size:16px;
  padding:15px; border-radius:var(--r-lg); display:flex; align-items:center; justify-content:center; gap:9px;
  box-shadow:0 6px 18px rgba(82,113,106,.28); transition:transform .12s,background .15s}
.fab-reg:active{transform:scale(.985); background:var(--euca-dark)}

/* buttons */
.btn{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:11px 15px;
  font-weight:700; font-size:14px; color:var(--euca-dark);
  transition:background .15s, transform .12s cubic-bezier(.34,1.56,.64,1), box-shadow .15s;
  touch-action:manipulation; -webkit-tap-highlight-color:transparent; cursor:pointer}
.btn:active{transform:scale(.97)}
.btn.primary{background:linear-gradient(170deg, #7BA399 0%, var(--euca) 65%); color:#fff; border-color:transparent;
  box-shadow:0 2px 6px rgba(63,90,82,.18), 0 8px 20px rgba(63,90,82,.14)}
.btn.primary:active{box-shadow:0 1px 3px rgba(63,90,82,.18), 0 3px 8px rgba(63,90,82,.10)}
.btn.soft{background:var(--euca-tint); border-color:#D5E3DE; color:var(--euca-deep)}
.btn.ghost{background:transparent; border-color:var(--line)}
.btn.block{width:100%; display:flex; justify-content:center; gap:8px}
.btn.sm{padding:7px 12px; font-size:12.5px; border-radius:var(--r-pill)}
/* Defensa anti-doble-renglón: los botones de ancho completo mantienen su
   texto en una línea y lo recortan con … si no cabe; los pequeños no se parten. */
.btn.block{flex-wrap:nowrap}
.btn.block > *{min-width:0}
.btn.sm{white-space:nowrap}
.sec-head h3{min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.sec-head{gap:8px}
.btn.danger{color:var(--peach-dark); border-color:#E9CEC1}
.row{display:flex; gap:10px}
.row.wrap{flex-wrap:wrap}

/* day status */

/* tabs */
.tabbar{position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px;
  background:rgba(255,255,255,.95); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  border-top:1px solid rgba(229,220,200,.6);
  display:flex; padding:9px 6px calc(8px + env(safe-area-inset-bottom)); z-index:50}
.tab{flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 2px;
  font-size:10.5px; font-weight:700; color:var(--ink-faint); border-radius:12px; transition:color .15s; position:relative}
.tab svg{width:23px; height:23px; transition:transform .15s}
.tab.active{color:var(--euca-deep)}
.tab.active svg{transform:translateY(-1px)}
/* Indicador sutil debajo de la pestaña activa */
.tab.active::after{content:''; position:absolute; bottom:-9px; left:50%; transform:translateX(-50%);
  width:24px; height:3px; border-radius:2px; background:var(--euca)}

/* forms */
.field{margin-bottom:14px}
.field label{display:block; font-size:13px; font-weight:700; color:var(--euca-dark); margin-bottom:6px}
.field input,.field select{width:100%; height:48px; padding:0 13px; border:1px solid var(--line); border-radius:var(--r);
  background:var(--card); color:var(--ink); outline:none; transition:border .15s; font-size:16px;
  -webkit-appearance:none; appearance:none; box-sizing:border-box; line-height:normal;}
.field input[type=date]{display:flex; align-items:center; min-height:48px; line-height:48px; -webkit-appearance:none;}
.field input[type=date]::-webkit-date-and-time-value{text-align:left; margin:0; line-height:48px;}
.field input[type=date]::-webkit-datetime-edit{padding:0; line-height:48px;}
.field input[type=number]{-moz-appearance:textfield}
.field input:focus,.field select:focus{border-color:var(--euca)}
.seg{display:flex; gap:8px; flex-wrap:wrap}
.seg .opt{flex:1; min-width:fit-content; text-align:center; padding:11px 10px; border:1px solid var(--line);
  border-radius:var(--r); font-size:13.5px; font-weight:700; color:var(--ink-soft); background:var(--card); transition:.15s}
.seg .opt.on{background:var(--euca-tint); border-color:var(--euca); color:var(--euca-deep)}
.allergen-grid{display:flex; flex-wrap:wrap; gap:8px}
.alg{padding:8px 13px; border:1px solid var(--line); border-radius:var(--r-pill); font-size:13px;
  font-weight:600; background:var(--card); color:var(--ink-soft); transition:.15s}
.alg.avoid{background:var(--peach-tint); border-color:#E5C3B4; color:var(--peach-dark)}
.alg.intro{background:var(--mint-tint); border-color:#C6E2D8; color:var(--euca-deep)}

/* register screen */
.search{width:100%; padding:12px 15px; border:1px solid var(--line); border-radius:var(--r-pill);
  background:var(--card); outline:none; margin-bottom:14px}
.grp-block{margin-bottom:18px}
.grp-title{display:flex; align-items:center; gap:9px; margin-bottom:10px}
.grp-title .gname{font-size:14px; font-weight:700; color:var(--euca-dark)}
.food-grid{display:flex; flex-wrap:wrap; gap:8px}
.food-grid--3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;align-items:start}
.food-grid--3 .chip-wrap{flex-direction:column;align-items:stretch;gap:4px;width:auto;min-width:0}
.food-grid--3 .chip{flex-direction:column;width:100%;min-width:0;gap:3px;padding:11px 6px 9px;text-align:center;position:relative;justify-content:center;min-height:72px;overflow:hidden}
.food-grid--3 .chip>span:not(.em):not(.ck){line-height:1.15;overflow-wrap:anywhere}
.food-grid--3 .chip .em{font-size:22px}
.food-grid--3 .chip .ck{position:absolute;top:6px;right:7px;margin:0}
.food-grid--3 .react{justify-content:center}
.food-grid--3 .chip .lvl{margin:0}
.food-grid--3 .warn-badge{position:absolute;top:6px;left:6px}
.note-pill{display:inline-block; font-size:10.5px; font-weight:700; color:var(--warn);
  background:#FBF0DD; border:1px solid #F0DDB8; border-radius:var(--r-pill); padding:2px 8px; margin-left:6px}

/* weekly */
.tope{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0; border-top:1px solid var(--line)}
.tope:first-child{border-top:none}
.tope .st{font-size:12px; font-weight:700; padding:4px 10px; border-radius:var(--r-pill); white-space:nowrap; flex:none}
.st.ok{background:var(--mint-tint); color:var(--euca-deep)}
.st.over{background:var(--peach-tint); color:var(--peach-dark)}
.st.block{background:var(--bg2); color:var(--ink-soft)}

/* misc */
.banner{display:flex; gap:10px; align-items:flex-start; background:var(--cream-tint); border:1px solid #F4DDB6;
  border-radius:var(--r); padding:12px 14px; margin-bottom:14px; font-size:13px; color:#8A6A2E}
.disclaimer{font-size:11.5px; color:var(--ink-faint); text-align:center; padding:18px 24px 8px; line-height:1.6}
.modal-bg{position:fixed; inset:0; background:rgba(34,56,47,.45); backdrop-filter:blur(3px); z-index:100;
  display:flex; align-items:center; justify-content:center; padding:20px; animation:fade .2s}
.sheet{background:var(--card); width:100%; max-width:440px; border-radius:22px; padding:22px 20px 20px;
  max-height:85vh; overflow:auto; animation:pop .3s cubic-bezier(.4,0,.2,1); box-shadow:0 20px 60px rgba(34,56,47,.25)}
@keyframes pop{from{transform:scale(.94);opacity:.4}to{transform:none;opacity:1}}
.sheet h3{font-size:19px; margin-bottom:14px}
/* paginación de pop-ups con dos partes */
.sheet-pages{position:relative}
.sheet-page{display:none}
.sheet-page.active{display:block}
.sheet-pager{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px}
.sheet-dot{width:8px;height:8px;border-radius:50%;background:var(--line);transition:.2s}
.sheet-dot.active{background:var(--euca);width:22px;border-radius:4px}
.sheet-nav{display:flex;justify-content:space-between;gap:10px;margin-top:14px}
.sheet-nav .btn{flex:1}
.center{text-align:center}
.empty{text-align:center; color:var(--ink-soft); padding:36px 20px; font-size:14.5px; line-height:1.55}
.empty::before{content:''; display:block; width:48px; height:48px; margin:0 auto 14px;
  background:radial-gradient(circle at 30% 30%, rgba(110,147,139,.18), transparent 60%); border-radius:50%}
.spacer{height:8px}
.divider{height:1px; background:var(--line); margin:14px 0}
.linkbtn{color:var(--euca); font-weight:700; font-size:13.5px}
.toast{position:fixed; bottom:104px; left:50%; transform:translateX(-50%); background:var(--euca-deep);
  color:#fff; padding:12px 18px; border-radius:16px; font-size:13.5px; font-weight:600; z-index:120;
  max-width:86vw; width:max-content; text-align:center; line-height:1.4;
  box-shadow:0 8px 24px rgba(63,90,84,.3); animation:up .25s}
/* sección con conteo (dos ejes separados) */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
/* Variante que, si no cabe, baja el grupo de botones a otra línea en vez de
   recortar el título (usada en cabeceras con título largo + botones). */
.sec-head-wrap{flex-wrap:wrap;gap:6px 10px}
.sec-head-wrap h3{overflow:visible;text-overflow:clip;white-space:normal;flex:1 1 auto}
.sec-head h3{margin:0}
.sec-count{font-size:13px;font-weight:800;color:var(--ink-soft);background:var(--bg2);padding:4px 12px;border-radius:var(--r-pill)}
.sec-count.ok{background:var(--mint-tint);color:var(--euca-deep)}
.scope{font-weight:600;color:var(--ink-faint);font-size:11.5px}
.need-hint{font-size:13px;color:var(--ink-soft);margin-bottom:9px;line-height:1.45}

/* chips IDEA (no seleccionables; llevan a Registrar) */
.chip.idea{background:var(--wheat-tint);border-color:#E7DCC9;cursor:pointer}
.chip.idea:active{transform:scale(.96)}
.chip.more{background:transparent;border:1px dashed #C9BBA6;color:var(--euca-dark);font-weight:700}
.idea-row{display:flex;flex-direction:column;gap:6px}
.idea-lbl{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-faint)}

/* chips de grupo (eje variedad) */
.grp-chips{display:flex;flex-wrap:wrap;gap:8px}
.gchip{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);
  border-radius:var(--r-pill);padding:6px 13px 6px 7px;font-size:13px;font-weight:700;color:var(--ink-soft);transition:.12s}
.gchip:active{transform:scale(.96)}
.gchip.done{background:var(--mint);border-color:#A6D6C6;color:var(--euca-deep)}
.gchip .gck{font-weight:800}

/* grupos colapsables en Registrar */
.grp-title.tap{display:flex;align-items:center;gap:9px;width:100%;text-align:left;padding:10px 4px;border-radius:10px;transition:background .12s}
.grp-title.tap:active{background:var(--bg2)}
.grp-title .gname{flex:1}
.gcount{font-size:12px;font-weight:700;color:var(--ink-faint)}
.gcount b{color:var(--euca)}
.chev{font-size:13px;color:var(--ink-faint);width:16px;text-align:center}
.grp-block.focus{background:var(--euca-tint);border-radius:var(--r);padding:4px 8px;margin:0 -8px 18px}

/* filtro activo */
.filter-chip{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--cream-tint);
  border:1px solid #F0DDB8;border-radius:var(--r);padding:10px 13px;margin-bottom:14px;font-size:13px;color:#7A5A22;line-height:1.4}
.filter-chip>b{font-weight:800}
.filter-chip .linkbtn{margin-left:auto;flex:none}

.logo{display:flex;align-items:center;gap:9px}

/* fecha en Registrar */
.reg-date{font-size:14px;color:var(--ink-soft);font-weight:600;margin:0 2px 14px;text-transform:capitalize}

/* reacción 👍/👎 al registrar */
.chip-wrap{display:inline-flex;align-items:center;gap:5px}
.react{display:inline-flex;gap:3px}
.rb{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:var(--card);font-size:15px;
  display:inline-flex;align-items:center;justify-content:center;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1), background .18s, border-color .18s, filter .18s, opacity .18s;
  filter:grayscale(.6);opacity:.7; touch-action:manipulation; -webkit-tap-highlight-color:transparent}
.rb:active{transform:scale(.88)}
.rb.on{filter:none;opacity:1}
.rb.pressed{animation:rbpulse .42s cubic-bezier(.34,1.56,.64,1)}
.rb.on.like{background:var(--mint-tint);border-color:#8FC7B5}
.rb.on.dis{background:var(--peach-tint);border-color:#DDA48E}
@keyframes rbpulse{
  0%{transform:scale(1)}
  35%{transform:scale(1.22)}
  70%{transform:scale(.95)}
  100%{transform:scale(1)}
}
.chip .ck{font-weight:800;margin-left:3px;color:var(--euca-deep)}

/* alimentos con advertencia: borde naranja-rojo (riesgo notorio pero no alarmista) */
.chip.warn-age{border-color:#E89B5E;background:#FBEBD9}
.chip.warn-allergen{border-color:#D87A5E;background:#F8DDD2}
.chip.warn-choke{border-color:#D87A5E;background:#F8DDD2}
.warn-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:800;padding:2px 7px;
  border-radius:var(--r-pill);margin-left:3px;text-transform:uppercase;letter-spacing:.03em}
.warn-badge.warn-age{background:#E89B5E;color:#fff}
.warn-badge.warn-allergen{background:#C7593E;color:#fff}
.warn-badge.warn-choke{background:#C7593E;color:#fff}

/* panel Tus datos en Ajustes */
.data-stat{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--line);font-size:14px;color:var(--ink-soft)}
.data-stat:first-of-type{border-top:none;padding-top:2px}
.data-stat b{color:var(--ink);font-weight:700}

/* Mover día */
.move-day-btn{color:var(--ink-soft);font-size:13.5px;font-weight:600}
.movedate{padding:2px 0}
.mv-warn{background:#FBEBD9;border:1.5px solid #E89B5E;border-radius:var(--r);padding:10px 13px;
  margin:10px 0;font-size:13.5px;color:#7E3F19;line-height:1.45;font-weight:600}
.mv-conflict{background:var(--wheat-tint);border:1px solid var(--line);border-radius:var(--r);
  padding:12px 13px;margin:14px 0 6px;font-size:14px;line-height:1.5}

/* Pouches: chip en catálogo */
.chip.pouch{background:var(--peach-tint);border-color:#D4A88E;align-items:flex-start;text-align:left;padding-top:8px;padding-bottom:8px;color:var(--ink)}
.chip.pouch.given{background:var(--euca);border-color:var(--euca-dark);color:#fff}
.chip.pouch.given .pouch-ing{color:rgba(255,255,255,.88)}
.pouch-edit{background:var(--bg2);border:1px solid var(--line);width:30px;height:30px;border-radius:8px;font-size:14px;
  display:inline-flex;align-items:center;justify-content:center;margin-left:6px;color:var(--ink-soft);font-weight:700}
.pouch-empty{padding:12px 4px 4px}
.pouch-empty .btn{font-size:14px}
.pouch-info{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0}
.pouch-name{font-weight:700;line-height:1.2}
.pouch-ing{font-size:11px;color:var(--ink-soft);line-height:1.2;font-weight:500}

/* Pouches: lista en Ajustes */
.pouch-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.pouch-row{display:flex;align-items:center;gap:11px;padding:9px 11px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r)}
.pouch-emoji{font-size:24px;flex:none}
.pouch-meta{flex:1;min-width:0}
.pouch-meta .pouch-name{font-weight:700;font-size:14px;color:var(--ink)}
.pouch-meta .pouch-ing{font-size:12px;color:var(--ink-soft);margin-top:2px;line-height:1.4}

/* Pouches: editor */
.pouch-editor .pouch-ings{display:flex;flex-wrap:wrap;gap:6px;padding:8px 0}
.ping{display:inline-flex;align-items:center;gap:6px;background:var(--euca-tint);border:1px solid #C6DCD3;
  border-radius:var(--r-pill);padding:5px 4px 5px 11px;font-size:13px;color:var(--euca-deep);font-weight:600}
.ping .em{font-size:14px}
.ping-x{background:rgba(0,0,0,.08);width:20px;height:20px;border-radius:50%;display:inline-flex;
  align-items:center;justify-content:center;font-size:11px;color:var(--ink-soft);font-weight:700}
.grp-icon-box{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex:none}

/* logo de marca Suri */
.suri-mark{display:flex;justify-content:center;margin-bottom:14px}
.suri-mark svg{filter:drop-shadow(0 4px 14px rgba(58,51,46,.10))}
.mini-logo{display:inline-flex;vertical-align:-6px;margin-right:7px}
.mini-logo svg{display:block;border-radius:7px;filter:drop-shadow(0 1px 2px rgba(58,51,46,.10))}

/* primera exposición a alérgeno */
.first-alg{padding:4px 0}
.info-btn{width:24px;height:24px;border-radius:50%;background:var(--euca-tint);color:var(--euca-deep);
  font-weight:800;font-size:13px;flex:none;display:flex;align-items:center;justify-content:center;border:1px solid #C6DCD3}
.nutinfo p{font-size:14.5px;color:var(--ink);line-height:1.5}
.ni-row{display:flex;gap:11px;align-items:flex-start;margin-bottom:11px;font-size:13.5px;color:var(--ink-soft);line-height:1.45}
.ni-row>span{font-size:19px;flex:none}
.ni-row b{color:var(--ink)}
.fa-em{font-size:38px;text-align:center;margin-bottom:8px}
.fa-tx{font-size:15px;color:var(--ink);line-height:1.5;margin-bottom:14px;text-align:center}
.fa-tips{background:var(--euca-tint);border-radius:var(--r);padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.fa-tip{font-size:13.5px;color:var(--euca-deep);line-height:1.45}

/* aviso explicativo arriba del catálogo cuando hay alimentos con advertencia visibles */
.warn-info{background:#FBEBD9;border:1.5px solid #E89B5E;border-radius:var(--r);
  padding:10px 13px;margin-bottom:14px;font-size:13px;color:#7E3F19;line-height:1.45}

/* Vista plana cuando hay filtro de nutriente: secciones Alto / Medio */
.nf-sec{margin-bottom:18px}
.nf-head{display:flex;align-items:center;gap:9px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.nf-bullet{width:12px;height:12px;border-radius:50%;flex:none}
.nf-bullet.hi{background:var(--euca)}
.nf-bullet.me{background:var(--wheat);border:1px solid #D6C8AE}
.nf-title{font-weight:800;font-size:14px;color:var(--ink);text-transform:uppercase;letter-spacing:.03em}
.nf-count{margin-left:auto;font-size:12.5px;color:var(--ink-faint);font-weight:700}

/* filtro activo — verde contrastante, texto grande */
.filter-chip-v2{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--euca);
  border-radius:var(--r);padding:12px 15px;margin-bottom:16px;font-size:15px;color:#fff;font-weight:600;line-height:1.4;box-shadow:var(--shadow)}
.fc-clear{margin-left:auto;background:rgba(255,255,255,.25);color:#fff;font-weight:700;font-size:13px;
  padding:5px 11px;border-radius:var(--r-pill);flex:none}

/* recomendaciones del motor en Hoy — recuadro INFORMATIVO (no seleccionable) */
.rec-box{margin-top:11px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px}
.rec-box-h{font-size:12.5px;font-weight:800;color:var(--euca-deep);margin-bottom:9px;text-transform:none}
.ri-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.ri{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--ink)}
.ri-em{font-size:18px;flex:none;width:22px;text-align:center}
.ri-nm{font-weight:700;flex:1}
.ri-lvl{font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:var(--r-pill);text-transform:uppercase;letter-spacing:.03em}
.ri-lvl.hi{background:var(--euca);color:#fff}
.ri-lvl.me{background:var(--wheat);color:var(--ink-soft)}
.ri-fav{font-size:11px;font-weight:700;color:var(--peach-dark);background:var(--peach-tint);padding:2px 8px;border-radius:var(--r-pill)}
.rec-cta{margin-top:11px;width:100%;text-align:center;background:var(--euca-tint);color:var(--euca-deep);
  font-weight:700;font-size:13.5px;padding:9px;border-radius:10px}
.pair-tip{margin-top:9px;background:#FFF4E1;border:1px solid #E8D2A6;border-radius:10px;
  padding:10px 13px;font-size:13.5px;color:#5C3F0E;line-height:1.5;font-weight:500}

/* textarea de notas */
.pf-notes{width:100%;min-height:84px;padding:12px 13px;border:1px solid var(--line);border-radius:var(--r);
  background:var(--card);color:var(--ink);font-family:inherit;font-size:16px;line-height:1.5;resize:vertical;outline:none}
.pf-notes:focus{border-color:var(--euca)}

/* caja de ayuda (manitas) */
.hint-box{display:flex;gap:11px;align-items:flex-start;background:var(--euca-tint);border:1px solid #C6DCD3;
  border-radius:var(--r);padding:11px 14px;margin-bottom:16px;font-size:13.5px;color:var(--euca-dark);line-height:1.45}
.hint-box>span{font-size:18px;flex:none}

/* secciones del formulario de perfil */
.pf-sec{margin-top:26px;padding-top:4px}
.pf-sec:first-child{margin-top:0}
.pf-sec-title{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--euca-deep);margin-bottom:12px;
  padding-bottom:8px;border-bottom:1px solid var(--line)}
.babyname-btn{background:none;border:none;padding:0;display:inline-flex;align-items:center;gap:7px;cursor:pointer}
.edit-pencil{font-size:15px;color:var(--euca);opacity:.75;font-weight:400}
select{font-size:17px !important;min-height:50px;padding:0 14px}
.food-avoid-results{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.food-avoid-results .alg{background:var(--euca-tint);border-color:#C6DCD3;color:var(--euca-deep)}

/* micro-celebraciones */
.ach-card{background:linear-gradient(135deg,#FBEFD7,#FFF6E6);border:1.5px solid #F0DCB4}
.ach-list{display:flex;flex-direction:column;gap:10px}
.ach{display:flex;align-items:center;gap:11px}
.ach-em{font-size:22px;line-height:1;flex:none;width:30px;text-align:center}
.ach-tx{font-size:14px;font-weight:700;color:#7A5A22;line-height:1.35}

/* resumen con anillo + narrativa */
.ring-card{display:flex;align-items:center;gap:16px}
.ring-hero{display:flex;justify-content:center;margin:6px 0 8px}
.ring-wrap{flex:none}
.ring-side{flex:1;min-width:0}
.ring-sub{font-size:12px;color:var(--ink-soft);line-height:1.45;margin-bottom:6px}
.hito-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hito{background:var(--euca-tint);border-radius:var(--r-md,14px);padding:14px 12px;text-align:center}
.hito-n{font-family:Fraunces,serif;font-size:28px;font-weight:600;color:var(--euca-deep);line-height:1}
.hito-n .hito-sub{font-size:15px;color:var(--ink-soft);font-weight:600}
.hito-l{font-size:11.5px;color:var(--ink-soft);font-weight:600;margin-top:5px;line-height:1.3}
.ring-legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
.ring-legend{justify-content:center;gap:18px}
.ring-nleg{margin-top:9px}
.rl-cap{font-size:11px;font-weight:500;color:var(--ink-faint);text-align:center;margin-bottom:6px}
.rl-items{display:grid;grid-template-columns:repeat(4,auto);justify-content:center;gap:7px 9px}

/* ---------------- STORAGE (capa robusta para navegadores reales) -------
   Estrategia: IndexedDB como almacén principal (más confiable que
   localStorage en iOS), Cache API como respaldo paralelo, localStorage
   como último recurso. Cada `set` escribe a IndexedDB Y a Cache API.
   `get` intenta IndexedDB primero; si vacío, restaura desde Cache API.

   En entorno de Anthropic sandbox existe `window.storage` y lo respetamos.
   En navegadores reales (Safari iOS, Chrome, etc.), usamos la capa nueva.  */

const mem = {};

// --- IndexedDB wrapper minimalista ----------------------------------
const IDB_NAME = 'suri-db', IDB_STORE = 'kv', IDB_VER = 1;
let _idbPromise = null;
function _openIDB(){
  if(_idbPromise) return _idbPromise;
  _idbPromise = new Promise((resolve)=>{
    if(typeof indexedDB === 'undefined'){ resolve(null); return; }
    try{
      const req = indexedDB.open(IDB_NAME, IDB_VER);
      req.onupgradeneeded = ()=>{ req.result.createObjectStore(IDB_STORE); };
      req.onsuccess = ()=>resolve(req.result);
      req.onerror = ()=>resolve(null);
      // Safari iOS a veces se cuelga sin disparar onerror; timeout
      setTimeout(()=>resolve(null), 1500);
    }catch(e){ resolve(null); }
  });
  return _idbPromise;
}
async function _idbGet(k){
  const db = await _openIDB(); if(!db) return null;
  return new Promise(resolve=>{
    try{
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(k);
      req.onsuccess = ()=>resolve(req.result ?? null);
      req.onerror = ()=>resolve(null);
    }catch(e){ resolve(null); }
  });
}
async function _idbSet(k,v){
  const db = await _openIDB(); if(!db) return false;
  return new Promise(resolve=>{
    try{
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(v, k);
      tx.oncomplete = ()=>resolve(true);
      tx.onerror = ()=>resolve(false);
    }catch(e){ resolve(false); }
  });
}

// --- Cache API wrapper como respaldo paralelo -----------------------
async function _cacheSet(k,v){
  try{
    if(typeof caches === 'undefined') return false;
    const c = await caches.open('suri-data-v1');
    await c.put('/data/'+encodeURIComponent(k), new Response(v, {headers:{'Content-Type':'application/json'}}));
    return true;
  }catch(e){ return false; }
}
async function _cacheGet(k){
  try{
    if(typeof caches === 'undefined') return null;
    const c = await caches.open('suri-data-v1');
    const r = await c.match('/data/'+encodeURIComponent(k));
    return r ? await r.text() : null;
  }catch(e){ return null; }
}

// --- localStorage como tercer respaldo ------------------------------
function _lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function _lsSet(k,v){ try{ localStorage.setItem(k,v); return true; }catch(e){ return false; } }

// --- API pública ----------------------------------------------------
// Si la capa sandbox (window.storage de Anthropic) está, la usamos.
// Si no, usamos la pila IDB + Cache + LS.
async function sget(k){
  if(mem._loaded && k in mem) return mem[k]; // cache en RAM tras primera carga
  // Anthropic sandbox
  if(window.storage && typeof window.storage.get === 'function'){
    try{ const r = await window.storage.get(k); const v = r?JSON.parse(r.value):null;
      if(v!==null) mem[k]=v; return v; }catch(e){}
  }
  // 1) IndexedDB
  let raw = await _idbGet(k);
  // 2) Cache API si IDB vacío
  if(raw==null){ raw = await _cacheGet(k); if(raw!=null){ await _idbSet(k, raw); /* re-hidratar IDB */ } }
  // 3) localStorage si todo lo anterior falla
  if(raw==null){ raw = _lsGet(k); if(raw!=null){ await _idbSet(k, raw); await _cacheSet(k, raw); } }
  if(raw==null) return null;
  try{ const v = JSON.parse(raw); mem[k]=v; return v; }catch(e){ return null; }
}
async function sset(k,v){
  mem[k]=v;
  const raw = JSON.stringify(v);
  // escribir a TODOS los almacenes en paralelo — máxima resistencia
  if(window.storage && typeof window.storage.set === 'function'){
    try{ await window.storage.set(k, raw); }catch(e){}
  }
  await Promise.all([ _idbSet(k, raw), _cacheSet(k, raw) ]);
  _lsSet(k, raw); // sincrónico, no esperamos
  state._lastSaveAt = Date.now();
}

function dstr(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function todayStr(){ return dstr(new Date()); }
function addDays(str,n){ const d=new Date(str+'T12:00:00'); d.setDate(d.getDate()+n); return dstr(d); }
function ageMonths(){
  if(!state.profile?.birth) return 6;
  const b=new Date(state.profile.birth+'T12:00:00'), n=new Date();
  let m=(n.getFullYear()-b.getFullYear())*12+(n.getMonth()-b.getMonth());
  if(n.getDate()<b.getDate()) m--;
  return Math.max(0,m);
}

function effAgeMonths(){ const m=ageMonths(); return (state.profile?.allowEarly && m<6) ? 6 : m; }

/* Minúsculas respetando convención: nombres de vitaminas mantienen
   la letra (A, C, K, D) en mayúscula. "Vitamina A" → "vitamina A". */
function lcName(s){
  if(!s) return '';
  let out = s.toLowerCase();
  // Re-capitalizar la letra de vitaminas: "vitamina a/b/c/d/e/k" + posible " / DHA"
  out = out.replace(/\bvitamina ([a-k])\b/g, (_,l)=>'vitamina '+l.toUpperCase());
  // Omega-3 / DHA (caso especial)
  out = out.replace(/omega-3 \/ dha/g, 'omega-3 / DHA');
  return out;
}

function goals(){

  // metas BASE por edad (frecuencias). iron y vitC son DIARIAS; resto SEMANAL.
  const BASE={
    '6-8':  { iron:2, vitC:1, vitA:4, calcium:3, zinc:4, dha:2, choline:3, iodine:3 },
    '9-11': { iron:2, vitC:1, vitA:5, calcium:4, zinc:5, dha:2, choline:4, iodine:4 },
    '12-24':{ iron:2, vitC:1, vitA:5, calcium:5, zinc:5, dha:3, choline:5, iodine:5 },
  }[bk];
  const scope={ iron:'día', vitC:'día', vitA:'semana', calcium:'semana', zinc:'semana', dha:'semana', choline:'semana', iodine:'semana' };
  const g=Object.assign({}, BASE);
  const f=feeding();

  // La META es la necesidad por edad y NO cambia por dar fórmula: la fórmula aporta
  // a través de las TOMAS que se registran (suma a los 8 nutrientes, igual que cualquier
  // alimento). Antes bajábamos la meta de hierro/calcio para quien daba fórmula; eso
  // causaba doble conteo y una meta "ajustada" invisible. Ahora la meta es la misma para
  // materna / fórmula / mixta.
  // Único ajuste, AL ALZA: si el bebé ya no toma leche (Ninguna), la comida debe cubrir
  // lo que antes aportaba la leche.
  if(f==='Ninguna'){ g.calcium=g.calcium+1; g.vitA=g.vitA+1; g.dha=g.dha+1; g.choline=g.choline+1; g.iodine=g.iodine+1; }

  return { values:g, scope, base:BASE, feeding:f };
}
/* nota explicativa de por qué una meta cambió por lactancia (para mostrar al usuario) */
function feedingNote(key){
  const f=feeding();
  if(f!=='Ninguna') return '';
  if(key==='calcium'||key==='vitA'||key==='dha'||key==='choline'||key==='iodine') return 'Ajustado al alza: ya no toma leche.';
  return '';
}

/* Suplementos: SOLO contexto. Nunca rellenan la barra (la app mide comida). */
function suppForNutrient(key){
  return (state.profile?.supplements||[]).includes(key);

/* ---------------- FILTRO POR EDAD + ALERGIAS -----------------------
   Filosofía: la app advierte, los padres deciden. Bloqueamos del registro
   SOLO lo que el usuario marcó como "evitar" (decisión explícita suya) y
   los riesgos médicos reales por edad (miel y leche entera antes de 12m).
   El resto se muestra siempre, con advertencia visible si corresponde.   */
function avoidSet(){ return new Set((state.profile?.allergies||[]).filter(a=>a.s==='evitar').map(a=>a.a)); }
function introducedSet(){ return new Set((state.profile?.allergies||[]).filter(a=>a.s==='intro'||a.s==='probando').map(a=>a.a)); }

/* PRIMERA EXPOSICIÓN: cuando se registra por primera vez un alimento con
   alérgeno mayor, la app guía suavemente y aprende. No pide configurar todo. */
function allergenFirstSeen(allergen, excludeToday){
  const t=todayStr();
  for(const ds in state.days){ if(excludeToday && ds===t) continue;
    const d=state.days[ds]; if(!d) continue;
    for(const e of d.entries){ const f=FOOD[e.foodId];
      if(f && f.allergens.includes(allergen)) return false;
    }
  }
  return true;
}
function alergStatus(a){ const all=state.profile?.allergies||[]; return all.find(x=>x.a===a)?.s || null; }
function setAlergStatus(a,s){
  state.profile=state.profile||{}; state.profile.allergies=state.profile.allergies||[];
  const arr=state.profile.allergies, i=arr.findIndex(x=>x.a===a);
  if(s===null){ if(i>=0) arr.splice(i,1); }
  else if(i>=0){ arr[i].s=s; if(s==='probando') arr[i].firstSeen=Date.now(); }
  else arr.push({a, s, firstSeen: s==='probando'?Date.now():null});
  saveProfile();
}
/* Auto-promoción a "introducido" tras 48h sin reportar reacción */
function autoIntroduceAllergens(){
  const all=state.profile?.allergies||[]; const now=Date.now(), DAY=24*3600*1000;
  let changed=false;
  all.forEach(x=>{ if(x.s==='probando' && x.firstSeen && (now-x.firstSeen)>=2*DAY){ x.s='intro'; changed=true; } });
  if(changed) saveProfile();
}
// Normaliza texto para búsquedas (minúsculas, sin acentos). Global para que
// la usen tanto los buscadores como renderCatResults (antes fallaba ahí).
function norm(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function eligibleFoods(){
  const m=ageMonths(), av=avoidSet();
  const avoidF=new Set(state.profile?.avoidFoods||[]);
  return D.foods.filter(f=>{
    // Bloqueos duros (riesgo médico real): miel y leche entera antes de 12m
    if(m<12 && /^Leche entera de vaca/i.test(f.name)) return false;
    if(m<12 && /^Miel/i.test(f.name)) return false;
    // Decisión explícita del usuario
    if(f.allergens.some(a=>av.has(a))) return false;
    if(avoidF.has(f.id)) return false;
    return true; // todo lo demás aparece; warnings se muestran en el chip
  });
}
/* Devuelve advertencia visible para alimento que debe registrarse con cuidado. */
function foodWarning(f){
  const m=effAgeMonths();
  if(f.minMonths>m) return { kind:'age', txt:`Se introduce desde los ${f.minMonths} meses` };
  // El aviso de "alérgeno" para CADA alimento generaba ruido visual: casi todos los lácteos,
  // legumbres y frutos secos lo mostraban. Los alérgenos se gestionan en el perfil (evitar/introducido).
  if(/asfixia/i.test(f.notes||'') && m<12) return { kind:'choke', txt:'Cuidado con la textura: riesgo de asfixia' };
  return null;
}

/* ---------------- DÍA / ENTRADAS ----------------------------------- */
function ensureDay(str){
  if(!state.days[str]) state.days[str]={ date:str, entries:[], others:{}, closed:false, closedAt:null, objective:null };
  if(!state.days[str].others) state.days[str].others={};
  return state.days[str];
}
function countFood(day,id){ return day.entries.filter(e=>e.foodId===id).length; }
function hasFood(day,id){ return day.entries.some(e=>e.foodId===id); }
function foodCount(day,id){ return day.entries.filter(e=>e.foodId===id).length; }
function addEntry(day,id,approx){ day.entries.push({foodId:id, ts:Date.now(), approx:!!approx}); saveDays(); }
function removeEntry(day,id){ const i=day.entries.map(e=>e.foodId).lastIndexOf(id); if(i>=0){ day.entries.splice(i,1); saveDays(); } }
/* TOGGLE puro: un alimento está "dado o no" en el día. */
function toggleFood(day,id,approx){ hasFood(day,id)? removeEntry(day,id) : addEntry(day,id,approx); }
function formulaFoodId(){ return ageMonths()>=12 ? 108 : 107; }
/* FÓRMULA AUTOMÁTICA: si el padre fijó "tomas al día" (profile.formulaPerDay), sembramos
   esas tomas REALES en el día — una sola vez por día (flag formulaSeeded), solo de hoy en
   adelante (>= formulaSince) y solo si ese día no tiene fórmula ya registrada. Luego el
   padre ajusta el día con −/＋ (entradas reales). No reescribe el historial previo. */
function seedFormula(str){
  const n = state.profile && state.profile.formulaPerDay;
  if(!n || n<1) return;
  const since = state.profile.formulaSince;
  if(since && str < since) return;
  const day = ensureDay(str);
  if(day.formulaSeeded) return;
  const hasFormula = day.entries.some(e=> e.foodId===107 || e.foodId===108);
  if(!hasFormula){ const fid=formulaFoodId(); for(let i=0;i<n;i++) day.entries.push({foodId:fid, ts:Date.now()+i}); }
  day.formulaSeeded = true;
  saveDays();
}
/* Créditos "otros": nutriente de un alimento fuera de los 100. */
function otherCount(day,nut){ return day.others?.[nut]||0; }
function addOther(day,nut){ day.others[nut]=(day.others[nut]||0)+1; saveDays(); }
function subOther(day,nut){ day.others[nut]=Math.max(0,(day.others[nut]||0)-1); saveDays(); }

/* ---------------- PREFERENCIAS (aceptado / rechazado) --------------
   Dato clave para el recomendador: ¿le gustó? Se guarda en el perfil. */
function foodPref(id){ return (state.profile?.prefs||{})[id]||null; }   // 'like' | 'dislike' | null
function setPref(id,val){
  if(!state.profile) return;
  state.profile.prefs=state.profile.prefs||{};
  if(foodPref(id)===val) delete state.profile.prefs[id]; // re-toque quita
  else state.profile.prefs[id]=val;
  saveProfile();
}
function likedFoods(){ const p=state.profile?.prefs||{}; return Object.keys(p).filter(id=>p[id]==='like').map(Number); }
function dislikedSet(){ const p=state.profile?.prefs||{}; return new Set(Object.keys(p).filter(id=>p[id]==='dislike').map(Number)); }

/* Frecuentes: alimentos más registrados en los últimos 30 días. */
function frequentFoods(limit){
  const cnt={}; const since=addDays(todayStr(),-30);
  for(const ds in state.days){ if(ds<since) continue;
    state.days[ds].entries.forEach(e=>{ cnt[e.foodId]=(cnt[e.foodId]||0)+1; }); }
  const elig=new Set(eligibleFoods().map(f=>f.id));
  return Object.entries(cnt).filter(([id])=>elig.has(+id))
    .sort((a,b)=>b[1]-a[1]).slice(0,limit||8).map(([id])=>+id);
}

/* Puntos de aporte: Alto=1, Medio=0.5. Recupera ~50 alimentos que
   antes (solo-Alto) quedaban invisibles. */
const PTS={A:1, M:0.5};
function foodPts(f,n){ return PTS[f.flags[n]]||0; }
// Devuelve los alimentos "efectivos" del día, expandiendo pouches a sus ingredientes.
// Un pouch tiene id negativo; se busca en state.profile.pouches.
function expandedFoods(day){
  const out=[];
  const pouches=state.profile?.pouches||[];
  day.entries.forEach(e=>{
    if(e.foodId<0){
      const p=pouches.find(x=>x.id===e.foodId);
      if(p) p.ingredients.forEach(fid=>{ const f=FOOD[fid]; if(f) out.push(f); });
    } else {
      const f=FOOD[e.foodId]; if(f) out.push(f);
    }
  });
  return out;
}
function dayStats(day){
  const fs=expandedFoods(day);
  const groups=new Set(fs.map(f=>f.group));
  const o=day.others||{};
  const rich=(n)=> fs.reduce((s,f)=>s+foodPts(f,n),0) + (o[n]||0);
  return {
    groups, nGroups:groups.size,
    iron:rich('iron'), vitC:rich('vitC'), zinc:rich('zinc'),
    vitA:rich('vitA'), dha:rich('dha'), calcium:rich('calcium'),
    choline:rich('choline'), iodine:rich('iodine'),
    fruitVeg: fs.some(f=>['fvA','fvC','otras'].includes(f.group)),
    fat: fs.some(f=>f.group==='grasas'),
    liver: fs.filter(f=>f.isLiver).length,
    nitrate: fs.filter(f=>f.highNitrate).length,
    n: fs.length
  };
}
function weekStats(endStr){
  const acc={iron:0,vitC:0,zinc:0,vitA:0,dha:0,calcium:0,choline:0,iodine:0,liver:0,nitrate:0}; const algs=new Set(); let daysWith=0;
  for(let i=0;i<7;i++){ const ds=addDays(endStr,-i), day=state.days[ds];
    if(day && day.entries.length){ daysWith++; const s=dayStats(day);
      for(const k in acc) if(k in s) acc[k]+=s[k];
      day.entries.forEach(e=>FOOD[e.foodId]?.allergens.forEach(a=>algs.add(a)));
    }
  }
  return {...acc, allergens:algs, daysWith};
}

/* ---------------- MOTOR: OBJETIVO DEL DÍA -------------------------- */
/* Sin datos NO es hueco. Hierro #1 (siempre con vit C). La semana
   diagnostica, el día sugiere UN solo foco + alimentos accionables. */
function pickFoods(filterFn, n, exclude){
  const ex=new Set(exclude||[]); const pool=eligibleFoods().filter(filterFn).filter(f=>!ex.has(f.id));
  const out=[], seen=new Set();
  for(const f of pool){ if(!seen.has(f.group)){ out.push(f); seen.add(f.group); } if(out.length>=n) break; }
  for(const f of pool){ if(out.length>=n) break; if(!out.includes(f)) out.push(f); }
  return out.map(f=>f.id);
}
/* alimentos que aportan un nutriente (Alto primero, luego Medio) */
function foodsWithNutrient(key){
  const elig=eligibleFoods();
  const high=elig.filter(f=>f.flags[key]==='A');
  const med=elig.filter(f=>f.flags[key]==='M');
  return {high, med, all:[...high,...med]};
}
function computeObjective(dateStr){
  const G=goals(), g=G.values;
  const today=state.days[dateStr];
  const todayHas = today && today.entries.length>0;
  const ts = todayHas ? dayStats(today) : null;
  const yStr=addDays(dateStr,-1), y=state.days[yStr];
  const yHas = y && y.entries.length>0;
  const ys = yHas ? dayStats(y) : null;
  // Semana hasta HOY (incluye lo que ya se registró hoy)
  const wk = weekStats(dateStr);

  // 0) Sin nada registrado ni ayer ni hoy → arrancar
  if(!yHas && !todayHas){
    return { tag:'Empecemos', title:'Arranca el día', focusNut:'iron',
      msg:'Registra lo que pruebe hoy y afinaré tus metas. Un buen comienzo: un alimento rico en hierro junto a algo con vitamina C.' };
  }

  // 1) HIERRO HOY — si aún no se cubrió la meta diaria de hierro
  if(!ts || ts.iron < g.iron){
    const yieldStr = ts ? `Vas ${ts.iron} de ${g.iron} hoy.` : (yHas && ys.iron<g.iron ? `Ayer quedó corto (${ys.iron} de ${g.iron}).` : '');
    return { tag:'El foco de hoy', title:'Démosle hierro hoy', focusNut:'iron',
      msg:`${yieldStr} Acompáñalo con algo rico en vitamina C: se absorbe mucho mejor.`.trim() };
  }
  // 2) Hierro presente HOY pero sin vit C
  if(ts && ts.iron>=g.iron && ts.vitC < g.vitC){
    return { tag:'El foco de hoy', title:'Suma vitamina C', focusNut:'vitC',
      msg:`Ya hay hierro hoy (${ts.iron}/${g.iron}). Súmale algo con vitamina C — una fruta cítrica, kiwi, fresa o pimiento — para que se absorba mejor.` };
  }
  // 3) Nutrientes semanales pendientes — solo si hay déficit REAL considerando hoy
  const weekly=[
    {k:'dha', title:'Esta semana, omega-3', msg:'Aún falta omega-3 esta semana. Pescado, chía o linaza son ideales para su desarrollo cerebral.'},
    {k:'vitA', title:'Color naranja y verde', msg:'Falta vitamina A esta semana. Camote, zanahoria, mango o espinaca ayudan a su vista e inmunidad.'},
    {k:'calcium', title:'Un poco de calcio', msg:'El calcio va algo bajo esta semana. Yogur, queso o tofu apoyan sus huesitos.'},
    {k:'zinc', title:'Sumemos zinc', msg:'El zinc va corto esta semana. Carnes, legumbres y semillas lo aportan bien.'},
    {k:'choline', title:'Memoria y cerebro', msg:'Falta colina esta semana. Yema de huevo o hígado son sus mejores fuentes.'},
    {k:'iodine', title:'Yodo esta semana', msg:'Falta yodo esta semana. Pescado de mar, lácteos o huevo lo aportan.'},
  ].map(w=>({...w, deficit:(g[w.k]||0)-(wk[w.k]||0)})).filter(w=>w.deficit>0)
   .sort((a,b)=>b.deficit-a.deficit);
  if(weekly.length){ const w=weekly[0];
    return { tag:'El foco de hoy', title:w.title, msg:w.msg, focusNut:w.k };
  }
  // 4) Todo cubierto -> reforzar
  return { tag:'¡Vas muy bien!', title:'Mantén el ritmo', focusNut:null,
    msg:`${state.profile.name} viene cubriendo sus nutrientes clave. Hoy basta con mantener el ritmo.` };
}

/* ---------------- ESTADO DEL DÍA — SOLO NUTRIENTES -----------------
   El objetivo es que el bebé reciba los 6 nutrientes clave. La meta se
   modula por lactancia (ver goals()). Hoy diagnostica; el registro vive
   en Registrar. La diversidad de grupos se retiró como meta (era un
   proxy de justo lo que aquí medimos directamente).                    */
function nutrientsState(dateStr){
  const day=ensureDay(dateStr), s=dayStats(day), wk=weekStats(dateStr);
  const G=goals(), g=G.values, sc=G.scope;
  const META={
    iron:{name:'Hierro', hint:'El déficit #1 a esta edad. Siempre con vitamina C para absorberlo mejor.', iron:true},
    vitC:{name:'Vitamina C', hint:'Multiplica la absorción del hierro. Va de la mano con él.'},
    vitA:{name:'Vitamina A', hint:'Vista e inmunidad. En frutas y verduras de color naranja (camote, zanahoria, mango) y verde oscuro (espinaca, brócoli).'},
    dha:{name:'Omega-3 / DHA', hint:'Desarrollo cerebral. Pescado, chía, linaza.'},
    calcium:{name:'Calcio', hint:'Huesos y dientes.'},
    zinc:{name:'Zinc', hint:'Inmunidad y crecimiento.'},
    choline:{name:'Colina', hint:'Memoria y desarrollo cerebral. La yema de huevo es la estrella; también hígado, carnes y legumbres.'},
    iodine:{name:'Yodo', hint:'Clave para la tiroides y el desarrollo cognitivo. Pescado de mar, lácteos y huevo.'},
  };
  const order=['iron','vitC','vitA','dha','calcium','zinc','choline','iodine'];
  // Detalle de HOY: los nutrientes DIARIOS (hierro/vitC) muestran el avance del
  // día contra su meta diaria. Los SEMANALES muestran el acumulado de la semana
  // calendario (lun-dom que contiene esta fecha) contra la meta semanal completa
  // — no una ventana móvil de 7 días, para que coincida con la vista Semana.
  const wkCal={iron:0,vitC:0,zinc:0,vitA:0,dha:0,calcium:0,choline:0,iodine:0};
  weekRange(dateStr).forEach(ds=>{ const d=state.days[ds]; if(d&&d.entries.length){ const ss=dayStats(d); for(const kk in wkCal) if(kk in ss) wkCal[kk]+=ss[kk]; } });
  return order.map(k=>({
    key:k, icon:k, name:META[k].name, hint:META[k].hint, iron:!!META[k].iron,
    scope:sc[k], val: sc[k]==='día' ? s[k] : wkCal[k], target:g[k], feedNote:feedingNote(k),
    dayPts: s[k]   // puntos del DÍA de este nutriente (Alto=1, Medio=0.5) — para el anillo de cobertura
  }));
}
/* Ideas ilustrativas para un nutriente (no seleccionables; llevan a Registrar). */
function ideasFor(filterFn, n){
  return pickFoods(filterFn, n||5).map(id=>FOOD[id]).filter(Boolean);

/* ---------------- RECOMENDADOR INTELIGENTE -------------------------
   "Qué ofrecer hoy" para un nutriente: puntúa cada alimento elegible por
   nivel de aporte + preferencias del bebé + practicidad + seguridad.   */
function recommendFor(nutKey, n){
  const elig=eligibleFoods();              // ya filtra edad, alergias, alimentos vetados
  const liked=new Set(likedFoods());
  const disliked=dislikedSet();
  const freq=new Set(frequentFoods(12));
  const m=ageMonths();
  const scored=elig
    .filter(f=>f.flags[nutKey]==='A'||f.flags[nutKey]==='M')
    .map(f=>{
      let sc=0;
      sc += f.flags[nutKey]==='A' ? 10 : 5;          // nivel de aporte
      if(liked.has(f.id)) sc += 6;                   // le gusta → arriba
      if(disliked.has(f.id)) sc -= 8;                // lo rechazó → al fondo
      if(freq.has(f.id)) sc += 2;                    // practicidad (ya lo usa)
      if(/asfixia/i.test(f.notes) && m<9) sc -= 3;   // precaución textura en los más chicos
      return {f, sc};
    })
    .sort((a,b)=>b.sc-a.sc);
  return scored.slice(0, n||6).map(x=>x.f);
}

/* Devuelve un tip apropiado para el nutriente. Combina:
   - Si tiene favoritos que aportan este nutriente: mensaje contextual del bebé.
   - Si no: un dato factual de la lista NUT_TIPS, rotando por sesión.
   La rotación usa __sessionSeed para que cambie entre sesiones pero sea estable dentro de la misma. */
function favoriteTip(nutKey){
  const liked = likedFoods().map(id=>FOOD[id]).filter(Boolean);
  const aportan = liked.filter(f=>f.flags[nutKey]==='A'||f.flags[nutKey]==='M');
  const factuales = NUT_TIPS[nutKey] || [];
  // Construir pool: si hay favoritos relevantes, añadir 1-2 contextuales; siempre incluir los factuales.
  const pool = [...factuales];
  if(aportan.length){
    const f = aportan[(__sessionSeed + nutKey.charCodeAt(0)) % aportan.length];
    const nm = f.name.split('(')[0].trim().toLowerCase();
    const alto = f.flags[nutKey]==='A';
    pool.push(alto
      ? `💚 Tienes <b>${nm}</b> entre sus favoritos — buena fuente de este nutriente.`
      : `💚 Le gusta <b>${nm}</b>: aporta algo de este nutriente sin esfuerzo.`);
  }
  if(!pool.length) return null;
  // Selección estable dentro de la sesión, varía por nutriente
  const idx = (__sessionSeed + nutKey.charCodeAt(0)*13) % pool.length;
  return pool[idx];
}
// Semilla por sesión: se genera una vez al cargar la app; al recargar cambia.
const __sessionSeed = Math.floor(Math.random()*100000);

  autoIntroduceAllergens();  // promueve 'probando' → 'intro' tras 48h sin reacción

function hasEverLogged(){
  for(const ds in state.days){ if(state.days[ds].entries && state.days[ds].entries.length) return true; }
  return false;
}
function reminderNeeded(){
  // Nunca para un usuario nuevo: solo si ALGUNA vez registró y hoy lleva
  // 2 días previos vacíos (y hoy aún sin nada).
  if(state.settings.daysReminder===false) return false;
  if(!hasEverLogged()) return false;
  const t=todayStr();
  const today=state.days[t];
  if(today && today.entries.length) return false;
  const y1=state.days[addDays(t,-1)], y2=state.days[addDays(t,-2)];
  const empty=d=>!d||d.entries.length===0;
  return empty(y1)&&empty(y2);
}
// Aviso suave al final del día: cerca de closeHour, si parece que quedó algo
// sin anotar (registros de hoy < mínimo de comidas de la banda). Tono no-alarmista
// y enfocado en REGISTRAR (no implica que el bebé no comió: "sin dato ≠ no consumido").
function mealReminderNeeded(){
  if(state.settings.endOfDayReminder===false) return false;
  if(!state.profile) return false;
  if(ageMonths()<6 && !state.profile.allowEarly) return false;
  if(!hasEverLogged()) return false;            // no presionar a quien aún no empieza
  const close=state.settings.closeHour??22;
  if(new Date().getHours()<close) return false; // solo al acercarse el cierre
  const t=todayStr(), day=state.days[t];
  const meals=day?day.entries.length:0;
  const minMeals=parseInt(String(band().meals||'2').split('-')[0],10)||2;
  return meals<minMeals;
}

function toast(msg, ms){
  // Mostrar/ocultar el toast SIN render() completo: reconstruir el DOM (incluido
  // el <input> del buscador) mientras el usuario escribe le roba el foco y, en iOS,
  // cierra el teclado a media palabra. Inyectamos/actualizamos el nodo directamente.

  if(app){

    else { t.style.animation='none'; void t.offsetWidth; t.style.animation='up .25s'; }

/* ---------------- COMPONENTES VISUALES ----------------------------- */
const NUT_COLOR={ iron:'#C77E63', vitC:'#E0922E', vitA:'#D99A3F', dha:'#6E938A', calcium:'#9A7B43', zinc:'#52716A', choline:'#B07A9C', iodine:'#5B8AA6' };
const NUT_SHORT={ iron:'Hierro', vitC:'Vit C', vitA:'Vit A', dha:'Omega-3', calcium:'Calcio', zinc:'Zinc', choline:'Colina', iodine:'Yodo' };
function _polar(cx,cy,r,deg){ const a=deg*Math.PI/180; return [cx+r*Math.cos(a), cy+r*Math.sin(a)]; }
function _arc(cx,cy,r,startDeg,endDeg){
  if(endDeg<=startDeg) return '';
  const [x1,y1]=_polar(cx,cy,r,startDeg), [x2,y2]=_polar(cx,cy,r,endDeg);
  const large=(endDeg-startDeg)>180?1:0;
  return `M ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)}`;
}
// Sector anular RELLENO con extremos rectos (perpendiculares al radio) y esquinas
// redondeadas (radio cr). Reemplaza al trazo con linecap "round" (efecto salchicha).
function _roundedSector(cx,cy,ri,ro,a0,a1,cr){
  const span=a1-a0; if(span<=0) return '';
  const rad=Math.PI/180, f=n=>n.toFixed(2), P=(r,a)=>_polar(cx,cy,r,a);
  cr=Math.min(cr,(ro-ri)/2-0.2,(span*rad*ri)/2-0.2);
  if(cr<0.4){ // espacio insuficiente: extremos rectos sin redondeo
    const A=P(ro,a0),B=P(ro,a1),E=P(ri,a1),F=P(ri,a0);
    return `M ${f(A[0])} ${f(A[1])} A ${ro} ${ro} 0 0 1 ${f(B[0])} ${f(B[1])} L ${f(E[0])} ${f(E[1])} A ${ri} ${ri} 0 0 0 ${f(F[0])} ${f(F[1])} Z`;
  }
  const dO=cr/ro/rad, dI=cr/ri/rad;
  const A=P(ro,a0+dO), B=P(ro,a1-dO), cB=P(ro,a1), C=P(ro-cr,a1),
        D=P(ri+cr,a1), cD=P(ri,a1), E=P(ri,a1-dI),
        Fp=P(ri,a0+dI), cF=P(ri,a0), G=P(ri+cr,a0),
        Hh=P(ro-cr,a0), cH=P(ro,a0);
  return `M ${f(A[0])} ${f(A[1])} `+
    `A ${ro} ${ro} 0 0 1 ${f(B[0])} ${f(B[1])} `+
    `Q ${f(cB[0])} ${f(cB[1])} ${f(C[0])} ${f(C[1])} `+
    `L ${f(D[0])} ${f(D[1])} `+
    `Q ${f(cD[0])} ${f(cD[1])} ${f(E[0])} ${f(E[1])} `+
    `A ${ri} ${ri} 0 0 0 ${f(Fp[0])} ${f(Fp[1])} `+
    `Q ${f(cF[0])} ${f(cF[1])} ${f(G[0])} ${f(G[1])} `+
    `L ${f(Hh[0])} ${f(Hh[1])} `+
    `Q ${f(cH[0])} ${f(cH[1])} ${f(A[0])} ${f(A[1])} Z`;
}
/* Anillo de COBERTURA DEL DÍA. El nivel de cada segmento usa la MISMA regla
   que los círculos del calendario de Semana, para que el aro de hoy y el cuadro
   de hoy en el calendario siempre coincidan:
   Lleno  = el día alcanza la meta del nutriente (la meta DIARIA en hierro/vitC;
            ~2 raciones/día —g/7*2— en los semanales, "un buen día").
   Medio  = hay aporte pero no llega a esa meta (entre 0 y el umbral).
   Vacío  = no se dio nada de ese nutriente hoy.
   El centro cuenta cuántos de los 8 nutrientes recibieron algún aporte hoy. */
function summaryRing(nuts){
  const total=nuts.length;
  const covered=nuts.filter(n=>(n.dayPts||0)>0).length;   // nutrientes con algún aporte hoy
  const cx=70, cy=70, R=54, GAP=4, per=360/total, SW=15, CR=3.6;
  const ri=R-SW/2, ro=R+SW/2;
  let paths='';
  nuts.forEach((n,i)=>{
    const base=-90 + i*per;
    const s=base+GAP/2, e=base+per-GAP/2;
    const pts=n.dayPts||0;
    // Relleno CONTINUO (igual que los círculos del calendario): fracción de la meta
    // del día (diaria para hierro/vitC; ~2 raciones/día para los semanales).
    const daily = n.scope==='día' ? n.target : Math.max(0.5, n.target/7*2);
    const ratio = Math.min(1, pts/daily);
    paths+=`<path d="${_roundedSector(cx,cy,ri,ro,s,e,CR)}" fill="#EEE6D7"/>`;
    if(ratio>0){ const ve=s+(e-s)*ratio;
      paths+=`<path d="${_roundedSector(cx,cy,ri,ro,s,ve,CR)}" fill="${NUT_COLOR[n.key]}"/>`; }
  });
  return `<svg viewBox="0 0 140 140" width="150" height="150" aria-label="${covered} de ${total} nutrientes dados hoy">
    ${paths}
    <text x="70" y="64" text-anchor="middle" font-family="Fraunces,serif" font-size="30" font-weight="600" fill="#3F5A54">${covered}</text>
    <text x="70" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="#857B73">de ${total}</text>
  </svg>`;
}
/* Narrativa cálida del día — qué nutrientes se han dado hoy y cuáles faltan */
function dayNarrative(nuts){
  const name=state.profile.name;
  const given=nuts.filter(n=>(n.dayPts||0)>0);
  const missing=nuts.filter(n=>(n.dayPts||0)===0);
  if(given.length===0) return `Aún no registras nada hoy. Toca <b>Registrar</b> y los segmentos se irán llenando.`;
  if(missing.length===0) return `¡Los 8 nutrientes cubiertos hoy! ${name} probó algo de cada uno. 🌟`;
  const missNames=missing.slice(0,2).map(n=>lcName(n.name));
  return `${name} ya probó ${given.length} de 8 nutrientes hoy. Para completar ayudaría sumar <b>${missNames.join(' y ')}</b>.`;
}

/* ---------------- MOTOR DE LOGROS (micro-celebraciones) ------------
   Tono suave (Apple Fitness / Headspace), no infantil. Detecta rachas,
   hitos y mejoras reales para dar sensación de progreso.              */
function ironStreak(){ // días consecutivos terminando hoy/ayer con hierro en meta
  const g=goals().values; let streak=0;
  for(let i=0;i<60;i++){ const ds=addDays(todayStr(),-i), d=state.days[ds];
    if(!d||!d.entries.length){ if(i===0) continue; break; } // hoy sin registro no rompe
    if(dayStats(d).iron>=g.iron) streak++; else break;
  }
  return streak;
}
function uniqueFoodsEver(){ const s=new Set(); for(const ds in state.days) state.days[ds].entries.forEach(e=>{ if(e.foodId>0) s.add(e.foodId); }); return s.size; }
// Racha actual de días registrando (terminando hoy o ayer). Un hueco la reinicia,
// pero NUNCA se muestra como algo negativo: solo celebra la racha vigente.
function logStreak(){
  let streak=0;
  for(let i=0;i<400;i++){ const ds=addDays(todayStr(),-i), d=state.days[ds];
    const has = d && (d.entries?.length>0 || Object.keys(d.others||{}).some(k=>d.others[k]>0));
    if(!has){ if(i===0) continue; break; }  // hoy sin registro todavía no rompe
    streak++;
  }
  return streak;
}
// Mejor racha histórica de días consecutivos con registro.
function bestLogStreak(){
  const ds=Object.keys(state.days||{}).filter(k=>{ const d=state.days[k]; return d && (d.entries?.length>0 || Object.keys(d.others||{}).some(x=>d.others[x]>0)); }).sort();
  let best=0, cur=0, prev=null;
  ds.forEach(k=>{ if(prev && addDays(prev,1)===k) cur++; else cur=1; best=Math.max(best,cur); prev=k; });
  return best;
}
function uniqueFoodsToday(){ const t=todayStr(), d=state.days[t]; if(!d) return []; 
  // alimentos de hoy que nunca se habían registrado antes
  const prev=new Set(); for(const ds in state.days){ if(ds<t) state.days[ds].entries.forEach(e=>prev.add(e.foodId)); }
  return [...new Set(d.entries.map(e=>e.foodId))].filter(id=>!prev.has(id)).map(id=>FOOD[id]).filter(Boolean);
}
function weekVariety(endStr){ const wkdays=weekRange(endStr); const s=new Set();
  wkdays.forEach(ds=>{ if(ds<=todayStr()) (state.days[ds]?.entries||[]).forEach(e=>s.add(e.foodId)); }); return s.size; }
/* Devuelve hasta 3 logros activos hoy, en orden de impacto. */
function todayAchievements(){
  const out=[], t=todayStr(), day=ensureDay(t), s=dayStats(day), g=goals().values, name=state.profile.name;
  const nuts=nutrientsState(t);
  // racha de hierro
  const st=ironStreak();
  if(st>=2) out.push({emoji:'🔥', txt:`${st} días seguidos cubriendo hierro`});
  // nutrientes con algún aporte hoy (mismo criterio que el anillo de cobertura)
  const doneToday=nuts.filter(n=>(n.dayPts||0)>0);
  if(doneToday.length===nuts.length) out.push({emoji:'🌟', txt:`¡Los 8 nutrientes probados hoy!`});
  else if(doneToday.length>=4) out.push({emoji:'💪', txt:`${doneToday.length} de ${nuts.length} nutrientes probados hoy`});
  // alimentos nuevos hoy
  const nuevos=uniqueFoodsToday();
  if(nuevos.length>=1){
    const names=nuevos.map(f=>f.name.split('(')[0].trim().toLowerCase());
    let lista;
    if(names.length<=3) lista=names.join(', ');
    else lista=`${names.slice(0,3).join(', ')} y ${names.length-3} más`;
    out.push({emoji:'✨', txt:`Probó ${nuevos.length} ${nuevos.length===1?'sabor nuevo':'sabores nuevos'}: ${lista}`});
  }
  // variedad semanal récord (simple: variedad de esta semana)
  const vw=weekVariety(t);

function nutrientRowCompact(n){
  // Hoy = relleno CONTINUO contra la meta del día (igual que el aro y el calendario):
  // la barra se llena en proporción al avance. Vacío = 0 (sin franja inicial falsa).
  // La etiqueta resume en alto / medio / falta. Toda la fila es tocable -> Registrar.
  const pts=n.dayPts||0;
  const daily = n.scope==='día' ? n.target : Math.max(0.5, n.target/7*2);
  const frac = Math.min(1, pts/daily);
  const lvl = frac>=1 ? 'hi' : (frac>0 ? 'me' : 'no');
  const txt = lvl==='hi' ? 'alto' : (lvl==='me' ? 'medio' : 'falta');
  const w   = +(frac*100).toFixed(1);
  const op  = lvl==='hi' ? 1 : (lvl==='me' ? 0.85 : 0.3);
  const c=NUT_COLOR[n.key];
  return `<button class="nrowc tap" data-regnut="${n.key}" aria-label="${n.name}: ${txt}. Ver alimentos">
    <span class="nrc-top">
      <span class="nrc-ic" style="background:${c}22"><span style="background:${c}"></span></span>
      <span class="nrc-nm">${n.name} <span class="nrc-sc">· ${n.scope}</span></span>
      <span class="nrc-lvl ${lvl}">${txt}</span><span class="nrc-chev">›</span>
    </span>
    <span class="nrc-track"><span class="nrc-fill" style="width:${w}%;background:${c};opacity:${op}"></span></span>
  </button>`;
}

function pouchChip(day,p){
  const on=hasFood(day,p.id);
  const ingredientNames = p.ingredients.slice(0,3).map(fid=>{const f=FOOD[fid]; return f?f.name.split('(')[0].trim().split(' ')[0].toLowerCase():'';}).filter(Boolean).join(', ');
  const more = p.ingredients.length>3 ? ` +${p.ingredients.length-3}` : '';
  return `<span class="chip-wrap"><button class="chip pouch ${on?'given':''}" data-toggle="${p.id}">
    <span class="em">${p.emoji||'🍱'}</span>
    <span class="pouch-info"><span class="pouch-name">${p.name}</span><span class="pouch-ing">${ingredientNames}${more}</span></span>
    ${on?'<span class="ck">✓</span>':''}
  </button><button class="pouch-edit" data-act="editPouch:${p.id}" title="Editar pouch">✎</button></span>`;
}
/* Alimentos con CONTADOR de raciones (cada ración = una entrada que suma a los
   nutrientes del día), en vez de toggle de presencia. Son alimentos "tipo dosis"
   que suelen ofrecerse varias veces al día como estrategia de hierro/zinc:
   la fórmula y los cereales infantiles fortificados (38 avena Fe, 39 arroz Fe).
   Mismo mecanismo que la fórmula (addEntry/removeEntry son genéricos). */
const COUNTABLE_FOOD_IDS = new Set([38, 39]);
function isCountableFood(f){ return f.group==='formulas' || COUNTABLE_FOOD_IDS.has(f.id); }
function regChip(day,f,showLevel){
  const on=hasFood(day,f.id);
  let lvl='';
  if(showLevel){ const v=f.flags[showLevel];
    if(v==='A') lvl='<span class="lvl hi">alto</span>';
    else if(v==='M') lvl='<span class="lvl me">medio</span>'; }
  const pref=foodPref(f.id);
  const pressedL = state._pressedPref === `like:${f.id}` ? ' pressed' : '';
  const pressedD = state._pressedPref === `dislike:${f.id}` ? ' pressed' : '';
  // Manitas 👍👎 SOLO cuando el alimento ya está marcado como consumido (más limpio).
  const react = on ? `<span class="react"><button class="rb ${pref==='like'?'on like':''}${pressedL}" data-pref="like:${f.id}" title="Le gustó">👍</button><button class="rb ${pref==='dislike'?'on dis':''}${pressedD}" data-pref="dislike:${f.id}" title="No le gustó">👎</button></span>` : '';
  const warn = foodWarning(f);
  // Borde/franja roja-naranja para alimentos con advertencia (riesgo notorio)
  const warnCls = warn ? ` warn-${warn.kind}` : '';
  const warnBadge = warn ? `<span class="warn-badge warn-${warn.kind}" title="${warn.txt}">⚠ ${warn.kind==='age'?f.minMonths+'m+':(warn.kind==='allergen'?'alérgeno':'asfixia')}</span>` : '';
  // Contador de raciones (cada ración = una entrada; varias raciones suman): fórmula
  // y cereales infantiles fortificados. El resto de alimentos siguen siendo toggle.
  if(isCountableFood(f)){
    const n=foodCount(day,f.id);
    const stepper = n>0
      ? `<span class="fstep"><button class="fbtn" data-foodminus="${f.id}" aria-label="Quitar toma">−</button><b class="fnum">${n}</b><button class="fbtn" data-foodplus="${f.id}" aria-label="Añadir toma">＋</button></span>`
      : '';
    return `<span class="chip-wrap"><button class="chip ${n>0?'given':''}${warnCls}" ${n>0?'':`data-toggle="${f.id}"`}><span class="em">${f.emoji}</span><span>${f.name.split('(')[0].trim()}</span>${warnBadge}${n>0?'<span class="ck">✓</span>':''}</button>${stepper}</span>`;
  }
  return `<span class="chip-wrap"><button class="chip ${on?'given':''}${warnCls}" data-toggle="${f.id}"><span class="em">${f.emoji}</span><span>${f.name.split('(')[0].trim()}</span>${lvl}${warnBadge}${on?'<span class="ck">✓</span>':''}</button>${react}</span>`;
}
/* Renderiza SOLO el contenido del catálogo (debajo del buscador).
   Se llama desde screenRegistrar (render completo) y desde window._search
   (actualización aislada sin tocar el input ni la pantalla). */
function renderCatResults(day, q, qn, filtered, nutFilter, grpFocus){
  let html='';
  // Ordena por preferencia: 👍 arriba, neutrales en medio, 👎 abajo. Estable dentro de cada grupo.
  const prefScore = f => { const p=foodPref(f.id); return p==='like'?-1 : (p==='dislike'?1 : 0); };
  const byPref = (a,b) => prefScore(a) - prefScore(b);
  if(nutFilter){
    const altos=filtered.filter(f=>f.flags[nutFilter]==='A').sort(byPref);
    const medios=filtered.filter(f=>f.flags[nutFilter]==='M').sort(byPref);
    const sec=(title,arr,cls)=> arr.length ? `<div class="nf-sec">
      <div class="nf-head"><span class="nf-bullet ${cls}"></span><span class="nf-title">${title}</span><span class="nf-count">${arr.length}</span></div>
      <div class="food-grid food-grid--3">${arr.map(f=>regChip(day,f,nutFilter)).join('')}</div></div>` : '';
    html+=sec('Aporte alto',altos,'hi');
    html+=sec('Aporte medio',medios,'me');
  } else {
    // MIS POUCHES — siempre visible para que el usuario pueda crear desde aquí
    const pouches=state.profile?.pouches||[];
    const visiblePouches = q ? pouches.filter(p=>norm(p.name).includes(qn)) : pouches;
    // Solo ocultar el grupo entero si hay búsqueda activa y ningún pouch coincide
    const showPouchGroup = !q || visiblePouches.length>0;
    let pouchBlockHTML='';
    if(showPouchGroup){
      const expanded=state._openGroups||{};
      // Sin pouches: abierto por defecto para que se vea la invitación a crear.
      // Con pouches: respeta lo que el usuario tenga expandido/colapsado.
      const isOpen = q ? true : (state._regGrp==='pouches' ? true : (pouches.length===0 ? true : !!expanded['pouches']));
      const givenCount=visiblePouches.filter(p=>hasFood(day,p.id)).length;
      const pouchHeader = `<button class="grp-title tap" data-grptoggle="pouches">
          <span class="grp-icon-box" style="background:var(--peach-tint)">🍱</span>
          <span class="gname">Mis mezclas / Pouches</span>
          <span class="gcount">${givenCount>0?'<b>'+givenCount+' ✓</b> · ':''}${pouches.length||'crear'}</span>
          <span class="chev">${isOpen?'▾':'▸'}</span>
        </button>`;
      const pouchBody = pouches.length===0
        ? `<div class="pouch-empty">
            <p class="faint" style="margin-bottom:10px">Crea pouches personalizados con los ingredientes que vienen en la etiqueta. Al registrarlos, sus nutrientes se suman como si dieras cada ingrediente.</p>
            <button class="btn primary block" data-act="newPouch">＋ Crear mi primer pouch</button>
          </div>`
        : `<div class="food-grid">${visiblePouches.map(p=>pouchChip(day,p)).join('')}</div>
           <button class="btn sm ghost block" data-act="newPouch" style="margin-top:10px">＋ Crear otro pouch</button>`;
      pouchBlockHTML=`<div class="grp-block ${state._regGrp==='pouches'?'focus':''}">
        ${pouchHeader}
        ${isOpen?pouchBody:''}
      </div>`;
    }
    const groupsWith=D.groups.filter(g=>filtered.some(f=>f.group===g.key));
    const expanded=state._openGroups||{};
    groupsWith.forEach(g=>{
      const fs=filtered.filter(f=>f.group===g.key).sort(byPref);
      const isOpen = q ? true : (grpFocus===g.key ? true : !!expanded[g.key]);
      const givenCount=fs.filter(f=>hasFood(day,f.id)).length;
      html+=`<div class="grp-block ${grpFocus===g.key?'focus':''}">
        <button class="grp-title tap" data-grptoggle="${g.key}">
          ${iconBox(g.icon||g.key,34,26)}
          <span class="gname">${g.name}</span>
          <span class="gcount">${givenCount>0?'<b>'+givenCount+' ✓</b> · ':''}${fs.length}</span>
          <span class="chev">${isOpen?'▾':'▸'}</span>
        </button>
        ${isOpen?`${g.key==='otras'?`<p class="grp-note">Aportan <b>variedad, fibra, hidratación y textura</b> —valiosas para el bebé— aunque no destacan en los 8 nutrientes que mide Suri (por eso aparecen en beige en el calendario).</p>`:''}${g.key==='formulas'?`<p class="grp-note">Toca <b>＋</b> por cada toma de fórmula del día. Varias tomas suman: a más tomas, más nutrientes cubiertos.</p>`:''}<div class="food-grid ${g.key==='formulas'?'food-grid--2':'food-grid--3'}">${fs.map(f=>regChip(day,f,null)).join('')}</div>`:''}
      </div>`;
    });
    html+=pouchBlockHTML;
  }
  if(!filtered.length){
    let hint='';
    if(q){
      const found=D.foods.filter(f=>norm(f.name).includes(qn));
      if(found.length){
        const av=avoidSet(), avF=new Set(state.profile?.avoidFoods||[]), m=ageMonths(), em=effAgeMonths();
        const reasons=found.map(f=>{
          if(avF.has(f.id)) return `<b>${f.name.split('(')[0].trim()}</b> está en tu lista de alimentos a evitar.`;
          if(f.allergens.some(a=>av.has(a))) return `<b>${f.name.split('(')[0].trim()}</b> contiene un alérgeno que marcaste como “evitar”.`;
          if(f.minMonths>em) return `<b>${f.name.split('(')[0].trim()}</b> se introduce a partir de los ${f.minMonths} meses. ${state.profile.name} aún tiene ${m}.`;
          return null;
        }).filter(Boolean);
        if(reasons.length) hint=`<div class="empty-hint">${reasons[0]}</div>`;
      }
    }
    html+=`<div class="empty">Sin resultados${q?` para “${q}”`:''}.${hint}</div>`;
  }
  return html;
}

function screenRegistrar(){
  const dateStr=state.recoveryDate||todayStr(); seedFormula(dateStr); const day=ensureDay(dateStr), q=(state._q||'').toLowerCase().trim();
  const recovery=!!state.recoveryDate;
  const elig=eligibleFoods();
  const nutFilter=state._regNut;            // pre-filtro por nutriente (viene de Hoy)
  const grpFocus=state._regGrp;             // grupo destacado (viene de Hoy)
  const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const qn=norm(q);
  let filtered=q?elig.filter(f=>norm(f.name).includes(qn)):elig;
  if(nutFilter) filtered=filtered.filter(f=>f.flags[nutFilter]==='A'||f.flags[nutFilter]==='M');
  const freq=frequentFoods(8).map(id=>FOOD[id]).filter(Boolean);

  let html=`<div class="screen">
    <div class="reg-top"><button class="btn ghost sm" data-tab="hoy">‹ Hoy</button>
      <div style="text-align:right"><div class="hello">Toca lo que probó · toca de nuevo para quitar</div></div></div>
    <div class="babyname" style="font-size:21px;margin:2px 2px 4px">${recovery?'Modo recuperación':`¿Qué comió ${state.profile.name}?`}</div>
    ${recovery?'':`<div class="reg-date">${new Date().toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'})}</div>`}`;

  if(recovery) html+=`<div class="banner"><span>⏪</span><div>Estás registrando <b>${new Date(dateStr+'T12:00:00').toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'})}</b>. <span class="linkbtn" data-act="exitRecovery">Volver a hoy</span></div></div>`;
  else html+=`<div class="row" style="margin-bottom:14px"><button class="btn ghost sm" data-act="recovery">⏪ Registrar un día pasado</button></div>`;

  // Mención explicativa de las manitas
  html+=`<div class="hint-box"><span>👍👎</span><div>Toca el alimento para marcar que lo <b>comió</b>. Usa las manitas para indicar si le <b>gustó o no</b> — así te doy mejores recomendaciones.</div></div>`;

  // Filtro activo (pre-filtrado desde Hoy) — incluye Alto y Medio
  if(nutFilter){ const nm=D.nutrients.find(n=>n.key===nutFilter)?.name||nutFilter;
    html+=`<div class="filter-chip-v2"><span>🔍 Mostrando alimentos con <b>${nm}</b> (alto y medio)</span><button class="fc-clear" data-act="clearFilter">✕ quitar</button></div>`; }

  // CONSUMIDO HOY (o en el día que se está editando) — muestra los alimentos ya registrados
  // arriba para que el usuario vea de un golpe lo que lleva, sin tener que buscarlos en el catálogo.
  if(!q && !nutFilter){
    const consumed = day.entries
      .map(e=>{
        if(e.foodId<0){
          // Pouch personalizado
          const p=(state.profile?.pouches||[]).find(x=>x.id===e.foodId);
          return p ? {pouch:p} : null;
        }
        return FOOD[e.foodId] ? {food:FOOD[e.foodId]} : null;
      })
      .filter(Boolean);
    // Deduplicar por id (un alimento solo aparece una vez aunque se registre varias)
    const seen=new Set();
    const consumedUnique = consumed.filter(it=>{
      const id = it.food?.id ?? it.pouch?.id;
      if(seen.has(id)) return false;
      seen.add(id); return true;
    });
    if(consumedUnique.length){
      html+=`<div class="section-label">${recovery?'Registrado en este día':'Consumido hoy'} <span class="sec-count">${consumedUnique.length}</span></div>

  // CIERRE: resumen rápido + cerrar día (es donde el usuario termina de registrar)
  const s=dayStats(day), G=goals(), g=G.values;
  const allNuts=['iron','vitC','vitA','dha','calcium','zinc','choline','iodine'];
  const probados=allNuts.filter(k=> (s[k]||0) > 0).length;   // con algún aporte ese día (consistente con el anillo)
  html+=`<div class="divider"></div>
    <div class="reg-finish">
      <div class="rf-sum">${day.entries.length} alimento${day.entries.length===1?'':'s'} hoy · ${probados}/${allNuts.length} nutrientes probados</div>

      ${day.entries.length>0?`<button class="btn ghost block move-day-btn" data-act="moveDay" style="margin-top:8px">Mover este día a otra fecha</button>`:''}
