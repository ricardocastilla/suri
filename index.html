/* ---------------- STORAGE (capa robusta para navegadores reales) -------
   Estrategia: IndexedDB como almacén principal (más confiable que
   localStorage en iOS), Cache API como respaldo paralelo, localStorage
   como último recurso. Cada `set` escribe a IndexedDB Y a Cache API.
   `get` intenta IndexedDB primero; si vacío, restaura desde Cache API.

   En entorno de Anthropic sandbox existe `window.storage` y lo respetamos.
   En navegadores reales (Safari iOS, Chrome, etc.), usamos la capa nueva.  */

const mem = {};

// --- IndexedDB wrapper minimalista ----------------------------------
const IDB_NAME = 'suri-db', IDB_STORE = 'kv', IDB_VER = 1;
let _idbPromise = null;
function _openIDB(){
  if(_idbPromise) return _idbPromise;
  _idbPromise = new Promise((resolve)=>{
    if(typeof indexedDB === 'undefined'){ resolve(null); return; }
    try{
      const req = indexedDB.open(IDB_NAME, IDB_VER);
      req.onupgradeneeded = ()=>{ req.result.createObjectStore(IDB_STORE); };
      req.onsuccess = ()=>resolve(req.result);
      req.onerror = ()=>resolve(null);
      // Safari iOS a veces se cuelga sin disparar onerror; timeout
      setTimeout(()=>resolve(null), 1500);
    }catch(e){ resolve(null); }
  });
  return _idbPromise;
}
async function _idbGet(k){
  const db = await _openIDB(); if(!db) return null;
  return new Promise(resolve=>{
    try{
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(k);
      req.onsuccess = ()=>resolve(req.result ?? null);
      req.onerror = ()=>resolve(null);
    }catch(e){ resolve(null); }
  });
}
async function _idbSet(k,v){
  const db = await _openIDB(); if(!db) return false;
  return new Promise(resolve=>{
    try{
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(v, k);
      tx.oncomplete = ()=>resolve(true);
      tx.onerror = ()=>resolve(false);
    }catch(e){ resolve(false); }
  });
}

// --- Cache API wrapper como respaldo paralelo -----------------------
async function _cacheSet(k,v){
  try{
    if(typeof caches === 'undefined') return false;
    const c = await caches.open('suri-data-v1');
    await c.put('/data/'+encodeURIComponent(k), new Response(v, {headers:{'Content-Type':'application/json'}}));
    return true;
  }catch(e){ return false; }
}
async function _cacheGet(k){
  try{
    if(typeof caches === 'undefined') return null;
    const c = await caches.open('suri-data-v1');
    const r = await c.match('/data/'+encodeURIComponent(k));
    return r ? await r.text() : null;
  }catch(e){ return null; }
}

// --- localStorage como tercer respaldo ------------------------------
function _lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function _lsSet(k,v){ try{ localStorage.setItem(k,v); return true; }catch(e){ return false; } }

// --- API pública ----------------------------------------------------
// Si la capa sandbox (window.storage de Anthropic) está, la usamos.
// Si no, usamos la pila IDB + Cache + LS.
async function sget(k){
  if(mem._loaded && k in mem) return mem[k]; // cache en RAM tras primera carga
  // Anthropic sandbox
  if(window.storage && typeof window.storage.get === 'function'){
    try{ const r = await window.storage.get(k); const v = r?JSON.parse(r.value):null;
      if(v!==null) mem[k]=v; return v; }catch(e){}
  }
  // 1) IndexedDB
  let raw = await _idbGet(k);
  // 2) Cache API si IDB vacío
  if(raw==null){ raw = await _cacheGet(k); if(raw!=null){ await _idbSet(k, raw); /* re-hidratar IDB */ } }
  // 3) localStorage si todo lo anterior falla
  if(raw==null){ raw = _lsGet(k); if(raw!=null){ await _idbSet(k, raw); await _cacheSet(k, raw); } }
  if(raw==null) return null;
  try{ const v = JSON.parse(raw); mem[k]=v; return v; }catch(e){ return null; }
}
async function sset(k,v){
  mem[k]=v;
  const raw = JSON.stringify(v);
  // escribir a TODOS los almacenes en paralelo — máxima resistencia
  if(window.storage && typeof window.storage.set === 'function'){
    try{ await window.storage.set(k, raw); }catch(e){}
  }
  await Promise.all([ _idbSet(k, raw), _cacheSet(k, raw) ]);
  _lsSet(k, raw); // sincrónico, no esperamos
  state._lastSaveAt = Date.now();
}

/* ---------------- ESTADO ------------------------------------------- */
let state = { tab:'hoy', profile:null, settings:null, days:null,
              babies:[], activeId:null,
              ready:false, sheet:null, recoveryDate:null, historyDate:null, toast:null };

/* MULTI-BEBÉ: app:babies = [{id, profile, days}]; app:activeBaby = id.
   state.profile/state.days son ALIAS en vivo del bebé activo, así el resto del
   código (cientos de referencias) no cambia. settings es global (compartido). */
function _bindActiveBaby(){
  const b = (state.babies||[]).find(x=>x.id===state.activeId);
  state.profile = b ? b.profile : null;
  state.days    = b ? b.days : {};
}
function _nextBabyId(){ return (Math.max(0, ...(state.babies||[]).map(x=>x.id)) || 0) + 1; }
// Sincroniza los alias hacia el objeto del bebé activo antes de persistir (cubre el
// caso de onboarding/edición que REASIGNA state.profile a un objeto nuevo).
function _syncActive(){
  if(!state.profile) return;
  state.babies = state.babies || [];
  let b = state.babies.find(x=>x.id===state.activeId);
  if(!b){ const id = (state.activeId!=null) ? state.activeId : _nextBabyId();
    b={id, profile:state.profile, days:state.days||{}}; state.babies.push(b);
    state.activeId=id; sset('app:activeBaby', id); }
  b.profile = state.profile; b.days = state.days||{};
}
async function loadAll(){
  state.settings = await sget('app:settings') || { closeHour:22, reminderDays:2, endOfDayReminder:true, daysReminder:true };
  let babies = await sget('app:babies');
  if(!babies){
    // Migración desde el modelo de perfil único.
    const p = await sget('app:profile');
    const d = await sget('app:days') || {};
    babies = p ? [{id:1, profile:p, days:d}] : [];
    if(p) await sset('app:babies', babies);
  }
  state.babies = babies;
  let active = await sget('app:activeBaby');
  if(active==null || !babies.find(b=>b.id===active)) active = babies[0]?.id ?? null;
  state.activeId = active;
  _bindActiveBaby();
  state.ready = true;
}
const saveProfile  = ()=>{ _syncActive(); return sset('app:babies', state.babies); };
const saveDays     = ()=>{ _syncActive(); return sset('app:babies', state.babies); };
const saveSettings = ()=>sset('app:settings', state.settings);

/* ---------------- FECHAS / EDAD ------------------------------------ */
function dstr(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function todayStr(){ return dstr(new Date()); }
function addDays(str,n){ const d=new Date(str+'T12:00:00'); d.setDate(d.getDate()+n); return dstr(d); }
function ageMonths(){
  if(!state.profile?.birth) return 6;
  const b=new Date(state.profile.birth+'T12:00:00'), n=new Date();
  let m=(n.getFullYear()-b.getFullYear())*12+(n.getMonth()-b.getMonth());
  if(n.getDate()<b.getDate()) m--;
  return Math.max(0,m);
}
// Edad efectiva SOLO para elegibilidad por edad: si el padre activó el inicio temprano
// (con visto bueno del pediatra) y el bebé tiene <6m, tratamos como 6m para no marcar
// "6m+" en cada alimento básico. Los de 12m+ (leche de vaca, fórmula crecimiento) siguen restringidos.
function effAgeMonths(){ const m=ageMonths(); return (state.profile?.allowEarly && m<6) ? 6 : m; }
function bandKey(){ const m=ageMonths(); return m<9?'6-8':(m<12?'9-11':(m<24?'12-24':'24-36')); }
function band(){ return D.bands[bandKey()]; }
function groupGoal(){ return state.profile?.groupGoal || band().groupsGoal; }

/* ============================================================
   METAS NUTRICIONALES — único lugar de la verdad, fácil de ajustar.
   Base por banda de edad, MODULADA por tipo de lactancia.
   Fundamento: OMS 2023 (animal y fruta/verdura a diario; pescado y
   legumbres frecuente) + evidencia pediátrica sobre el aporte de
   leche materna/fórmula. Los números exactos son una operacionalización
   razonable, NO cifras textuales de la OMS → validar con pediatra.
   ============================================================ */
function feeding(){ return (state.profile?.feeding||'Ninguna'); }
/* Minúsculas respetando convención: nombres de vitaminas mantienen
   la letra (A, C, K, D) en mayúscula. "Vitamina A" → "vitamina A". */
function lcName(s){
  if(!s) return '';
  let out = s.toLowerCase();
  // Re-capitalizar la letra de vitaminas: "vitamina a/b/c/d/e/k" + posible " / DHA"
  out = out.replace(/\bvitamina ([a-k])\b/g, (_,l)=>'vitamina '+l.toUpperCase());
  // Omega-3 / DHA (caso especial)
  out = out.replace(/omega-3 \/ dha/g, 'omega-3 / DHA');
  return out;
}
/* multiplicadores cualitativos por nutriente según de dónde viene el aporte lácteo */
function goals(){
  const bk=bandKey();
  // metas BASE por edad (frecuencias). iron y vitC son DIARIAS; resto SEMANAL.
  const BASE={
    '6-8':  { iron:2, vitC:1, vitA:4, calcium:3, zinc:4, dha:2, choline:3, iodine:3 },
    '9-11': { iron:2, vitC:1, vitA:5, calcium:4, zinc:5, dha:2, choline:4, iodine:4 },
    '12-24':{ iron:2, vitC:1, vitA:5, calcium:5, zinc:5, dha:3, choline:5, iodine:5 },
    // 24-36m comparte el tramo RDA 1-3 años con 12-24: mismas metas nutricionales.
    '24-36':{ iron:2, vitC:1, vitA:5, calcium:5, zinc:5, dha:3, choline:5, iodine:5 },
  }[bk];
  const scope={ iron:'día', vitC:'día', vitA:'semana', calcium:'semana', zinc:'semana', dha:'semana', choline:'semana', iodine:'semana' };
  const g=Object.assign({}, BASE);
  const f=feeding();

  // La META es la necesidad por edad y NO cambia por dar fórmula: la fórmula aporta
  // a través de las TOMAS que se registran (suma a los 8 nutrientes, igual que cualquier
  // alimento). Antes bajábamos la meta de hierro/calcio para quien daba fórmula; eso
  // causaba doble conteo y una meta "ajustada" invisible. Ahora la meta es la misma para
  // materna / fórmula / mixta.
  // Único ajuste, AL ALZA: si el bebé ya no toma leche (Ninguna), la comida debe cubrir
  // lo que antes aportaba la leche.
  if(f==='Ninguna'){ g.calcium=g.calcium+1; g.vitA=g.vitA+1; g.dha=g.dha+1; g.choline=g.choline+1; g.iodine=g.iodine+1; }

  return { values:g, scope, base:BASE, feeding:f };
}
/* nota explicativa de por qué una meta cambió por lactancia (para mostrar al usuario) */
function feedingNote(key){
  const f=feeding();
  if(f!=='Ninguna') return '';
  if(key==='calcium'||key==='vitA'||key==='dha'||key==='choline'||key==='iodine') return 'Ajustado al alza: ya no toma leche.';
  return '';
}

/* Suplementos: SOLO contexto. Nunca rellenan la barra (la app mide comida). */
function suppForNutrient(key){
  return (state.profile?.supplements||[]).includes(key);
}

/* ---------------- FILTRO POR EDAD + ALERGIAS -----------------------
   Filosofía: la app advierte, los padres deciden. Bloqueamos del registro
   SOLO lo que el usuario marcó como "evitar" (decisión explícita suya) y
   los riesgos médicos reales por edad (miel y leche entera antes de 12m).
   El resto se muestra siempre, con advertencia visible si corresponde.   */
function avoidSet(){ return new Set((state.profile?.allergies||[]).filter(a=>a.s==='evitar').map(a=>a.a)); }
function introducedSet(){ return new Set((state.profile?.allergies||[]).filter(a=>a.s==='intro'||a.s==='probando').map(a=>a.a)); }

/* PRIMERA EXPOSICIÓN: cuando se registra por primera vez un alimento con
   alérgeno mayor, la app guía suavemente y aprende. No pide configurar todo. */
function allergenFirstSeen(allergen, excludeToday){
  const t=todayStr();
  for(const ds in state.days){ if(excludeToday && ds===t) continue;
    const d=state.days[ds]; if(!d) continue;
    if(entryAllergens(d).has(allergen)) return false;
  }
  return true;
}
function alergStatus(a){ const all=state.profile?.allergies||[]; return all.find(x=>x.a===a)?.s || null; }
function setAlergStatus(a,s){
  state.profile=state.profile||{}; state.profile.allergies=state.profile.allergies||[];
  const arr=state.profile.allergies, i=arr.findIndex(x=>x.a===a);
  if(s===null){ if(i>=0) arr.splice(i,1); }
  else if(i>=0){ arr[i].s=s; if(s==='probando') arr[i].firstSeen=Date.now(); }
  else arr.push({a, s, firstSeen: s==='probando'?Date.now():null});
  saveProfile();
}
/* Auto-promoción a "introducido" tras 48h sin reportar reacción */
function autoIntroduceAllergens(){
  const all=state.profile?.allergies||[]; const now=Date.now(), DAY=24*3600*1000;
  let changed=false;
  all.forEach(x=>{ if(x.s==='probando' && x.firstSeen && (now-x.firstSeen)>=2*DAY){ x.s='intro'; changed=true; } });
  if(changed) saveProfile();
}
// Normaliza texto para búsquedas (minúsculas, sin acentos). Global para que
// la usen tanto los buscadores como renderCatResults (antes fallaba ahí).
function norm(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function eligibleFoods(){
  const m=ageMonths(), av=avoidSet();
  const avoidF=new Set(state.profile?.avoidFoods||[]);
  return D.foods.filter(f=>{
    // Bloqueos duros (riesgo médico real): miel y leche entera antes de 12m
    if(m<12 && /^Leche entera de vaca/i.test(f.name)) return false;
    if(m<12 && /^Miel/i.test(f.name)) return false;
    // Decisión explícita del usuario
    if(f.allergens.some(a=>av.has(a))) return false;
    if(avoidF.has(f.id)) return false;
    return true; // todo lo demás aparece; warnings se muestran en el chip
  });
}
/* Devuelve advertencia visible para alimento que debe registrarse con cuidado. */
function foodWarning(f){
  const m=effAgeMonths();
  if((state.profile?.reactions||[]).includes(f.id)) return { kind:'reaction', txt:'Hubo una reacción antes — coméntalo con tu pediatra' };
  if(f.minMonths>m) return { kind:'age', txt:`Se introduce desde los ${f.minMonths} meses` };
  // El aviso de "alérgeno" para CADA alimento generaba ruido visual: casi todos los lácteos,
  // legumbres y frutos secos lo mostraban. Los alérgenos se gestionan en el perfil (evitar/introducido).
  if(/asfixia/i.test(f.notes||'') && m<12) return { kind:'choke', txt:'Cuidado con la textura: riesgo de asfixia' };
  return null;
}

/* ---------------- DÍA / ENTRADAS ----------------------------------- */
function ensureDay(str){
  if(!state.days[str]) state.days[str]={ date:str, entries:[], others:{}, closed:false, closedAt:null, objective:null };
  if(!state.days[str].others) state.days[str].others={};
  return state.days[str];
}
function countFood(day,id){ return day.entries.filter(e=>e.foodId===id).length; }
function hasFood(day,id){ return day.entries.some(e=>e.foodId===id); }
function foodCount(day,id){ return day.entries.filter(e=>e.foodId===id).length; }
function addEntry(day,id,approx){ day.entries.push({foodId:id, ts:Date.now(), approx:!!approx}); saveDays(); }
function removeEntry(day,id){ const i=day.entries.map(e=>e.foodId).lastIndexOf(id); if(i>=0){ day.entries.splice(i,1); saveDays(); } }
/* TOGGLE puro: un alimento está "dado o no" en el día. */
function toggleFood(day,id,approx){ hasFood(day,id)? removeEntry(day,id) : addEntry(day,id,approx); }
function formulaFoodId(){ return ageMonths()>=12 ? 108 : 107; }
/* FÓRMULA AUTOMÁTICA: si el padre fijó "tomas al día" (profile.formulaPerDay), sembramos
   esas tomas REALES en el día — una sola vez por día (flag formulaSeeded), solo de hoy en
   adelante (>= formulaSince) y solo si ese día no tiene fórmula ya registrada. Luego el
   padre ajusta el día con −/＋ (entradas reales). No reescribe el historial previo. */
function seedFormula(str){
  const n = state.profile && state.profile.formulaPerDay;
  if(!n || n<1) return;
  const since = state.profile.formulaSince;
  if(since && str < since) return;
  const day = ensureDay(str);
  if(day.formulaSeeded) return;
  const hasFormula = day.entries.some(e=> e.foodId===107 || e.foodId===108);
  if(!hasFormula){ const fid=formulaFoodId(); for(let i=0;i<n;i++) day.entries.push({foodId:fid, ts:Date.now()+i}); }
  day.formulaSeeded = true;
  saveDays();
}
/* Créditos "otros": nutriente de un alimento fuera de los 100. */
function otherCount(day,nut){ return day.others?.[nut]||0; }
function addOther(day,nut){ day.others[nut]=(day.others[nut]||0)+1; saveDays(); }
function subOther(day,nut){ day.others[nut]=Math.max(0,(day.others[nut]||0)-1); saveDays(); }

/* ---------------- PREFERENCIAS (aceptado / rechazado) --------------
   Dato clave para el recomendador: ¿le gustó? Se guarda en el perfil. */
function foodPref(id){ return (state.profile?.prefs||{})[id]||null; }   // 'like' | 'dislike' | null
function setPref(id,val){
  if(!state.profile) return;
  state.profile.prefs=state.profile.prefs||{};
  if(foodPref(id)===val) delete state.profile.prefs[id]; // re-toque quita
  else state.profile.prefs[id]=val;
  saveProfile();
}
function likedFoods(){ const p=state.profile?.prefs||{}; return Object.keys(p).filter(id=>p[id]==='like').map(Number); }
function dislikedSet(){ const p=state.profile?.prefs||{}; return new Set(Object.keys(p).filter(id=>p[id]==='dislike').map(Number)); }
// "Reintentar": lista de alimentos que el cuidador quiere volver a ofrecer (independiente
// de si le gustó o no). Muchos bebés necesitan 8–15 exposiciones para aceptar un sabor.
function retrySet(){ return new Set((state.profile?.retry||[]).map(Number)); }
function toggleRetry(id){ if(!state.profile) return;
  const set=new Set((state.profile.retry||[]).map(Number));
  if(set.has(id)) set.delete(id); else set.add(id);
  state.profile.retry=[...set]; saveProfile();
}

/* Frecuentes: alimentos más registrados en los últimos 30 días. */
// Día previo con registro (ignora fórmula, que se auto-siembra) para "Repetir ayer".
function lastLoggedBefore(ds){
  const ks=Object.keys(state.days).filter(k=> k<ds && (state.days[k].entries||[]).some(e=>e.foodId!==107&&e.foodId!==108)).sort();
  return ks.length?ks[ks.length-1]:null;
}
function frequentFoods(limit){
  const cnt={}; const since=addDays(todayStr(),-30);
  for(const ds in state.days){ if(ds<since) continue;
    state.days[ds].entries.forEach(e=>{ cnt[e.foodId]=(cnt[e.foodId]||0)+1; }); }
  const elig=new Set(eligibleFoods().map(f=>f.id));
  return Object.entries(cnt).filter(([id])=>elig.has(+id))
    .sort((a,b)=>b[1]-a[1]).slice(0,limit||8).map(([id])=>+id);
}

/* Puntos de aporte: Alto=1, Medio=0.5. Recupera ~50 alimentos que
   antes (solo-Alto) quedaban invisibles. */
const PTS={A:1, M:0.5};
// Cortes "Alto" por nutriente (de la metodología). Convierten mg/porción → puntos continuos:
// un alimento en el corte Alto = 1 punto (como A); en el corte Medio ≈ 0.5 (como M); y los
// aportes pequeños suman fracciones, de modo que varios alimentos "bajos" sí marcan avance.
const ALTO={iron:1.5, vitC:15, vitA:150, dha:100, calcium:80, zinc:1.0, choline:50, iodine:30};
// Aporte estimado por porción (mg/µg, fuentes USDA/NIH/EFSA, mismas porciones de la metodología).
// Si un alimento NO está aquí para un nutriente, se usa su bandera A/M/null (sin cambios).
// Fase 1 — VITAMINA C y Fase 2 — HIERRO, en alimentos que la bandera marcaba "null"
// pero sí aportan algo (hierro total por porción, consistente con la escala del audit):
const MG={
  vitC:{ 51:3.4, 54:3, 55:4.5, 62:3.3, 66:2.3, 67:2.2, 68:4.4, 69:5.4, 70:4.8, 71:1.4, 72:3.9, 73:6, 74:2.5, 75:2.8, 76:1, 78:4, 79:4.9, 80:5.1, 82:1.1, 85:1, 101:1.9, 109:5, 113:4.5 },
  iron:{ 2:0.27, 9:0.2, 11:0.2, 14:0.46, 40:0.35, 41:0.2, 43:0.2, 45:0.35, 49:0.2, 53:0.3, 55:0.4, 59:0.35, 92:0.2, 96:0.28, 103:0.4, 113:0.3 },
  // Fase 3 — VITAMINA A (µg RAE/porción): provit. A de frutas/verduras y vit. A de lácteos
  // enteros que la bandera dejaba en null pero aportan de forma medible.
  vitA:{ 33:22, 34:30, 35:25, 59:30, 60:27, 64:21, 65:23, 73:17, 75:19, 78:14, 89:17, 91:15, 110:20 },
  // Fase 4 — OMEGA-3 (DHA): SIN adiciones a propósito. La DHA preformada solo está en
  // pescado graso, huevo y fortificados (ya marcados con bandera). Las semillas (chía,
  // linaza, nuez) aportan ALA, NO DHA — no se les acredita DHA (principio del audit).
  dha:{},
  // Fase 5 — CALCIO (mg/porción): legumbres, semillas, verduras de hoja/crucíferas,
  // tortilla nixtamalizada, quesos frescos y cítricos con calcio relevante.
  calcium:{ 13:25, 14:20, 15:8, 16:11, 17:18, 18:20, 19:14, 22:7, 24:15, 27:38, 28:10, 29:25, 31:15, 45:32, 47:7, 48:19, 53:12, 54:16, 58:25, 59:23, 73:18, 74:8, 75:12, 77:20, 83:20, 84:15, 85:17, 88:20, 89:18, 90:17, 91:9, 92:11, 102:21, 111:7, 112:30 },
  // Fase 6 — ZINC (mg/porción): granos integrales, pseudocereales, pescados magros,
  // crucíferas y hojas; el zinc vegetal es modesto pero suma entre varios.
  zinc:{ 7:0.11, 9:0.2, 10:0.14, 11:0.27, 35:0.32, 40:0.36, 41:0.2, 42:0.4, 43:0.2, 44:0.6, 45:0.2, 48:0.34, 49:0.12, 51:0.24, 53:0.12, 54:0.12, 57:0.26, 58:0.18, 59:0.2, 73:0.12, 75:0.27, 92:0.13, 96:0.19 },
  // Fase 7 — COLINA (mg/porción): pavo, tofu/legumbres, crucíferas/hojas, lácteos,
  // semillas y granos. El huevo (la mayor fuente) ya va por bandera.
  choline:{ 21:11, 22:9, 24:6, 26:12, 27:12, 30:11, 31:12, 33:12, 34:12, 35:14, 37:13, 40:8, 47:9, 51:9, 57:9, 58:9, 110:12, 111:9 },
  // Fase 8 — YODO (µg/porción): mínimo a propósito. Las fuentes fiables (leche, yogur,
  // huevo, pescado blanco, sal yodada) ya van por bandera; en vegetales el yodo es muy
  // variable según suelo, así que solo se acreditan quesos frescos (aporte estable).
  iodine:{ 34:12, 35:20, 110:12 }
};
function foodPts(f,n){
  const v = MG[n] && MG[n][f.id];
  if(v!=null) return Math.min(2, v/ALTO[n]);   // aporte continuo por mg (cap 2 pts/alimento)
  return PTS[f.flags[n]]||0;                    // respaldo: bandera A/M/null
}
/* -------- ALIMENTOS/SUPLEMENTOS PERSONALIZADOS ("definidos por ti") -------
   profile.customItems[]: {id (negativo), name, emoji, flags:{8 nutrientes A/M/null},
   daily, dailySince}. A diferencia de un pouch (que expande a alimentos reales del
   catálogo), un ítem personalizado es UNA cosa con sus propias banderas. Lo define el
   padre, por eso lleva nota de validar suplementos con el pediatra. */
const customItem = (id) => (state.profile?.customItems||[]).find(x=>x.id===id) || null;
// Convierte un ítem personalizado en un "alimento" sintético compatible con foodPts/dayStats.
function customAsFood(c){
  return { id:c.id, name:c.name, emoji:c.emoji||'🥄', group:'custom',
           flags:c.flags||{}, allergens:[], isLiver:false, _custom:true };
}
// Devuelve los alimentos "efectivos" del día, expandiendo pouches a sus ingredientes
// y resolviendo ítems personalizados. Un id negativo es un pouch O un ítem personalizado;
// se busca primero en pouches y luego en customItems (listas con ids únicos).
function expandedFoods(day){
  const out=[];
  const pouches=state.profile?.pouches||[];
  day.entries.forEach(e=>{
    if(e.foodId<0){
      const p=pouches.find(x=>x.id===e.foodId);
      if(p){ p.ingredients.forEach(fid=>{ const f=FOOD[fid]; if(f) out.push(f); }); }
      else { const c=customItem(e.foodId); if(c) out.push(customAsFood(c)); }
    } else {
      const f=FOOD[e.foodId]; if(f) out.push(f);
    }
  });
  return out;
}
/* Siembra ítems personalizados marcados como "diario" (mismo patrón que seedFormula):
   una entrada por día, una sola vez (flag por-ítem en day.customSeeded), solo desde la
   fecha en que se marcó como diario (dailySince) hacia adelante. No reescribe historial y
   respeta si el padre quita la entrada de un día concreto. */
function seedCustom(str){
  const items=(state.profile?.customItems||[]).filter(c=>c.daily);
  if(!items.length) return;
  const day=ensureDay(str);
  day.customSeeded = day.customSeeded||[];
  let changed=false;
  for(const c of items){
    if(c.dailySince && str < c.dailySince) continue;
    if(day.customSeeded.includes(c.id)) continue;
    if(!day.entries.some(e=>e.foodId===c.id)) day.entries.push({foodId:c.id, ts:Date.now()});
    day.customSeeded.push(c.id); changed=true;
  }
  if(changed) saveDays();
}
/* Alérgenos presentes en un día, expandiendo comidas (pouches) a sus ingredientes.
   Los ítems personalizados no tienen alérgenos (por diseño). Reutiliza expandedFoods. */
function entryAllergens(day){
  const set=new Set();
  expandedFoods(day).forEach(f=>(f.allergens||[]).forEach(a=>set.add(a)));
  return set;
}
function dayStats(day){
  const fs=expandedFoods(day);
  // Los ítems personalizados aportan nutrientes pero NO cuentan como grupo de diversidad.
  const groups=new Set(fs.filter(f=>f.group!=='custom').map(f=>f.group));
  const o=day.others||{};
  const rich=(n)=> fs.reduce((s,f)=>s+foodPts(f,n),0) + (o[n]||0);
  return {
    groups, nGroups:groups.size,
    iron:rich('iron'), vitC:rich('vitC'), zinc:rich('zinc'),
    vitA:rich('vitA'), dha:rich('dha'), calcium:rich('calcium'),
    choline:rich('choline'), iodine:rich('iodine'),
    fruitVeg: fs.some(f=>['fvA','fvC','otras'].includes(f.group)),
    fat: fs.some(f=>f.group==='grasas'),
    liver: fs.filter(f=>f.isLiver).length,
    nitrate: fs.filter(f=>f.highNitrate).length,
    n: fs.length
  };
}
function weekStats(endStr){
  const acc={iron:0,vitC:0,zinc:0,vitA:0,dha:0,calcium:0,choline:0,iodine:0,liver:0,nitrate:0}; const algs=new Set(); let daysWith=0;
  for(let i=0;i<7;i++){ const ds=addDays(endStr,-i), day=state.days[ds];
    if(day && day.entries.length){ daysWith++; const s=dayStats(day);
      for(const k in acc) if(k in s) acc[k]+=s[k];
      entryAllergens(day).forEach(a=>algs.add(a));
    }
  }
  return {...acc, allergens:algs, daysWith};
}

/* Sin datos NO es hueco. Hierro #1 (siempre con vit C). La semana
   diagnostica, el día sugiere UN solo foco + alimentos accionables. */
function pickFoods(filterFn, n, exclude){
  const ex=new Set(exclude||[]); const pool=eligibleFoods().filter(filterFn).filter(f=>!ex.has(f.id));
  const out=[], seen=new Set();
  for(const f of pool){ if(!seen.has(f.group)){ out.push(f); seen.add(f.group); } if(out.length>=n) break; }
  for(const f of pool){ if(out.length>=n) break; if(!out.includes(f)) out.push(f); }
  return out.map(f=>f.id);
}
/* alimentos que aportan un nutriente (Alto primero, luego Medio) */
function foodsWithNutrient(key){
  const elig=eligibleFoods();
  const high=elig.filter(f=>f.flags[key]==='A');
  const med=elig.filter(f=>f.flags[key]==='M');
  return {high, med, all:[...high,...med]};
}
function computeObjective(dateStr){
  const G=goals(), g=G.values;

  const ts = todayHas ? dayStats(today) : null;
  const yStr=addDays(dateStr,-1), y=state.days[yStr];
  const yHas = y && y.entries.length>0;
  const ys = yHas ? dayStats(y) : null;
  // Semana hasta HOY (incluye lo que ya se registró hoy)
  const wk = weekStats(dateStr);

  // 0) Sin nada registrado ni ayer ni hoy → arrancar
  if(!yHas && !todayHas){
    return { tag:'Empecemos', title:'Arranca el día', focusNut:'iron',
      msg:'Registra lo que pruebe hoy y afinaré tus metas. Un buen comienzo: un alimento rico en hierro junto a algo con vitamina C.' };
  }

  // 1) HIERRO HOY — si aún no se cubrió la meta diaria de hierro
  if(!ts || ts.iron < g.iron){
    let yieldStr='';
    if(ts){ const r=ts.iron/g.iron;
      yieldStr = r>=0.66 ? 'Ya casi cubres el hierro de hoy.' : (r>=0.33 ? 'Vas por buen camino con el hierro de hoy.' : (ts.iron>0 ? 'Ya diste algo de hierro hoy.' : ''));
    } else if(yHas && ys.iron<g.iron){ yieldStr='Ayer el hierro quedó algo corto.'; }
    return { tag:'El foco de hoy', title:'Démosle hierro hoy', focusNut:'iron',
      msg:`${yieldStr} Acompáñalo con algo rico en vitamina C: se absorbe mucho mejor.`.trim() };
  }
  // 2) Hierro presente HOY pero sin vit C
  if(ts && ts.iron>=g.iron && ts.vitC < g.vitC){
    return { tag:'El foco de hoy', title:'Suma vitamina C', focusNut:'vitC',
      msg:`Ya hay hierro hoy. Súmale algo con vitamina C — una fruta cítrica, kiwi, fresa o pimiento — para que se absorba mejor.` };
  }
  // 3) Nutrientes semanales pendientes — solo si hay déficit REAL considerando hoy
  const weekly=[
    {k:'dha', title:'Esta semana, omega-3', msg:'Aún falta omega-3 esta semana. Pescado, chía o linaza son ideales para su desarrollo cerebral.'},
    {k:'vitA', title:'Color naranja y verde', msg:'Falta vitamina A esta semana. Camote, zanahoria, mango o espinaca ayudan a su vista e inmunidad.'},
    {k:'calcium', title:'Un poco de calcio', msg:'El calcio va algo bajo esta semana. Yogur, queso o tofu apoyan sus huesitos.'},
    {k:'zinc', title:'Sumemos zinc', msg:'El zinc va corto esta semana. Carnes, legumbres y semillas lo aportan bien.'},
    {k:'choline', title:'Memoria y cerebro', msg:'Falta colina esta semana. Yema de huevo o hígado son sus mejores fuentes.'},
    {k:'iodine', title:'Yodo esta semana', msg:'Falta yodo esta semana. Pescado de mar, lácteos o huevo lo aportan.'},
  ].map(w=>({...w, deficit:(g[w.k]||0)-(wk[w.k]||0)})).filter(w=>w.deficit>0)
   .sort((a,b)=>b.deficit-a.deficit);
  if(weekly.length){ const w=weekly[0];
    return { tag:'El foco de hoy', title:w.title, msg:w.msg, focusNut:w.k };
  }
  // 4) Todo cubierto -> reforzar
  return { tag:'¡Vas muy bien!', title:'Mantén el ritmo', focusNut:null,
    msg:`${state.profile.name} viene cubriendo sus nutrientes clave. Hoy basta con mantener el ritmo.` };
}

/* ---------------- RECOMENDADOR INTELIGENTE -------------------------
   "Qué ofrecer hoy" para un nutriente: puntúa cada alimento elegible por
   nivel de aporte + preferencias del bebé + practicidad + seguridad.   */
function recommendFor(nutKey, n){
  const elig=eligibleFoods();              // ya filtra edad, alergias, alimentos vetados
  const liked=new Set(likedFoods());
  const disliked=dislikedSet();
  const freq=new Set(frequentFoods(12));
  const m=ageMonths();
  const scored=elig
    .filter(f=>f.flags[nutKey]==='A'||f.flags[nutKey]==='M')
    .map(f=>{
      let sc=0;
      sc += f.flags[nutKey]==='A' ? 10 : 5;          // nivel de aporte
      if(liked.has(f.id)) sc += 6;                   // le gusta → arriba
      if(disliked.has(f.id)) sc -= 8;                // lo rechazó → al fondo
      if(freq.has(f.id)) sc += 2;                    // practicidad (ya lo usa)
      if(/asfixia/i.test(f.notes) && m<9) sc -= 3;   // precaución textura en los más chicos
      return {f, sc};
    })
    .sort((a,b)=>b.sc-a.sc);
  return scored.slice(0, n||6).map(x=>x.f);
}

/* Devuelve un tip apropiado para el nutriente. Combina:
   - Si tiene favoritos que aportan este nutriente: mensaje contextual del bebé.
   - Si no: un dato factual de la lista NUT_TIPS, rotando por sesión.
   La rotación usa __sessionSeed para que cambie entre sesiones pero sea estable dentro de la misma. */
function favoriteTip(nutKey){
  const liked = likedFoods().map(id=>FOOD[id]).filter(Boolean);
  const aportan = liked.filter(f=>f.flags[nutKey]==='A'||f.flags[nutKey]==='M');
  const factuales = NUT_TIPS[nutKey] || [];
  // Construir pool: si hay favoritos relevantes, añadir 1-2 contextuales; siempre incluir los factuales.
  const pool = [...factuales];
  if(aportan.length){
    const f = aportan[(__sessionSeed + nutKey.charCodeAt(0)) % aportan.length];
    const nm = f.name.split('(')[0].trim().toLowerCase();
    const alto = f.flags[nutKey]==='A';
    pool.push(alto
      ? `💚 Tienes <b>${nm}</b> entre sus favoritos — buena fuente de este nutriente.`
      : `💚 Le gusta <b>${nm}</b>: aporta algo de este nutriente sin esfuerzo.`);
  }
  if(!pool.length) return null;
  // Selección estable dentro de la sesión, varía por nutriente
  const idx = (__sessionSeed + nutKey.charCodeAt(0)*13) % pool.length;
  return pool[idx];
}
// Semilla por sesión: se genera una vez al cargar la app; al recargar cambia.
const __sessionSeed = Math.floor(Math.random()*100000);

/* ---------------- CICLO DEL DÍA ------------------------------------ */
function lifecycle(){
  // Se retiró el "cierre" de días (manual y automático): los datos se actualizan
  // en tiempo real y todo día es editable, así que cerrar no aportaba nada.
  autoIntroduceAllergens();  // promueve 'probando' → 'intro' tras 48h sin reacción
  saveDays();
}
function hasEverLogged(){
  for(const ds in state.days){ if(state.days[ds].entries && state.days[ds].entries.length) return true; }
  return false;
}
function reminderNeeded(){
  // Nunca para un usuario nuevo: solo si ALGUNA vez registró y hoy lleva
  // 2 días previos vacíos (y hoy aún sin nada).
  if(state.settings.daysReminder===false) return false;
  if(!hasEverLogged()) return false;
  const t=todayStr();
  const today=state.days[t];
  if(today && today.entries.length) return false;
  const y1=state.days[addDays(t,-1)], y2=state.days[addDays(t,-2)];
  const empty=d=>!d||d.entries.length===0;
  return empty(y1)&&empty(y2);
}
// Aviso suave al final del día: cerca de closeHour, si parece que quedó algo
// sin anotar (registros de hoy < mínimo de comidas de la banda). Tono no-alarmista
// y enfocado en REGISTRAR (no implica que el bebé no comió: "sin dato ≠ no consumido").
function mealReminderNeeded(){
  if(state.settings.endOfDayReminder===false) return false;
  if(!state.profile) return false;
  if(ageMonths()<6 && !state.profile.allowEarly) return false;
  if(!hasEverLogged()) return false;            // no presionar a quien aún no empieza
  const close=state.settings.closeHour??22;
  if(new Date().getHours()<close) return false; // solo al acercarse el cierre
  const t=todayStr(), day=state.days[t];
  const meals=day?day.entries.length:0;
  const minMeals=parseInt(String(band().meals||'2').split('-')[0],10)||2;
  return meals<minMeals;
}

function toast(msg, ms){
  // Mostrar/ocultar el toast SIN render() completo: reconstruir el DOM (incluido
  // el <input> del buscador) mientras el usuario escribe le roba el foco y, en iOS,
  // cierra el teclado a media palabra. Inyectamos/actualizamos el nodo directamente.
  state.toast=msg;
  const app=document.getElementById('app');
  if(app){
    let t=document.getElementById('suri-toast');
    if(!t){ t=document.createElement('div'); t.id='suri-toast'; t.className='toast'; app.appendChild(t); }
    else { t.style.animation='none'; void t.offsetWidth; t.style.animation='up .25s'; }

  }

}

/* ---------------- COMPONENTES VISUALES ----------------------------- */
const NUT_COLOR={ iron:'#C77E63', vitC:'#E0922E', vitA:'#D99A3F', dha:'#6E938A', calcium:'#9A7B43', zinc:'#52716A', choline:'#B07A9C', iodine:'#5B8AA6' };
const NUT_SHORT={ iron:'Hierro', vitC:'Vit C', vitA:'Vit A', dha:'Omega-3', calcium:'Calcio', zinc:'Zinc', choline:'Colina', iodine:'Yodo' };
function _polar(cx,cy,r,deg){ const a=deg*Math.PI/180; return [cx+r*Math.cos(a), cy+r*Math.sin(a)]; }
function _arc(cx,cy,r,startDeg,endDeg){
  if(endDeg<=startDeg) return '';
  const [x1,y1]=_polar(cx,cy,r,startDeg), [x2,y2]=_polar(cx,cy,r,endDeg);
  const large=(endDeg-startDeg)>180?1:0;
  return `M ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)}`;
}
// Sector anular RELLENO con extremos rectos (perpendiculares al radio) y esquinas
// redondeadas (radio cr). Reemplaza al trazo con linecap "round" (efecto salchicha).
function _roundedSector(cx,cy,ri,ro,a0,a1,cr){
  const span=a1-a0; if(span<=0) return '';
  const rad=Math.PI/180, f=n=>n.toFixed(2), P=(r,a)=>_polar(cx,cy,r,a);
  cr=Math.min(cr,(ro-ri)/2-0.2,(span*rad*ri)/2-0.2);
  if(cr<0.4){ // espacio insuficiente: extremos rectos sin redondeo
    const A=P(ro,a0),B=P(ro,a1),E=P(ri,a1),F=P(ri,a0);
    return `M ${f(A[0])} ${f(A[1])} A ${ro} ${ro} 0 0 1 ${f(B[0])} ${f(B[1])} L ${f(E[0])} ${f(E[1])} A ${ri} ${ri} 0 0 0 ${f(F[0])} ${f(F[1])} Z`;
  }
  const dO=cr/ro/rad, dI=cr/ri/rad;
  const A=P(ro,a0+dO), B=P(ro,a1-dO), cB=P(ro,a1), C=P(ro-cr,a1),
        D=P(ri+cr,a1), cD=P(ri,a1), E=P(ri,a1-dI),
        Fp=P(ri,a0+dI), cF=P(ri,a0), G=P(ri+cr,a0),
        Hh=P(ro-cr,a0), cH=P(ro,a0);
  return `M ${f(A[0])} ${f(A[1])} `+
    `A ${ro} ${ro} 0 0 1 ${f(B[0])} ${f(B[1])} `+
    `Q ${f(cB[0])} ${f(cB[1])} ${f(C[0])} ${f(C[1])} `+
    `L ${f(D[0])} ${f(D[1])} `+
    `Q ${f(cD[0])} ${f(cD[1])} ${f(E[0])} ${f(E[1])} `+
    `A ${ri} ${ri} 0 0 0 ${f(Fp[0])} ${f(Fp[1])} `+
    `Q ${f(cF[0])} ${f(cF[1])} ${f(G[0])} ${f(G[1])} `+
    `L ${f(Hh[0])} ${f(Hh[1])} `+
    `Q ${f(cH[0])} ${f(cH[1])} ${f(A[0])} ${f(A[1])} Z`;
}
/* Anillo de COBERTURA DEL DÍA. El nivel de cada segmento usa la MISMA regla
   que los círculos del calendario de Semana, para que el aro de hoy y el cuadro
   de hoy en el calendario siempre coincidan:
   Lleno  = el día alcanza la meta del nutriente (la meta DIARIA en hierro/vitC;
            ~2 raciones/día —g/7*2— en los semanales, "un buen día").
   Medio  = hay aporte pero no llega a esa meta (entre 0 y el umbral).
   Vacío  = no se dio nada de ese nutriente hoy.
   El centro cuenta cuántos de los 8 nutrientes recibieron algún aporte hoy. */
function summaryRing(nuts){
  const total=nuts.length;
  const covered=nuts.filter(n=>(n.dayPts||0)>0).length;   // nutrientes con algún aporte hoy
  const cx=70, cy=70, R=54, GAP=4, per=360/total, SW=15, CR=3.6;
  const ri=R-SW/2, ro=R+SW/2;
  let paths='';
  nuts.forEach((n,i)=>{
    const base=-90 + i*per;
    const s=base+GAP/2, e=base+per-GAP/2;
    const pts=n.dayPts||0;
    // Relleno CONTINUO (igual que los círculos del calendario): fracción de la meta
    // del día (diaria para hierro/vitC; ~2 raciones/día para los semanales).
    const daily = n.scope==='día' ? n.target : Math.max(0.5, n.target/7*2);
    const ratio = Math.min(1, pts/daily);
    paths+=`<path d="${_roundedSector(cx,cy,ri,ro,s,e,CR)}" fill="#EEE6D7"/>`;
    if(ratio>0){ const ve=s+(e-s)*ratio;
      paths+=`<path d="${_roundedSector(cx,cy,ri,ro,s,ve,CR)}" fill="${NUT_COLOR[n.key]}"/>`; }
  });
  return `<svg viewBox="0 0 140 140" width="150" height="150" aria-label="${covered} de ${total} nutrientes dados hoy">
    ${paths}
    <text x="70" y="64" text-anchor="middle" font-family="Fraunces,serif" font-size="30" font-weight="600" fill="#3F5A54">${covered}</text>
    <text x="70" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="#857B73">de ${total}</text>
  </svg>`;
}
/* Narrativa cálida del día — qué nutrientes se han dado hoy y cuáles faltan */
function dayNarrative(nuts){
  const name=state.profile.name;
  const given=nuts.filter(n=>(n.dayPts||0)>0);
  const missing=nuts.filter(n=>(n.dayPts||0)===0);
  if(given.length===0) return `Aún no registras nada hoy. Toca <b>Registrar</b> y los segmentos se irán llenando.`;
  if(missing.length===0) return `¡Los 8 nutrientes cubiertos hoy! ${name} probó algo de cada uno. 🌟`;
  const missNames=missing.slice(0,2).map(n=>lcName(n.name));
  return `${name} ya probó ${given.length} de 8 nutrientes hoy. Para completar ayudaría sumar <b>${missNames.join(' y ')}</b>.`;
}

   Tono suave (Apple Fitness / Headspace), no infantil. Detecta rachas,
   hitos y mejoras reales para dar sensación de progreso.              */
function ironStreak(){ // días consecutivos terminando hoy/ayer con hierro en meta
  const g=goals().values; let streak=0;
  for(let i=0;i<60;i++){ const ds=addDays(todayStr(),-i), d=state.days[ds];
    if(!d||!d.entries.length){ if(i===0) continue; break; } // hoy sin registro no rompe
    if(dayStats(d).iron>=g.iron) streak++; else break;
  }
  return streak;
}
function uniqueFoodsEver(){ const s=new Set(); for(const ds in state.days) state.days[ds].entries.forEach(e=>{ if(e.foodId>0) s.add(e.foodId); }); return s.size; }
const MES_ABBR=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
function fmtShortDate(ds){ const d=new Date(ds+'T12:00:00'); return d.getDate()+' '+MES_ABBR[d.getMonth()]; }
/* Alimentos probados (#4): consulta histórica. Expande pouches a sus ingredientes y
   resuelve ítems personalizados, igual que dayStats. Por cada alimento subyacente
   acumula veces y guarda la primera fecha (recorriendo días en orden ascendente). */
function triedStats(){
  const map=new Map();
  const dates=Object.keys(state.days||{}).sort();
  for(const ds of dates){
    const day=state.days[ds]; if(!day) continue;
    (day.entries||[]).forEach(e=>{
      let foods=[];
      if(e.foodId>0){ const f=FOOD[e.foodId]; if(f) foods=[f]; }
      else {
        const p=(state.profile?.pouches||[]).find(x=>x.id===e.foodId);
        if(p) foods=p.ingredients.map(fid=>FOOD[fid]).filter(Boolean);
        else { const c=customItem(e.foodId); if(c) foods=[customAsFood(c)]; }
      }
      foods.forEach(f=>{
        let r=map.get(f.id);
        if(!r){ r={food:f, count:0, first:ds}; map.set(f.id,r); }
        r.count++;
      });
    });
  }
  return map;
}
// Racha actual de días registrando (terminando hoy o ayer). Un hueco la reinicia,
// pero NUNCA se muestra como algo negativo: solo celebra la racha vigente.
function logStreak(){
  let streak=0;
  for(let i=0;i<400;i++){ const ds=addDays(todayStr(),-i), d=state.days[ds];
    const has = d && (d.entries?.length>0 || Object.keys(d.others||{}).some(k=>d.others[k]>0));
    if(!has){ if(i===0) continue; break; }  // hoy sin registro todavía no rompe
    streak++;
  }
  return streak;
}
// Mejor racha histórica de días consecutivos con registro.
function bestLogStreak(){
  const ds=Object.keys(state.days||{}).filter(k=>{ const d=state.days[k]; return d && (d.entries?.length>0 || Object.keys(d.others||{}).some(x=>d.others[x]>0)); }).sort();
  let best=0, cur=0, prev=null;
  ds.forEach(k=>{ if(prev && addDays(prev,1)===k) cur++; else cur=1; best=Math.max(best,cur); prev=k; });
  return best;
}
function uniqueFoodsToday(){ const t=todayStr(), d=state.days[t]; if(!d) return []; 
  // alimentos de hoy que nunca se habían registrado antes
  const prev=new Set(); for(const ds in state.days){ if(ds<t) state.days[ds].entries.forEach(e=>prev.add(e.foodId)); }
  return [...new Set(d.entries.map(e=>e.foodId))].filter(id=>!prev.has(id)).map(id=>FOOD[id]).filter(Boolean);

// "Cierra la brecha": sugiere alimentos reales que cubren los nutrientes que hoy van
// bajos, priorizando los que cubren VARIOS a la vez (como el huevo, la sardina o el
// hígado). Apto por edad, sin fórmulas, sin alimentos a evitar; desprioriza lo ya dado hoy.
function gapSuggestions(nuts, day){
  const short=[];
  nuts.forEach(n=>{ const daily=n.scope==='día'?n.target:Math.max(0.5,n.target/7*2);
    const frac=Math.min(1,(n.dayPts||0)/daily); if(frac<1) short.push({k:n.key, deficit:1-frac}); });
  if(!short.length) return [];
  const m=effAgeMonths();
  const avoidF=new Set(state.profile?.avoidFoods||[]);
  const avoidAlg=(typeof avoidSet==='function')?avoidSet():new Set();
  const had=new Set(); expandedFoods(day).forEach(f=>{ if(f&&f.id!=null) had.add(f.id); });
  const scored=D.foods.filter(f=> f.id>0 && f.group!=='formulas' && f.minMonths<=m
        && !avoidF.has(f.id) && !(f.allergens||[]).some(a=>avoidAlg.has(a)))
    .map(f=>{ let s=0; const helps=[];
      short.forEach(({k,deficit})=>{ const fl=f.flags[k]; let v=0;
        if(fl==='A')v=2; else if(fl==='M')v=1; else if(MG[k]&&MG[k][f.id]!=null)v=0.4;
        if(v>0){ s += v*(k==='iron'?1.5:1)*(0.6+deficit); helps.push(k); } });
      if(had.has(f.id)) s-=2.5;
      return {f, s, helps};
    }).filter(x=>x.s>0).sort((a,b)=>b.s-a.s);
  const out=[], gcount={};
  for(const x of scored){ const g=x.f.group; if((gcount[g]||0)>=2) continue; gcount[g]=(gcount[g]||0)+1; out.push(x); if(out.length>=4) break; }
  return out;
}
/* ---------------- PANTALLA: HISTORIAL (solo lectura, navegable) ----
   Vista de un día pasado: alimentos consumidos + cobertura de nutrientes
   de ESE día. Días sin registro se muestran como "sin datos" — no se
   fabrican huecos ("sin dato ≠ no consumido"). Rango: 60 días atrás → hoy.
   El botón de editar reusa el flujo de recuperación/registro existente. */
function nutrientRowRead(n){
  // Variante de SOLO LECTURA de nutrientRowCompact: misma barra, sin tap.
  const pts=n.dayPts||0;
  const daily = n.scope==='día' ? n.target : Math.max(0.5, n.target/7*2);
  const frac = Math.min(1, pts/daily);
  const lvl = frac>=1 ? 'hi' : (frac>0 ? 'me' : 'no');
  const txt = lvl==='hi' ? 'alto' : (lvl==='me' ? 'medio' : 'falta');
  const w   = +(frac*100).toFixed(1);
  const op  = lvl==='hi' ? 1 : (lvl==='me' ? 0.85 : 0.3);
  const c=NUT_COLOR[n.key];
  return `<div class="nrowc nrowc-read" aria-label="${n.name}: ${txt}">
    <span class="nrc-top">
      <span class="nrc-ic" style="background:${c}22"><span style="background:${c}"></span></span>
      <span class="nrc-nm">${n.name} <span class="nrc-sc">· ${n.scope}</span></span>
      <span class="nrc-lvl ${lvl}">${txt}</span>
    </span>
    <span class="nrc-track"><span class="nrc-fill" style="width:${w}%;background:${c};opacity:${op}"></span></span>
  </div>`;
}

const NUT_NAME = Object.fromEntries(D.nutrients.map(n=>[n.key, n.name]));
const NUT_ORDER = D.nutrients.map(n=>n.key);
function customChip(day,c){

/* Alimentos con CONTADOR de raciones (cada ración = una entrada que suma a los
   nutrientes del día), en vez de toggle de presencia. Son alimentos "tipo dosis"
   que suelen ofrecerse varias veces al día como estrategia de hierro/zinc:
   la fórmula y los cereales infantiles fortificados (38 avena Fe, 39 arroz Fe).
   Mismo mecanismo que la fórmula (addEntry/removeEntry son genéricos). */
const COUNTABLE_FOOD_IDS = new Set([38, 39]);
function isCountableFood(f){ return f.group==='formulas' || COUNTABLE_FOOD_IDS.has(f.id); }
function regChip(day,f,showLevel){
  const on=hasFood(day,f.id);
  let lvl='';
  if(showLevel){ const v=f.flags[showLevel];
    if(v==='A') lvl='<span class="lvl hi">alto</span>';
    else if(v==='M') lvl='<span class="lvl me">medio</span>'; }
  const pref=foodPref(f.id);
  const pressedL = state._pressedPref === `like:${f.id}` ? ' pressed' : '';
  const pressedD = state._pressedPref === `dislike:${f.id}` ? ' pressed' : '';
  // Manitas 👍👎 SOLO cuando el alimento ya está marcado como consumido (más limpio).
  const onRetry = retrySet().has(f.id);
  const react = on ? `<span class="react"><button class="rb ${pref==='like'?'on like':''}${pressedL}" data-pref="like:${f.id}" title="Le encantó">👍</button><button class="rb ${pref==='dislike'?'on dis':''}${pressedD}" data-pref="dislike:${f.id}" title="Lo rechazó">👎</button><button class="rb ${onRetry?'on retry':''}" data-retry="${f.id}" title="Reintentar otro día">🔁</button></span>` : '';
  const warn = foodWarning(f);
  // Borde/franja roja-naranja para alimentos con advertencia (riesgo notorio)
  const warnCls = warn ? ` warn-${warn.kind}` : '';
  const warnLabel = warn ? (warn.kind==='age'?f.minMonths+'m+':(warn.kind==='allergen'?'alérgeno':(warn.kind==='reaction'?'reacción':'asfixia'))) : '';
  const warnBadge = warn ? `<span class="warn-badge warn-${warn.kind}" title="${warn.txt}">⚠ ${warnLabel}</span>` : '';
  // Contador de raciones (cada ración = una entrada; varias raciones suman): fórmula
  // y cereales infantiles fortificados. El resto de alimentos siguen siendo toggle.
  if(isCountableFood(f)){
    const n=foodCount(day,f.id);
    const stepper = n>0
      ? `<span class="fstep"><button class="fbtn" data-foodminus="${f.id}" aria-label="Quitar toma">−</button><b class="fnum">${n}</b><button class="fbtn" data-foodplus="${f.id}" aria-label="Añadir toma">＋</button></span>`
      : '';
    return `<span class="chip-wrap"><button class="chip ${n>0?'given':''}${warnCls}" ${n>0?'':`data-toggle="${f.id}"`}><span class="em">${f.emoji}</span><span>${f.name.split('(')[0].trim()}</span>${warnBadge}${n>0?'<span class="ck">✓</span>':''}</button>${stepper}</span>`;
  }
  return `<span class="chip-wrap"><button class="chip ${on?'given':''}${warnCls}" data-toggle="${f.id}"><span class="em">${f.emoji}</span><span>${f.name.split('(')[0].trim()}</span>${lvl}${warnBadge}${on?'<span class="ck">✓</span>':''}</button>${react}</span>`;
}
/* Renderiza SOLO el contenido del catálogo (debajo del buscador).

function renderCatResults(day, q, qn, filtered, nutFilter, grpFocus){

  const prefScore = f => { const p=foodPref(f.id); return p==='like'?-1 : (p==='dislike'?1 : 0); };
  const byPref = (a,b) => prefScore(a) - prefScore(b);
  if(nutFilter){
    const altos=filtered.filter(f=>f.flags[nutFilter]==='A').sort(byPref);
    const medios=filtered.filter(f=>f.flags[nutFilter]==='M').sort(byPref);

    const visiblePouches = q ? pouches.filter(p=>norm(p.name).includes(qn)) : pouches;
    // Solo ocultar el grupo entero si hay búsqueda activa y ningún pouch coincide

    let pouchBlockHTML='';
    if(showPouchGroup){
      const expanded=state._openGroups||{};
      // Colapsable en uno o cero pouches (mismo comportamiento que "Mis alimentos").
      const isOpen = q ? true : (state._regGrp==='pouches' ? true : !!expanded['pouches']);

      const pouchHeader = `<button class="grp-title tap" data-grptoggle="pouches">

          <span class="gcount">${givenCount>0?'<b>'+givenCount+' ✓</b> · ':''}${pouches.length||'crear'}</span>

        ? `<div class="pouch-empty">

            <button class="btn primary block" data-act="newPouch">＋ Crear mi primera comida</button>

    const expanded=state._openGroups||{};
    groupsWith.forEach(g=>{
      const fs=filtered.filter(f=>f.group===g.key).sort(byPref);

          <span class="gcount">${givenCount>0?'<b>'+givenCount+' ✓</b> · ':''}${fs.length}</span>

/* ---------------- PANTALLA: SEMANA --------------------------------- */
/* Semana calendario LUNES→DOMINGO que contiene la fecha de referencia. */
function weekRange(refStr){
  const d=new Date(refStr+'T12:00:00');
  const dow=(d.getDay()+6)%7; // 0=lunes ... 6=domingo
  const monday=addDays(refStr,-dow);
  const days=[]; for(let i=0;i<7;i++) days.push(addDays(monday,i));
  return days;
}
/* Mapa de calor como TABLA (filas=nutrientes, columnas=días lun-dom).
   Tabla real → alineación perfecta y sin traslapes en cualquier navegador. */
/* Cuña radial (relleno tipo "pay") desde las 12 en sentido horario, fracción f (0..1). */
function _radialWedge(cx,cy,r,f,color){
  if(f<=0) return '';
  if(f>=1) return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}"/>`;
  const a=f*2*Math.PI, x=(cx+r*Math.sin(a)).toFixed(2), y=(cy-r*Math.cos(a)).toFixed(2), big=f>0.5?1:0;
  return `<path d="M${cx},${cy} L${cx},${(cy-r).toFixed(2)} A${r},${r} 0 ${big} 1 ${x},${y} Z" fill="${color}"/>`;
}
function weekHeatmap(refStr, showWeekProgress){
  const G=goals(), g=G.values, sc=G.scope;
  const nuts=[['iron','Hierro'],['vitC','Vit C'],['vitA','Vit A'],['dha','Omega-3'],['calcium','Calcio'],['zinc','Zinc'],['choline','Colina'],['iodine','Yodo']];
  const dayLabels=['L','M','M','J','V','S','D'];
  const days=weekRange(refStr);
  const todayS=todayStr();

  // Progreso semanal (solo si se pide): acumulado/meta para nutrientes
  // semanales; días cumplidos/7 para los diarios (hierro, vit. C).
  // Importante: se suma sobre `days` (la MISMA semana calendario lun-dom que
  // dibujan las celdas), no sobre una ventana móvil de 7 días hacia atrás;
  // así el progreso siempre coincide con el calendario mostrado.
  let prog=null;
  if(showWeekProgress){
    const acc={iron:0,vitC:0,zinc:0,vitA:0,dha:0,calcium:0,choline:0,iodine:0};
    let ironLvl=0, vitcLvl=0;
    days.forEach(ds=>{ const d=state.days[ds]; if(d&&d.entries.length){ const ss=dayStats(d);
      for(const kk in acc) if(kk in ss) acc[kk]+=ss[kk];
      ironLvl += Math.min(1, (ss.iron||0)/g.iron);
      vitcLvl += Math.min(1, (ss.vitC||0)/g.vitC); } });
    const fmt=n=>{ const r=Math.round(n*10)/10; return Number.isInteger(r)?String(r):r.toFixed(1); };
    prog={};
    nuts.forEach(([k])=>{
      if(sc[k]==='día'){ const dn=(k==='iron'?ironLvl:vitcLvl); prog[k]={ratio:Math.min(1,dn/7), label:`${fmt(dn)}/7 d`}; }
      else { const v=acc[k]||0, t=g[k]||1; prog[k]={ratio:Math.min(1,v/t), label:`${fmt(v)}/${t}`}; }
    });
  }

  // Layout determinista en SVG: misma medida de celda en cualquier navegador.
  const nrows=nuts.length, labelW=70, headerH=36, cell=38, gap=6;
  const progW = showWeekProgress ? 74 : 0;            // ancho de la columna de progreso
  const progGap = showWeekProgress ? 10 : 0;          // separación tras el domingo
  const W = labelW + 7*cell + 6*gap + progGap + progW;
  const H = headerH + nrows*cell + (nrows-1)*gap;
  const colX = i => labelW + i*(cell+gap);
  const rowY = r => headerH + r*(cell+gap);
  const progX = labelW + 7*cell + 6*gap + progGap;    // x de inicio de la columna

  // PAD: margen alrededor del contenido para que el grosor de los bordes
  // (recuadro de "hoy", borde punteado, etc.) no se recorte en los extremos
  // —p. ej. el borde derecho del domingo o el inferior de la última fila—.
  const PAD = 3;

  let svg=`<svg viewBox="${-PAD} ${-PAD} ${W+PAD*2} ${H+PAD*2}" width="100%" style="display:block;max-width:${W+PAD*2}px;margin:0 auto" font-family="Quicksand,sans-serif">`;

  // encabezado de la columna de progreso
  if(showWeekProgress){
    svg+=`<text x="${progX+progW/2}" y="20" text-anchor="middle" font-size="13" font-weight="800" letter-spacing="0.3" fill="#857A6F" pointer-events="none">SEMANA</text>`;
  }

  // encabezados de día (hoy va recuadrado para distinguirlo)
  days.forEach((ds,i)=>{
    const dt=new Date(ds+'T12:00:00'), today=ds===todayS, future=ds>todayS, cx=colX(i)+cell/2;
    if(today){
      svg+=`<rect x="${colX(i)-2}" y="0" width="${cell+4}" height="${headerH-4}" rx="7" fill="#C3E2D3" stroke="#6E938B" stroke-width="1.5"/>`;
    }
    svg+=`<text x="${cx}" y="14" text-anchor="middle" font-size="13" font-weight="${today?800:700}" fill="${today?'#22382F':'#5C534B'}" pointer-events="none">${dayLabels[i]}</text>`;
    svg+=`<text x="${cx}" y="27" text-anchor="middle" font-size="10.5" font-weight="${today?800:600}" fill="${today?'#22382F':'#857A6F'}" pointer-events="none">${dt.getDate()}</text>`;
    // Hit-area transparente sobre el header — tocable para días pasados (lleva a registrar ese día)
    if(!today && !future){
      svg+=`<rect x="${colX(i)-2}" y="0" width="${cell+4}" height="${headerH-4}" rx="7" fill="transparent" data-histday="${ds}" style="cursor:pointer"/>`;
    }
  });

  // filas
  nuts.forEach(([k,lbl],r)=>{
    const cy=rowY(r), midY=cy+cell/2;
    // ícono más grande (40x40 escalado a 20) + etiqueta más legible
    svg+=`<g transform="translate(${labelW/2-10},${midY-16}) scale(0.5)">${ICON[k]}</g>`;
    svg+=`<text x="${labelW/2}" y="${midY+18}" text-anchor="middle" font-size="14" font-weight="800" fill="#2A2521">${lbl}</text>`;
    // celdas: CÍRCULOS que llenan la celda, con relleno radial proporcional a la meta
    days.forEach((ds,i)=>{
      const x=colX(i), day=state.days[ds], future=ds>todayS, isToday=ds===todayS, has=day&&day.entries.length;
      const cxc=x+cell/2, ccy=midY, cr=cell/2-1;
      let circle='';
      if(future){
        // Futuro: aún no — círculo casi blanco con borde suave.
        circle=`<circle cx="${cxc}" cy="${ccy}" r="${cr}" fill="#FCFAF5" stroke="#EDE3D0" stroke-width="1"/>`;
      } else if(!has){
        // Sin registrar (pasado/hoy sin datos): aro punteado.
        circle=`<circle cx="${cxc}" cy="${ccy}" r="${cr}" fill="#FFFFFF" stroke="#C3B393" stroke-width="1.5" stroke-dasharray="3 2"/>`;
      } else {
        const s=dayStats(day);
        const daily = sc[k]==='día' ? g[k] : Math.max(0.5, g[k]/7*2);
        const v=s[k]||0;
        if(v<=0){ // registrado pero sin ese nutriente: beige lleno
          circle=`<circle cx="${cxc}" cy="${ccy}" r="${cr}" fill="#EADBC4"/>`;
        } else { // base pálida + cuña radial del color del nutriente
          const frac=Math.min(1, v/daily);
          circle=`<circle cx="${cxc}" cy="${ccy}" r="${cr}" fill="#ECE3D4"/>`+_radialWedge(cxc,ccy,cr,frac,NUT_COLOR[k]);
        }
      }
      // hit-area transparente para tocar días pasados
      const hit = (!future && !isToday) ? `<rect x="${x}" y="${cy}" width="${cell}" height="${cell}" rx="9" fill="transparent" data-histday="${ds}" style="cursor:pointer"/>` : '';
      svg+=circle+hit;
    });
    // columna de progreso semanal a la derecha (solo si se pide)
    if(showWeekProgress && prog){
      const p=prog[k], barW=progW, barH=7, barY=midY-3;
      // pista
      svg+=`<rect x="${progX}" y="${barY}" width="${barW}" height="${barH}" rx="3.5" fill="#EEE6D7"/>`;
      // relleno
      if(p.ratio>0) svg+=`<rect x="${progX}" y="${barY}" width="${(barW*p.ratio).toFixed(1)}" height="${barH}" rx="3.5" fill="${NUT_COLOR[k]}"/>`;
      // fracción debajo de la barra
      svg+=`<text x="${progX+barW/2}" y="${midY+16}" text-anchor="middle" font-size="13" font-weight="700" fill="#857A6F" pointer-events="none">${p.label}</text>`;
    }
  });
  svg+=`</svg>`;

  return `${svg}
    <div class="hm-legend">
      <span>${_legendBox('full')} meta del día</span>
      <span>${_legendBox('part')} aporte parcial</span>
      <span>${_legendBox('none')} sin ese nutriente</span>
      <span>${_legendBox('empty')} sin registrar</span>
    </div>`;
}
/* Cuadro de leyenda como SVG: dimensiones fijas, idéntico en cualquier navegador. */
function _legendBox(kind){
  const S=24;
  if(kind==='full') return `<svg width="${S}" height="${S}" viewBox="0 0 24 24" style="vertical-align:middle"><circle cx="12" cy="12" r="11" fill="#6E938B"/></svg>`;
  if(kind==='part') return `<svg width="${S}" height="${S}" viewBox="0 0 24 24" style="vertical-align:middle"><circle cx="12" cy="12" r="11" fill="#ECE3D4"/><path d="M12,12 L12,1 A11,11 0 0 1 23,12 Z" fill="#6E938B"/></svg>`;
  if(kind==='none') return `<svg width="${S}" height="${S}" viewBox="0 0 24 24" style="vertical-align:middle"><circle cx="12" cy="12" r="11" fill="#EADBC4"/></svg>`;
  return `<svg width="${S}" height="${S}" viewBox="0 0 24 24" style="vertical-align:middle"><circle cx="12" cy="12" r="10.2" fill="#FFFFFF" stroke="#C3B393" stroke-width="1.5" stroke-dasharray="3 2"/></svg>`;
}
/* Narrativa semanal: el nutriente más flojo y el más constante */
function weekNarrative(endStr){
  const name=state.profile.name, G=goals(), g=G.values, wk=weekStats(endStr);
  if(!wk.daysWith) return `Aún no hay registros esta semana. En cuanto registres unos días, aquí verás los patrones de ${name}.`;

  const peor=sem[0], mejor=sem[sem.length-1];
  let txt=`${name} registró ${wk.daysWith} día${wk.daysWith>1?'s':''} esta semana. `;
  if(peor.r<1) txt+=`Lo que más ayudaría reforzar es <b>${peor.name}</b>. `;
  if(mejor.r>=1) txt+=`Va muy bien en ${mejor.name}. `;
  return txt;
}

  // Así un día con medio círculo SÍ cuenta (antes la barra ignoraba los parciales).
  // El subtítulo conserva cuántos días llegaron a la meta diaria completa.
  let ironLvl=0, vitcLvl=0, ironFull=0, vitcFull=0;
  week.forEach(ds=>{ const d=state.days[ds]; if(d&&d.entries.length){ const s=dayStats(d);
    ironLvl += Math.min(1, (s.iron||0)/g.iron); if(s.iron>=g.iron) ironFull++;
    vitcLvl += Math.min(1, (s.vitC||0)/g.vitC); if(s.vitC>=g.vitC) vitcFull++; } });
  const fullSub=n=>`${n} de 7 días en la meta diaria completa`;
  html+=`<div class="card"><div class="sec-head"><h3>Cumplimiento diario</h3><button class="info-btn" data-act="infoCumpDiario" title="Cómo funciona">?</button></div>
    <p class="muted" style="margin-bottom:8px">Cada sección es un día; se llena con el aporte de ese día, igual que el calendario. El subtítulo da los días en meta completa.</p>
    ${bar({icon:'iron',name:'Hierro día a día',val:ironLvl,target:7,segments:7,iron:true,sub:fullSub(ironFull)})}
    ${bar({icon:'vitC',name:'Vitamina C día a día',val:vitcLvl,target:7,segments:7,sub:fullSub(vitcFull)})}</div>`;

  // acumulado semanal: barras de los 6 nutrientes semanales.
  // El numerador suma el nivel POR DÍA topado a 1 (alto=1, medio=0.5) — es decir,
  // exactamente lo que dibujan los círculos del Calendario — para que ambos coincidan.
  const wkLvl={vitA:0,dha:0,calcium:0,zinc:0,choline:0,iodine:0};
  week.forEach(ds=>{ const d=state.days[ds]; if(d&&d.entries.length){ const s=dayStats(d);
    for(const k in wkLvl){ const daily=Math.max(0.5,(g[k]||1)/7*2); const v=s[k]||0; wkLvl[k]+= Math.min(1, v/daily); } } });
  html+=`<div class="card"><div class="sec-head"><h3>Cumplimiento semanal</h3><button class="info-btn" data-act="infoCumpSemanal" title="Cómo funciona">?</button></div>
    <p class="muted" style="margin-bottom:8px">Cada barra se llena con el acumulado de la semana, igual que el relleno de los círculos del calendario.</p>
    ${bar({icon:'vitA',name:'Vitamina A',val:wkLvl.vitA,target:g.vitA,hideVal:true,nutKey:'vitA',sub:'Vista e inmunidad'})}
    ${bar({icon:'dha',name:'Omega-3 / DHA',val:wkLvl.dha,target:g.dha,hideVal:true,nutKey:'dha',sub:'Desarrollo cerebral'})}
    ${bar({icon:'calcium',name:'Calcio',val:wkLvl.calcium,target:g.calcium,hideVal:true,nutKey:'calcium',sub:'Huesos y dientes'})}
    ${bar({icon:'zinc',name:'Zinc',val:wkLvl.zinc,target:g.zinc,hideVal:true,nutKey:'zinc',sub:'Inmunidad y crecimiento'})}
    ${bar({icon:'choline',name:'Colina',val:wkLvl.choline,target:g.choline,hideVal:true,nutKey:'choline',sub:'Memoria y cerebro'})}
    ${bar({icon:'iodine',name:'Yodo',val:wkLvl.iodine,target:g.iodine,hideVal:true,nutKey:'iodine',sub:'Tiroides y cognición'})}</div>`;

  // SUGERENCIAS POR BRECHA: nutrientes bajos de la semana + alimentos que los aportan
  // (primero los que ya le gustan/come, luego no probados para variedad)
  const cover={ iron:ironLvl/7, vitC:vitcLvl/7,
    vitA:g.vitA?wkLvl.vitA/g.vitA:1, dha:g.dha?wkLvl.dha/g.dha:1, calcium:g.calcium?wkLvl.calcium/g.calcium:1,
    zinc:g.zinc?wkLvl.zinc/g.zinc:1, choline:g.choline?wkLvl.choline/g.choline:1, iodine:g.iodine?wkLvl.iodine/g.iodine:1 };
  const NUTMETA={iron:{n:'el hierro',e:'🩸'},vitC:{n:'la vitamina C',e:'🍊'},vitA:{n:'la vitamina A',e:'🥕'},dha:{n:'el omega-3',e:'🐟'},calcium:{n:'el calcio',e:'🦴'},zinc:{n:'el zinc',e:'🌱'},choline:{n:'la colina',e:'🥚'},iodine:{n:'el yodo',e:'🐠'}};
  const ageM=ageMonths();
  const triedCount={};
  Object.values(state.days||{}).forEach(d=>(d?.entries||[]).forEach(e=>{ if(e.foodId>0) triedCount[e.foodId]=(triedCount[e.foodId]||0)+1; }));
  const gaps=Object.keys(cover).filter(k=>cover[k]<0.7).sort((a,b)=>cover[a]-cover[b]).slice(0,2);
  gaps.forEach(k=>{
    const cands=DATA.foods.filter(f=>f.group!=='formulas' && (f.minMonths||6)<=ageM && (f.flags[k]==='A'||f.flags[k]==='M'));
    const rank=f=>(f.flags[k]==='A'?0:1);
    const fav=cands.filter(f=>triedCount[f.id]>0).sort((a,b)=>rank(a)-rank(b) || (triedCount[b.id]-triedCount[a.id])).slice(0,4);
    const novel=cands.filter(f=>!triedCount[f.id]).sort((a,b)=>rank(a)-rank(b)).slice(0,4);
    if(!fav.length && !novel.length) return;
    const chip=f=>`<div class="fchip"><span class="em">${f.emoji}</span><span class="nm">${f.name.split('(')[0].trim()}</span><button class="plus" data-suggadd="${f.id}" aria-label="Agregar ${f.name.split('(')[0].trim()} a hoy">＋</button></div>`;
    html+=`<div class="card sugg-card">
      <h3>Para reforzar ${NUTMETA[k].n} ${NUTMETA[k].e}</h3>
      <p class="muted" style="margin:2px 0 11px">Mirando el balance de <b>toda la semana</b>, este nutriente va bajo. Toca ＋ para sumarlo hoy.${k==='iron'?' Acompáñalo con algo rico en vitamina C para absorber más.':''}</p>
      ${fav.length?`<div class="sugg-lbl">Ya le gustan</div><div class="sugg">${fav.map(chip).join('')}</div>`:''}
      ${novel.length?`<div class="sugg-lbl" style="margin-top:12px">Para probar (variedad)</div><div class="sugg">${novel.map(chip).join('')}</div>`:''}
    </div>`;
  });

  // HITOS — métricas distintas entre sí que solo suben; nunca penalizan
  const h_variety=uniqueFoodsEver();
  const h_days=Object.values(state.days||{}).filter(d=>d?.entries?.length>0 || Object.keys(d?.others||{}).some(k=>d.others[k]>0)).length;
  const h_groups=(()=>{ const gs=new Set(); Object.values(state.days||{}).forEach(d=>(d?.entries||[]).forEach(e=>{ const f=FOOD[e.foodId]; if(f&&f.group) gs.add(f.group); })); return gs.size; })();
  const h_alg=introducedSet().size;
  const hitosCard=`<div class="hist-sep">Resumen histórico</div>
    <div class="card"><div class="sec-head"><h3>Hitos de ${state.profile.name}</h3><button class="info-btn" data-act="hitosInfo" title="Qué significan">?</button></div>
    <p class="muted" style="margin:2px 0 12px">Acumulables desde el primer día registrado (no dependen de la semana seleccionada).</p>
    <div class="hito-grid">
      <div class="hito"><div class="hito-n">${h_variety}</div><div class="hito-l">sabores distintos probados</div></div>
      <div class="hito"><div class="hito-n">${h_days}</div><div class="hito-l">días registrados en total</div></div>
      <div class="hito"><div class="hito-n">${h_groups}<span class="hito-sub">/${D.groups.length}</span></div><div class="hito-l">grupos de alimentos explorados</div></div>
      <div class="hito"><div class="hito-n">${h_alg}<span class="hito-sub">/${D.allergens.length}</span></div><div class="hito-l">alérgenos introducidos</div></div>
    </div></div>`;

  // ALÉRGENOS — introducidos (rastrear exposición) + a evitar (recordatorio)
  const intro=[...introducedSet()], avoid=[...avoidSet()];
  html+=`<div class="card"><h3>Alérgenos</h3>`;
  if(intro.length){
    html+=`<p class="muted" style="margin:6px 0 8px"><b>Introducidos</b> — mantén la exposición ~1–2 veces/semana para no perder tolerancia.</p>
      <div class="allergen-grid">${intro.map(a=>{const seen=wk.allergens.has(a);return `<span class="alg ${seen?'intro':''}">${seen?'✓ ':''}${a}</span>`;}).join('')}</div>
      <p class="faint" style="margin:7px 0 0;font-size:11.5px">✓ = lo diste esta semana. En blanco = ya introducido, pero no esta semana (conviene repetir para mantener la tolerancia).</p>`;
  }
  if(avoid.length){
    html+=`<p class="muted" style="margin:14px 0 8px"><b>Alérgenos a evitar</b> — no ofrecer; no aparecen al registrar. Toca para quitar.</p>
      <div class="allergen-grid">${avoid.map(a=>`<button class="alg avoid" data-unavoid="${a}" title="Quitar de la lista de evitar">🚫 ${a} ✕</button>`).join('')}</div>`;
  }
  // REACCIONES registradas a alimentos puntuales (marca roja en Registrar). Removibles
  // por si fue leve, fue un error, o el bebé ya las tolera.
  const reactedFoods=(state.profile?.reactions||[]).map(id=>FOOD[+id]).filter(Boolean);
  if(reactedFoods.length){
    html+=`<p class="muted" style="margin:14px 0 8px"><b>Reacciones registradas</b> — el alimento sigue disponible, marcado con ⚠ reacción al registrar. Toca para quitar la marca.</p>
      <div class="allergen-grid">${reactedFoods.map(f=>`<button class="alg avoid" data-react-rm="${f.id}" title="Quitar la marca de reacción">⚠ ${f.emoji} ${f.name.split('(')[0].trim()} ✕</button>`).join('')}</div>`;
  }
  // Alimentos específicos ocultados manualmente desde el perfil (no son alérgenos
  // necesariamente, pero tampoco aparecen al registrar — el usuario debe poder verlos).
  const avoidFoodIds=(state.profile?.avoidFoods||[]).map(id=>FOOD[+id]).filter(Boolean);
  if(avoidFoodIds.length){
    html+=`<p class="muted" style="margin:14px 0 8px"><b>Otros alimentos ocultados</b> — los marcaste en el perfil; no aparecen al registrar.</p>
      <div class="allergen-grid">${avoidFoodIds.map(f=>`<span class="alg avoid">🚫 ${f.emoji} ${f.name.split('(')[0].trim()}</span>`).join('')}</div>`;
  }
  if(!intro.length && !avoid.length && !avoidFoodIds.length && !reactedFoods.length) html+=`<p class="faint">Aún no marcas alérgenos ni alimentos a evitar en el perfil.</p>`;
  html+=`</div>`;

  // TOPES
  const milkAllowed=m>=12;
  const nitrateMax = m<12 ? 2 : 4;  // <12m: 2/semana; 12-24m: 4/semana
  const limitesCard=`<div class="card"><h3>Límites y precauciones</h3>
    <div class="tope"><div><b>Hígado</b><div class="faint">Máx ${liverMax}/semana por su alta vit. A</div></div>
      <span class="st ${wk.liver>liverMax?'over':'ok'}">${wk.liver} / ${liverMax}${wk.liver>liverMax?' ⚠':''}</span></div>
    <div class="tope"><div><b>Verduras de hoja altas en nitratos</b><div class="faint">Espinaca, acelga, betabel — máx ${nitrateMax}/semana${m<12?' antes del año':''}</div></div>
      <span class="st ${wk.nitrate>nitrateMax?'over':'ok'}">${wk.nitrate} / ${nitrateMax}${wk.nitrate>nitrateMax?' ⚠':''}</span></div>
    <div class="tope"><div><b>Leche de vaca como bebida</b><div class="faint">${milkAllowed?'Permitida desde los 12 meses':'No antes de los 12 meses'}</div></div>
      <span class="st ${milkAllowed?'ok':'block'}">${milkAllowed?'OK 12m+':'Bloqueado'}</span></div>
    <div class="tope"><div><b>Miel</b><div class="faint">Nunca antes de los 12 meses — riesgo de botulismo infantil, en cualquier forma (incluida cocida o en productos)</div></div>
      <span class="st ${m>=12?'ok':'block'}">${m>=12?'OK 12m+':'Evitar'}</span></div>
    <div class="tope"><div><b>Sal y sodio</b><div class="faint">Limita la sal en el primer año (los riñones del bebé son inmaduros). No añadas sal; enjuaga enlatados y evita embutidos y quesos muy salados</div></div>
      <span class="st ${m>=12?'ok':'over'}">${m>=12?'Moderar':'Limitar'}</span></div>
    <div class="tope"><div><b>Azúcar y ultraprocesados</b><div class="faint">Evita azúcar añadida, jugos y productos ultraprocesados en el primer año (y modéralos después): aportan calorías vacías, desplazan alimentos nutritivos y fomentan la preferencia por lo dulce</div></div>
      <span class="st block">Evitar</span></div>
    <div class="tope"><div><b>Hierro</b><div class="faint">Cúbrelo a diario con alimentos; es de lo más importante a esta edad. El hierro de más no se absorbe mejor y puede estreñir o competir con el zinc, así que no hace falta forzarlo. Los <b>suplementos de hierro solo si los indica el pediatra</b> — y guárdalos siempre fuera del alcance: una sobredosis es peligrosa.</div></div></div>
    <p class="faint" style="margin:12px 2px 0;line-height:1.5">💡 <b>Calcio y hierro juntos:</b> el calcio de los lácteos compite con la absorción del hierro. Si tu bebé toma pocos alimentos ricos en hierro, evita darle muchos lácteos en la misma comida; mejor sepáralos y acompaña el hierro con algo de vitamina C.</p></div>`;

  html+=hitosCard;

  // ALIMENTOS PROBADOS — vista de consulta (read-only). Para registrar: Registrar.
  (()=>{
    const ts=triedStats();
    if(ts.size===0) return;
    const rows=[...ts.values()];
    const maxC=Math.max(...rows.map(r=>r.count));
    rows.sort((a,b)=> b.count-a.count || (a.first<b.first?-1:1));
    const open=!!state._showTried;
    const shown=open?rows:rows.slice(0,5);
    const rowHTML=r=>{
      const f=r.food, isCustom=f._custom;
      const name=f.name.split('(')[0].trim();
      const fav = r.count===maxC && maxC>1 ? '<span class="tf-fav" title="El más frecuente">★</span>' : '';
      const pref=isCustom?null:foodPref(f.id);
      const react = pref==='like'?'<span class="tf-react like">👍</span>' : (pref==='dislike'?'<span class="tf-react dis">👎</span>':'');
      const algs=(!isCustom && f.allergens && f.allergens.length)
        ? `<span class="tf-algs">${f.allergens.map(a=>`<span class="tf-alg">${a}</span>`).join('')}</span>` : '';
      const tag=isCustom?'<span class="tf-custom">definido por ti</span>':'';
      const tap=isCustom?'':`data-idea="${f.id}"`;
      return `<button class="tf-row" ${tap}>
        <span class="tf-em">${f.emoji||'🥄'}</span>
        <span class="tf-main">
          <span class="tf-name">${name}${fav}${tag}</span>
          <span class="tf-meta">1ª vez ${fmtShortDate(r.first)} · ${r.count} ${r.count===1?'vez':'veces'}</span>
          ${algs}
        </span>
        ${react}
      </button>`;
    };
    html+=`<div class="card">
      <div class="sec-head"><h3>Alimentos probados <span class="sec-count">${ts.size}</span></h3>
        <button class="info-btn" data-act="triedInfo" title="Qué es esto">?</button></div>
      <p class="muted" style="margin:2px 0 12px">Todo lo que ${state.profile.name} ha probado, incluido lo que viene dentro de tus comidas. Toca un alimento para localizarlo en Registrar y marcarlo de nuevo.</p>
      <div class="tf-list">${shown.map(rowHTML).join('')}</div>
      ${rows.length>5?`<button class="btn sm ghost block" data-act="toggleTried" style="margin-top:10px">${open?'Ver menos':`Ver los ${rows.length}`}</button>`:''}
    </div>`;
  })();
  (()=>{ const rs=[...retrySet()].map(id=>FOOD[id]).filter(Boolean);
    if(!rs.length) return;
    html+=`<div class="card">
      <div class="sec-head"><h3>Para reintentar pronto</h3></div>
      <p class="faint" style="margin:0 0 10px">Un sabor rechazado no es un “no” definitivo: muchos bebés necesitan ofrecerlo entre 8 y 15 veces. Toca para registrarlo cuando se lo vuelvas a ofrecer.</p>
      <div class="retry-list">${rs.map(f=>`<span class="retry-row"><button class="retry-reg tap" data-toggle="${f.id}"><span class="em">${f.emoji}</span><span>${f.name.split('(')[0].trim()}</span></button><button class="retry-x" data-retry="${f.id}" title="Quitar de reintentar">✕</button></span>`).join('')}</div>
    </div>`;
  })();
  html+=`<button class="card cg-card tap" data-act="cutGuide">
      <span class="cg-card-em">🔪</span>
      <span class="cg-card-txt"><b>Cortes seguros por edad</b><span class="faint">Cómo presentar la comida para evitar asfixia</span></span>
      <span class="chev">›</span>
    </button>`;
  html+=`<button class="card cg-card tap" data-act="report">
      <span class="cg-card-em" style="background:var(--mint-tint)">📄</span>
      <span class="cg-card-txt"><b>Informe resumido para el pediatra</b><span class="faint">Cobertura por periodo · imprimir / PDF</span></span>
      <span class="chev">›</span>
    </button>`;
  html+=`<button class="card cg-card tap" data-act="reportFull">
      <span class="cg-card-em" style="background:var(--wheat-tint)">📑</span>
      <span class="cg-card-txt"><b>Informe detallado para el pediatra</b><span class="faint">Mapa del periodo + alimentos por día · imprimir / PDF</span></span>
      <span class="chev">›</span>
    </button>`;
  html+=limitesCard;
  html+=disclaimerHTML();
  html+=`</div>`;
  return html;
}

/* ---------------- PANTALLA: AJUSTES -------------------------------- */
function screenAjustes(){
  const b=band();
  let html=`<div class="screen"><div class="topbar"><div><div class="hello">Configuración</div><div class="babyname" style="font-size:22px">Ajustes</div></div></div>`;

  html+=`<button class="card cg-card tap" data-act="babies" style="margin-bottom:14px">
      <span class="cg-card-em" style="background:var(--wheat-tint)">👶</span>
      <span class="cg-card-txt"><b>Mis bebés</b><span class="faint">${(state.babies||[]).length>1?(state.babies.length+' bebés · cambiar o agregar'):'Agregar otro bebé'}</span></span>
      <span class="chev">›</span>
    </button>`;

  html+=`<div class="card"><h3>Perfil del bebé</h3>
    <p class="muted">${state.profile.name} · ${ageMonths()} meses · ${b.label}</p>
    <p class="faint" style="margin:4px 0 10px">Lactancia: ${state.profile.feeding||'—'} · Alergias en evitación: ${[...avoidSet()].join(', ')||'ninguna'}</p>
    <button class="btn soft sm" data-act="editProfile">Editar perfil</button></div>`;

  // Metas activas (transparencia: muestra los números que usa el motor, ya modulados)
  const G=goals(), g=G.values, sc=G.scope;
  html+=`<div class="card"><h3>Metas de nutrientes activas</h3>
    <p class="muted" style="margin-bottom:10px">Ajustadas a la edad (y al alza si tu bebé ya no toma leche). La fórmula aporta a estas metas al registrar cada toma. Punto de partida basado en lineamientos OMS/pediátricos — a validar con tu pediatra.</p>
    ${[['iron','Hierro'],['vitC','Vitamina C'],['vitA','Vitamina A'],['dha','Omega-3 / DHA'],['calcium','Calcio'],['zinc','Zinc']].map(([k,nm])=>{
      const note=feedingNote(k);
      return `<div class="meta-row">${iconBox(k,30,24)}<span class="mname">${nm}</span><span class="mval">${g[k]}× / ${sc[k]==='día'?'día':'sem'}</span>${note?`<div class="mnote">⚖️ ${note}</div>`:''}</div>`;
    }).join('')}</div>`;

  const eod = state.settings.endOfDayReminder!==false, dys = state.settings.daysReminder!==false, ch=state.settings.closeHour??22;
  html+=`<div class="card"><h3>Recordatorios</h3>
    <div class="set-row"><div class="set-tx"><b>Aviso al final del día</b><p>Cerca de las ${ch}:00, si parece que quedó algo sin anotar, verás un recordatorio suave en Hoy.</p></div>
      <button class="switch ${eod?'on':''}" data-act="toggleEndOfDay" role="switch" aria-checked="${eod}"><span></span></button></div>
    <div class="set-row"><div class="set-tx"><b>Días sin registrar</b><p>Si pasan ${state.settings.reminderDays} días sin registrar nada, se mostrará un recordatorio.</p></div>
      <button class="switch ${dys?'on':''}" data-act="toggleDaysReminder" role="switch" aria-checked="${dys}"><span></span></button></div></div>`;

  // Estado de datos: visibilidad de la persistencia para que el usuario sepa qué pasa
  // Cuenta solo días con al menos un alimento registrado (no objetos vacíos creados por ensureDay).
  const nDays=Object.values(state.days||{}).filter(d=>d?.entries?.length>0 || Object.keys(d?.others||{}).some(k=>d.others[k]>0)).length;
  const nEntries=Object.values(state.days||{}).reduce((a,d)=>a+(d?.entries?.length||0),0);
  // alimentos DISTINTOS probados alguna vez (variedad) — solo cuenta la primera vez de cada uno
  const distinctFoods=new Set();
  Object.values(state.days||{}).forEach(d=>(d?.entries||[]).forEach(e=>{ if(e.foodId>0) distinctFoods.add(e.foodId); }));
  const nDistinct=distinctFoods.size;
  const lastSave = state._lastSaveAt ? new Date(state._lastSaveAt).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}) : '—';
  html+=`<div class="card"><div class="sec-head"><h3>Tus datos</h3><button class="info-btn" data-act="datosInfo" title="Qué significan">?</button></div>
    <div class="data-stat"><span>Días registrados</span><b>${nDays}</b></div>
    <div class="data-stat"><span>Alimentos distintos probados</span><b>${nDistinct}</b></div>
    <div class="data-stat"><span>Registros en total</span><b>${nEntries}</b></div>
    <div class="data-stat"><span>Último guardado</span><b>${lastSave}</b></div>
    <p class="faint" style="margin:10px 0 12px">Tus datos viven en este navegador. Exporta una copia de respaldo de vez en cuando, por si algo pasa con el dispositivo.</p>
    <button class="btn block" data-act="exportData" style="margin-bottom:8px">⬇ Exportar mis datos (JSON)</button>
    <button class="btn ghost block" data-act="importData">⬆ Importar desde un respaldo</button>
    <input type="file" id="pf-importfile" accept="application/json,.json" style="display:none" onchange="window._importData(this)">
    </div>`;

  html+=`<div class="card"><button class="btn danger block" data-act="reset">Borrar todos los datos</button></div>`;
  html+=disclaimerHTML();
  html+=`<p class="faint" style="text-align:center;margin:14px 0 4px;font-size:12px">Suri · versión ${APP_BUILD}</p>`;
  html+=`</div>`;
  return html;

function disclaimerHTML(){
