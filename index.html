/* ---------------- ONBOARDING (primer arranque) -------------------- */
function _onbArc(cx,cy,r,a0,a1){
  const p=d=>{const a=(d-90)*Math.PI/180;return [cx+r*Math.cos(a),cy+r*Math.sin(a)];};
  const [x0,y0]=p(a0),[x1,y1]=p(a1),lg=(a1-a0)%360>180?1:0;
  return `M ${x0.toFixed(2)} ${y0.toFixed(2)} A ${r} ${r} 0 ${lg} 1 ${x1.toFixed(2)} ${y1.toFixed(2)}`;
}
function _onbRing(){
  const segs=[['iron',1],['vitC',1],['vitA',.5],['dha',0],['calcium',.5],['zinc',1],['choline',0],['iodine',.5]];
  const cx=84,cy=84,R=68,SW=15,CR=3.6,seg=360/8,gap=4;
  const ri=R-SW/2, ro=R+SW/2; let p='';
  segs.forEach(([k,st],i)=>{
    const a0=-90+i*seg+gap/2, a1=-90+(i+1)*seg-gap/2;
    p+=`<path d="${_roundedSector(cx,cy,ri,ro,a0,a1,CR)}" fill="#ECE3D5"/>`;
    if(st>0){ const ve=a0+(a1-a0)*st; p+=`<path d="${_roundedSector(cx,cy,ri,ro,a0,ve,CR)}" fill="${NUT_COLOR[k]}"/>`; }
  });
  return `<svg viewBox="0 0 168 168" width="168" height="168">${p}<text x="84" y="80" text-anchor="middle" font-family="Fraunces" font-weight="900" font-size="38" fill="var(--euca-deep)">6<tspan font-size="18" fill="var(--ink-faint)"> / 8</tspan></text><text x="84" y="101" text-anchor="middle" font-family="Quicksand" font-weight="700" font-size="9.5" letter-spacing="1.4" fill="var(--ink-faint)">NUTRIENTES</text></svg>`;
}
function _onbChips(){
  const c=(em,nm,tint,on)=>`<div class="onb-chip${on?' on':''}">${on?'<span class="onb-ck">✓</span>':''}<span class="onb-em" style="background:${tint}22">${em}</span><span>${nm}</span></div>`;
  return `<div class="onb-chips">${c('🍗','Pollo','#C2776B',true)}${c('🥦','Brócoli','#8FB0A6',false)}${c('🍓','Fresa','#E0922E',false)}</div>`;
}
function _onbMatrix(){
  const rows=[['#C77E63',[2,2,1,0,1]],['#E0922E',[2,1,2,1,2]],['#9A7B43',[1,2,1,0,1]],['#52716A',[2,2,1,1,0]]];
  const cell=s=> s===2?`<span class="omx" style="background:CC"></span>`:(s===1?`<span class="omx" style="background:linear-gradient(90deg,CC 50%,#ECE3D5 50%)"></span>`:`<span class="omx none"></span>`);
  let h='<div class="onb-mx">';
  rows.forEach(([c,r])=>{ h+='<div class="onb-mxrow">'+r.map(s=>cell(s).replace(/CC/g,c)).join('')+'</div>'; });
  return h+'</div>';
}
function _onbProfileCard(){

    <div id="onb-track" class="onb-track">${panels}</div>
    <div class="onb-foot"><div class="onb-dots">${dots}</div><button id="onb-btn" class="btn primary block onb-btn">Siguiente →</button></div>
  </div>`;

function bindOnboarding(){
  const track=document.getElementById('onb-track');
  const btn=document.getElementById('onb-btn');
  const skip=document.getElementById('onb-skip');
  if(!track||!btn) return;
  const panels=track.querySelectorAll('.onb-panel');
  const dots=document.querySelectorAll('.onb-dot');
  const last=panels.length-1;
  const cur=()=>Math.round(track.scrollLeft/track.clientWidth);
  const sync=()=>{ const i=Math.min(last,Math.max(0,cur()));
    dots.forEach((d,j)=>d.classList.toggle('on',j===i));
    btn.textContent = i===last ? 'Empezar ✦' : 'Siguiente →';
  };
  const finish=()=>{ state._onbDone=true; render(); };
  track.addEventListener('scroll',()=>{ window.requestAnimationFrame(sync); },{passive:true});
  btn.addEventListener('click',()=>{ const i=cur(); if(i>=last){ finish(); } else { track.scrollTo({left:(i+1)*track.clientWidth,behavior:'smooth'}); } });
  if(skip) skip.addEventListener('click',finish);
  sync();
}

        <button class="btn primary block" data-act="closeSheet" style="margin-top:14px">Entendido</button>
      </div>`);
  }
  return '';
}

function sheet(title,inner){ return `<div class="modal-bg" data-sheetbg="1"><div class="sheet"><h3>${title}</h3>${inner}</div></div>`; }
// Re-render preservando el scroll del sheet abierto (evita el "salto" al tocar controles).

// Tras navegar a Registrar (p. ej. desde "Alimentos probados"), localiza el chip del
// alimento, lo centra en pantalla y lo resalta un momento para marcarlo de un toque.
function flashFood(id){
  requestAnimationFrame(()=>{
    const el=document.querySelector(`[data-toggle="${id}"],[data-foodplus="${id}"],[data-foodminus="${id}"]`);
    if(!el) return;
    const wrap=el.closest('.chip-wrap')||el;
    const chip=wrap.querySelector('.chip')||wrap;
    try{ wrap.scrollIntoView({behavior:'smooth', block:'center'}); }catch(e){ wrap.scrollIntoView(); }
    chip.classList.add('flash');
    setTimeout(()=>chip.classList.remove('flash'), 1700);
  });
}
// Informe imprimible para el pediatra (HTML → "Guardar como PDF" del navegador).
// Reusa exactamente las fórmulas de cumplimiento de la pantalla Semana.
function openReport(detailed){
  const p=state.profile, m=ageMonths(), b=band(), g=goals().values;
  const t=todayStr();
  const period=state._repPeriod||'30';
  const today=new Date(t+'T12:00:00');
  let nDays;
  if(period==='7') nDays=7;
  else if(period==='mes'){ nDays=today.getDate(); }
  else nDays=30;
  const range=[]; for(let i=nDays-1;i>=0;i--){ const d=new Date(today); d.setDate(d.getDate()-i); range.push(dstr(d)); }
  const MES3=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const d0=new Date(range[0]+'T12:00:00');
  const rangeLabel=`${d0.getDate()} ${MES3[d0.getMonth()]} – ${today.getDate()} ${MES3[today.getMonth()]} ${today.getFullYear()} · ${nDays} días`;
  let daysReg=0; const dailyMet={iron:0,vitC:0};
  const cov={iron:0,vitC:0,vitA:0,dha:0,calcium:0,zinc:0,choline:0,iodine:0};
  range.forEach(ds=>{ const d=state.days[ds]; if(d&&d.entries.length){ daysReg++; const s=dayStats(d);
    if((s.iron||0)>=g.iron) dailyMet.iron++; if((s.vitC||0)>=g.vitC) dailyMet.vitC++;
    cov.iron+=Math.min(1,(s.iron||0)/g.iron); cov.vitC+=Math.min(1,(s.vitC||0)/g.vitC);
    ['vitA','dha','calcium','zinc','choline','iodine'].forEach(k=>{ const daily=Math.max(0.5,(g[k]||1)/7*2); cov[k]+=Math.min(1,(s[k]||0)/daily); }); } });
  // Clasificación POR DÍA (no promedio): f=alcanzó meta del día, p=parcial, n=sin aporte, u=sin registro.
  const RORDER=['iron','vitC','vitA','dha','calcium','zinc','choline','iodine'];
  const cellState=(k,ds)=>{ const d=state.days[ds]; if(!d||!d.entries.length) return 'u'; const s=dayStats(d); const tgt=(k==='iron'||k==='vitC')?g[k]:Math.max(0.5,(g[k]||1)/7*2); const v=s[k]||0; return v>=tgt?'f':(v>0?'p':'n'); };
  const dist={}; RORDER.forEach(k=>dist[k]={f:0,p:0,n:0});
  range.forEach(ds=>{ const d=state.days[ds]; if(!(d&&d.entries.length))return; RORDER.forEach(k=>{ const st=cellState(k,ds); if(st!=='u') dist[k][st]++; }); });
  const firstSeen={}; Object.keys(state.days).sort().forEach(ds=>{ const d=state.days[ds]; if(!d)return; expandedFoods(d).forEach(f=>{ if(f.id!=null && firstSeen[f.id]===undefined) firstSeen[f.id]=ds; }); });
  const triedInPeriod=new Set(), groupsInPeriod=new Set();
  range.forEach(ds=>{ const d=state.days[ds]; if(!d)return; expandedFoods(d).forEach(f=>{ if(f.id!=null && f.group!=='formulas'){ triedInPeriod.add(f.id); if(f.group!=='custom') groupsInPeriod.add(f.group);} }); });
  let newInPeriod=0; triedInPeriod.forEach(id=>{ if(range.includes(firstSeen[id])) newInPeriod++; });
  const groupsEver=new Set(); for(const ds in state.days){ const d=state.days[ds]; if(d) expandedFoods(d).forEach(f=>{ if(f.group!=='custom'&&f.group!=='formulas') groupsEver.add(f.group); }); }
  const triedN=triedStats().size;
  const intro=[...introducedSet()], avoid=[...avoidSet()], reacted=(p.reactions||[]).map(id=>FOOD[+id]).filter(Boolean);
  const tagList=(arr,warn)=> arr.length? `<div class="rep-tags">${arr.map(x=>`<span class="rep-tag ${warn?'warn':''}">${x}</span>`).join('')}</div>` : '<p class="rep-p" style="color:#857A6F">— ninguno —</p>';
  const MES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const now=new Date(); const fecha=`${now.getDate()} de ${MES[now.getMonth()]} de ${now.getFullYear()}`;
  const feeding=p.feeding||'No especificada';
  const logo=`<svg viewBox="0 0 64 64" width="30" height="30" aria-hidden="true"><rect x="2" y="2" width="60" height="60" rx="16" fill="#FBF6EE"/><path d="M32 32 m-19 0 a19 19 0 0 1 19 -19 L32 32 Z" fill="#6E938B"/><path d="M32 13 a19 19 0 0 1 19 19 L32 32 Z" fill="#C8896E"/><path d="M32 51 a19 19 0 0 1 -19 -19 L32 32 Z" fill="#92D4BD"/><path d="M51 32 a19 19 0 0 1 -19 19 L32 32 Z" fill="#FFC678"/><circle cx="32" cy="32" r="5" fill="#FBF6EE"/></svg>`;
  // Bloques del informe completo (B)
  let detailBlocks='';
  if(detailed){
    const order=['iron','vitC','vitA','dha','calcium','zinc','choline','iodine'];
    const gridDays=range;
    const dayNums=`<div class="rmap-row"><span class="rmap-lab"></span><span class="rmap-cells">${gridDays.map(ds=>`<span class="rmap-n">${new Date(ds+'T12:00:00').getDate()}</span>`).join('')}</span></div>`;
    const gridRows=order.map(k=>`<div class="rmap-row"><span class="rmap-lab">${NUT_SHORT[k]}</span><span class="rmap-cells">${gridDays.map(ds=>`<span class="rmap-c s-${cellState(k,ds)}" style="--nc:${NUT_COLOR[k]}"></span>`).join('')}</span></div>`).join('');
    const DOW=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    const dayFoodBlocks=range.filter(ds=>{const d=state.days[ds];return d&&d.entries.length;}).map(ds=>{
      const d=state.days[ds]; const dt=new Date(ds+'T12:00:00'); const s=dayStats(d);
      const naporte=order.filter(k=>(s[k]||0)>0).length;
      let formCount=0; d.entries.forEach(e=>{ if(e.foodId===107||e.foodId===108) formCount++; });
      const seen=new Set(); const chips=[];
      expandedFoods(d).forEach(f=>{ if(f.id==null||f.group==='formulas'||seen.has(f.id))return; seen.add(f.id);
        const pr=foodPref(f.id); const isRx=(p.reactions||[]).includes(f.id);
        const ic=isRx?' ⚠️':(pr==='like'?' ❤️':(pr==='dislike'?' ☹️':''));
        chips.push(`<span class="rep-fpill${isRx?' rx':''}">${f.emoji||'🍽'} ${f.name.split('(')[0].trim()}${ic}</span>`); });
      if(formCount) chips.push(`<span class="rep-fpill">🍼 Fórmula ×${formCount}</span>`);
      return `<div class="rep-dayb"><div class="rep-dayb-h">${DOW[dt.getDay()]} ${dt.getDate()} ${MES3[dt.getMonth()]} · ${naporte} nutrientes con aporte</div><div class="rep-fpills">${chips.join('')}</div></div>`;
    }).join('');
    const algFirst=a=>{ for(const ds of Object.keys(state.days).sort()){ const d=state.days[ds]; if(d&&entryAllergens(d).has(a)) return ds; } return null; };
    const dstamp=ds=>{ if(!ds) return '—'; const dt=new Date(ds+'T12:00:00'); return `${dt.getDate()} ${MES3[dt.getMonth()]}`; };
    const algRows=intro.length?intro.map(a=>{ const hasRx=reacted.some(f=>(f.allergens||[]).includes(a)); return `<div class="rep-algrow"><b>${a}</b><span>${dstamp(algFirst(a))}</span><span class="${hasRx?'rep-rx':'rep-ok'}">${hasRx?'Con reacción':'Sin reacción'}</span></div>`; }).join(''):'<p class="rep-p" style="color:#857A6F">— ninguno —</p>';
    const rxInfo=p.reactionInfo||{};
    const sevLab={leve:'Leve',moderada:'Moderada',grave:'Grave'};
    const rxRows=reacted.length?reacted.map(f=>{ const inf=rxInfo[f.id]||{}; const a=(f.allergens||[])[0];
      const when=inf.date?dstamp(inf.date):dstamp(a?algFirst(a):null);
      const desc=inf.sev?`${sevLab[inf.sev]||''}${inf.note?' — '+inf.note:''}`:'Reacción registrada';
      return `<div class="rep-algrow"><b>${f.emoji||''} ${f.name.split('(')[0].trim()}</b><span>${when}</span><span class="rep-rx">${desc}</span></div>`; }).join(''):'<p class="rep-p" style="color:#857A6F">— ninguna —</p>';
    detailBlocks=`
      <h2>Mapa de nutrientes del periodo</h2>
      <div class="rmap">${dayNums}${gridRows}</div>
      <div class="rmap-leg"><span class="rmap-c s-f" style="--nc:#6E938B"></span> meta del día <span class="rmap-c s-p" style="--nc:#6E938B"></span> parcial <span class="rmap-c s-n"></span> sin ese nutriente <span class="rmap-c s-u"></span> sin registrar</div>
      <h2>Alimentos por día</h2>
      <p class="rep-p" style="color:#857A6F;margin-top:-2px">Indicadores cuando el cuidador los registró: ❤️ le gustó · ☹️ no le gustó · ⚠️ reacción.</p>
      ${dayFoodBlocks||'<p class="rep-p" style="color:#857A6F">— sin registros en el periodo —</p>'}
      <h2>Alérgenos introducidos</h2>${algRows}
      <h2>Reacciones registradas</h2>${rxRows}`;
  }
  const COVL={iron:'Hierro',vitC:'Vit C',vitA:'Vit A',dha:'Omega-3',calcium:'Calcio',zinc:'Zinc',choline:'Colina',iodine:'Yodo'};
  const covRow=k=>{ const dd=dist[k]; const tot=dd.f+dd.p+dd.n;
    const seg=(v,cls)=> v?`<span class="cov-seg ${cls}" style="flex:${v}"></span>`:'';
    const bar = tot? `<span class="cov-bar">${seg(dd.f,'f')}${seg(dd.p,'p')}${seg(dd.n,'n')}</span>` : `<span class="cov-bar cov-empty"></span>`;
    const sc=k==='iron'||k==='vitC'?'diaria':'semanal';
    return `<tr><td class="cov-nm"><span class="ra-dot" style="background:${NUT_COLOR[k]}"></span>${COVL[k]} <span class="cov-sc">${sc}</span></td>
      <td class="cov-c f">${dd.f}</td><td class="cov-c p">${dd.p}</td><td class="cov-c n">${dd.n}</td><td class="cov-barcell">${bar}</td></tr>`; };
  const aGrid=`<table class="cov-table">
    <thead><tr><th>Nutriente</th><th>En meta<span class="cov-key f"></span></th><th>Parcial<span class="cov-key p"></span></th><th>Sin aporte<span class="cov-key n"></span></th><th></th></tr></thead>
    <tbody>${RORDER.map(covRow).join('')}</tbody></table>`;

      <div class="rep-stat"><b>${daysReg}</b><span>días registrados</span></div>

      <div class="rep-stat"><b>${groupsInPeriod.size}/9</b><span>grupos explorados</span></div>
    </div>`;
  const pills=`<div class="rep-pills no-print">${[['7','7 días'],['30','30 días'],['mes','Mes']].map(x=>`<button class="rep-pill ${period===x[0]?'on':''}" data-repperiod="${x[0]}">${x[1]}</button>`).join('')}</div>`;
  const html=`
    <div class="rep-actions no-print">
      <button class="rep-print">🖨 Imprimir / Guardar como PDF</button>
      <button class="rep-close">Cerrar</button>
    </div>
    <div class="rep-doc">
      <div class="rep-head">
        <div><div class="rep-title">${detailed?'Informe detallado para el pediatra':'Informe resumido para el pediatra'}</div>
        <div class="rep-sub">${p.name||'Bebé'} · ${m} meses · ${b.label}</div>
        <div class="rep-meta">${rangeLabel} · alimentación: ${feeding}</div></div>
        <div class="rep-brand">${logo}<b>Suri</b></div>
      </div>
      ${pills}
      ${detailed?statCards:`
      <h2>Cobertura de nutrientes</h2>
      <p class="rep-p" style="color:#857A6F;margin-top:-2px"><b>${daysReg} días registrados ${period==='mes'?'este mes':'de los últimos '+nDays}</b>. Cada día cuenta por separado (no se promedia): <b>en meta</b> = alcanzó la meta de ese día · <b>parcial</b> = aportó algo por debajo · <b>sin aporte</b> = ese día no se registró el nutriente. Hierro y vit. C usan meta diaria; el resto, una fracción de la meta semanal. Los días sin registro no se cuentan (sin dato ≠ no consumido).</p>
      ${aGrid}
      <h2>Alimentación</h2>
      <p class="rep-p">${triedInPeriod.size} alimentos probados · ${newInPeriod} nuevos · ${groupsInPeriod.size} de 9 grupos explorados · ${feeding} · ${daysReg} de ${nDays} días registrados</p>
      <h2>Alérgenos introducidos</h2>${tagList(intro)}
      ${reacted.length?`<p class="rep-p" style="margin-top:8px"><b>Reacciones:</b></p>${tagList(reacted.map(f=>f.name.split('(')[0].trim()),true)}`:''}`}
      ${detailBlocks}
      <h2>Notas para la consulta</h2>
      <div class="rep-notes-box"></div>
      <div class="rep-foot">Suri es una <b>guía educativa</b>, no consejo médico ni nutricional. Las clasificaciones de nutrientes son aproximadas (basadas en guías OMS/NIH/EFSA) y el seguimiento es por presencia/frecuencia, no por gramos. <b>Deben validarse con tu pediatra o nutriólogo.</b></div>
    </div>`;
  const ov=document.getElementById('report-overlay');

function tabbar(){
  const tabs=[['hoy','Hoy'],['registrar','Registrar'],['semana','Semana'],['ajustes','Ajustes']];
  return `<div class="tabbar">${tabs.map(([k,l])=>`<button class="tab ${state.tab===k?'active':''}" data-tab="${k}">${TAB_IC[k]}<span>${l}</span></button>`).join('')}</div>`;
}
function render(){
  const app=document.getElementById('app');
  if(!state.ready){ app.innerHTML='<div class="empty" style="padding-top:80px">Cargando…</div>'; return; }
  if(!state.profile){
    if(!state._onbDone){ app.innerHTML=screenOnboarding(); bindOnboarding(); return; }
    app.innerHTML=screenWelcome(); bind(); return;
  }
  lifecycle();
  let body='';
  if(state.historyDate) body=screenHistory();
  else if(state.tab==='hoy') body=screenHoy();
  else if(state.tab==='registrar') body=screenRegistrar();
  else if(state.tab==='semana') body=screenSemana();
  else body=screenAjustes();
  // Primera vez en Hoy: mostrar el "cómo funciona" una sola vez por perfil.
  if(state.tab==='hoy' && !state.historyDate && !state.profile.seenNutInfo && !state.sheet){
    state.sheet={type:'nutInfo', page:1}; state.profile.seenNutInfo=true; saveProfile();
  }
  app.innerHTML=body+tabbar()+(state.sheet?sheetHTML():'')+(state.toast?`<div class="toast" id="suri-toast">${state.toast}</div>`:'');
  bind();
  // Al cambiar de pantalla (o entrar/salir de modo recuperación), posicionar arriba.
  const navKey = state.tab + '|' + (state.recoveryDate||'') + '|' + (state.historyDate||'');
  if(window.__lastNav !== navKey){
    window.__lastNav = navKey;
    window.scrollTo(0,0);
    if(document.scrollingElement) document.scrollingElement.scrollTop=0;
    document.documentElement.scrollTop=0; document.body.scrollTop=0;
  }
}

/* ---------------- EVENTOS ------------------------------------------ */
window._search=v=>{
  state._q=v;
  // Re-render aislado: solo el contenedor de resultados, NO el input ni la pantalla.
  // Así no se pierden letras ni se desplaza la página al escribir.
  const box=document.getElementById('cat-results');
  if(!box || state.tab!=='registrar'){ render(); return; }
  const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const q=(v||'').toLowerCase().trim(), qn=norm(q);
  const day=ensureDay(state.recoveryDate||todayStr());
  const elig=eligibleFoods();
  let filtered = elig;
  const nutFilter = state._regNut;
  if(nutFilter) filtered = filtered.filter(f=>f.flags[nutFilter]==='A'||f.flags[nutFilter]==='M');
  if(q) filtered = filtered.filter(f=>norm(f.name).includes(qn));
  box.innerHTML = renderCatResults(day, q, qn, filtered, nutFilter, state._regGrp);
};
window._setMoveTo=v=>{ if(state.sheet && state.sheet.type==='moveDay'){ state.sheet.to=v; render(); } };
window._pouchSearch=v=>{
  const box=document.getElementById('pouch-search-results'); if(!box) return;
  const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const q=norm(v||''); if(q.length<2){ box.innerHTML=''; return; }
  const cur=new Set(state.sheet.pouch.ingredients||[]);
  const matches=D.foods.filter(f=>f.id>0&&norm(f.name).includes(q)&&!cur.has(f.id)).slice(0,6);
  box.innerHTML = matches.length
    ? matches.map(f=>`<button class="alg" data-pouchadd="${f.id}">＋ ${f.emoji} ${f.name.split('(')[0].trim()}</button>`).join('')
    : '<span class="faint">Sin coincidencias</span>';
};
window._importData=async function(input){
  const file = input.files?.[0]; if(!file) return;
  try{
    const txt = await file.text();
    const data = JSON.parse(txt);
    const isMulti = Array.isArray(data.babies);
    if(!isMulti && (!data.profile || !data.days)){ toast('Archivo no válido'); return; }
    if(!confirm('Reemplazar tus datos actuales con este respaldo? No se puede deshacer.')) return;
    if(isMulti){
      state.babies = data.babies;
      state.activeId = (data.activeBaby!=null && data.babies.find(b=>b.id===data.activeBaby)) ? data.activeBaby : (data.babies[0]?.id ?? null);
    } else {
      // Respaldo antiguo de un solo perfil → un bebé.
      state.babies = [{id:1, profile:data.profile, days:data.days}];
      state.activeId = 1;
    }
    state.settings = data.settings || state.settings;
    _bindActiveBaby();
    await Promise.all([ sset('app:babies', state.babies), sset('app:activeBaby', state.activeId), saveSettings() ]);
    toast('Datos restaurados ✓'); render();
  }catch(e){ toast('No se pudo leer el archivo'); }
};
window._foodAvoidSearch=v=>{
  const box=document.getElementById('pf-foodresults'); if(!box) return;
  const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const q=norm(v||''); if(q.length<2){ box.innerHTML=''; return; }
  const cur=new Set((state._draft||state.profile||{}).avoidFoods||[]);
  const matches=D.foods.filter(f=>norm(f.name).includes(q)&&!cur.has(f.id)).slice(0,6);
  box.innerHTML = matches.length
    ? matches.map(f=>`<button class="alg" data-addavoid="${f.id}">＋ ${f.emoji} ${f.name.split('(')[0].trim()}</button>`).join('')
    : '<span class="faint">Sin coincidencias</span>';
};

function readProfileForm(base){
  const g=id=>document.getElementById(id);
  const p=Object.assign({}, base||{});
  p.name=(g('pf-name')?.value||'').trim()||'Bebé';
  p.birth=g('pf-birth')?.value||p.birth;
  p.weight=g('pf-weight')?.value||'';
  p.notes=(g('pf-notes')?.value||'').trim();
  // supplements y allergies se manejan por chips en el draft, no por input de texto
  return p;
}
function bind(){
  const app=document.getElementById('app');
  app.onclick=async (ev)=>{
    // Cerrar modal SOLO si el clic fue directamente en el fondo (no en su contenido)
    if(ev.target.dataset && ev.target.dataset.sheetbg){ state.sheet=null; render(); return; }
    const el=ev.target.closest('[data-tab],[data-act],[data-toggle],[data-pref],[data-retry],[data-idea],[data-regnut],[data-reggrp],[data-grptoggle],[data-other],[data-othersub],[data-foodplus],[data-foodminus],[data-suggadd],[data-feed],[data-formplus],[data-formminus],[data-alg],[data-supp],[data-addavoid],[data-avoidfood],[data-pouchremove],[data-pouchadd],[data-recday],[data-histday],[data-unavoid],[data-react-rm]');
    if(window.__suriDebug){
      const info = el ? (el.dataset.act||el.dataset.grptoggle||el.dataset.tab||el.dataset.toggle||Object.keys(el.dataset).join(',')) : 'NO MATCH';
      const tag = el ? el.tagName : ev.target.tagName;
      window.__suriDbg(`click → ${tag} [${info}]`);
    }
    if(!el) return;

    // PREFERENCIA 👍/👎 — se evalúa ANTES que nada y corta, para que jamás
    // togglee el alimento ni navegue. Es independiente del consumo.
    if(el.dataset.pref){ ev.preventDefault(); ev.stopPropagation();
      const [val,id]=el.dataset.pref.split(':'); setPref(+id,val);
      state._pressedPref = `${val}:${id}`;
      setTimeout(()=>{ state._pressedPref=null; }, 500);
      if(val==='dislike' && !retrySet().has(+id)){
        state.sheet={type:'retryOffer', foodId:+id}; render(); return; }
      toast(val==='like'?'Anotado: le gustó 👍':'Anotado: no le gustó 👎'); render();
      return; }
    if(el.dataset.retry){ ev.preventDefault(); ev.stopPropagation();
      const id=+el.dataset.retry; toggleRetry(id);
      toast(retrySet().has(id)?'Lo reintentarás otro día 🔁':'Quitado de reintentar'); render();
      return; }

    // draft persistence for forms before navigating
    const inForm=document.getElementById('pf-name');
    if(inForm && (el.dataset.feed||el.dataset.formplus||el.dataset.formminus||el.dataset.alg||el.dataset.supp||el.dataset.addavoid||el.dataset.avoidfood||el.dataset.act==='saveProfile')){
      const cur=readProfileForm(state._draft||state.profile||{});
      state._draft=Object.assign({}, state._draft||{}, cur);
    }

    if(el.dataset.tab){ state.tab=el.dataset.tab; state.recoveryDate=null; state.historyDate=null; state._q=''; state._regNut=null; state._regGrp=null; state._weekOffset=0; render(); return; }

    // IDEA (desde Hoy): no registra; lleva a Registrar y abre el grupo del alimento
    if(el.dataset.idea){ const id=+el.dataset.idea; const f=FOOD[id]; state.tab='registrar'; state._regNut=null; state._regGrp=f?.group||null; state._openGroups={...(state._openGroups||{}),[f?.group]:true}; state._q=''; render(); flashFood(id); return; }
    // Atajo "ver todos" de un nutriente (desde Hoy): Registrar pre-filtrado
    if(el.dataset.regnut){ state.tab='registrar'; state._regNut=el.dataset.regnut; state._regGrp=null; state._q=''; render(); return; }
    // Tocar un grupo en Hoy: Registrar con ese grupo abierto
    if(el.dataset.reggrp){ state.tab='registrar'; state._regNut=null; state._regGrp=el.dataset.reggrp; state._openGroups={...(state._openGroups||{}),[el.dataset.reggrp]:true}; state._q=''; render(); return; }
    // Expandir/colapsar grupo en Registrar
    if(el.dataset.grptoggle){ state._openGroups=state._openGroups||{}; const k=el.dataset.grptoggle; state._openGroups[k]=!state._openGroups[k]; render(); return; }
    if(el.dataset.reactRm){ const id=+el.dataset.reactRm;
      state.profile.reactions=(state.profile.reactions||[]).filter(x=>x!==id);
      saveProfile(); toast('Marca de reacción quitada'); render(); return; }
    if(el.dataset.unavoid){ const a=el.dataset.unavoid;
      if(confirm(`¿Quitar "${a}" de los alérgenos a evitar? Volverá a aparecer al registrar.`)){
        setAlergStatus(a,null); toast(`${a} ya no está en evitar`); render(); } return; }

    if(el.dataset.toggle){
      const id=+el.dataset.toggle, day=ensureDay(state.recoveryDate||todayStr());
      const f=FOOD[id];
      const adding = !hasFood(day,id);
      // Al seleccionar desde una búsqueda, limpiar el filtro para que vuelvan
      // a mostrarse todos los alimentos (incluidos los ya marcados), no solo
      // el que se buscó. El input se re-renderiza vacío en el siguiente render.
      const wasSearching = !!state._q;
      if(wasSearching){ state._q=''; if(f && f.group){ state._openGroups={...(state._openGroups||{}), [f.group]:true}; } }
      // Detectar primera vez con fórmula → mensaje informativo educativo
      let firstFormula=false;
      if(adding && f && f.group==='formulas' && !state.profile.seenFormulaNote){
        firstFormula=true;
      }
      // Detectar primera exposición a alérgenos mayores (solo al AÑADIR, no al quitar).
      // Alimento directo → hoja guía (con botón de reacción). Comida (pouch) → registra
      // sus alérgenos en el rastreador con un aviso breve (la reacción a una comida es
      // ambigua: no se sabe qué ingrediente la causó).
      let firstAlg=null, pouchNewAlgs=[];
      if(adding && !state.recoveryDate){
        if(f && f.allergens.length){
          for(const a of f.allergens){
            const st=alergStatus(a);
            if(!st && allergenFirstSeen(a,true)){ firstAlg=a; break; }
          }
        } else if(!f){
          const p=(state.profile?.pouches||[]).find(x=>x.id===id);
          if(p){ const s=new Set(); p.ingredients.forEach(fid=>FOOD[fid]?.allergens.forEach(a=>s.add(a)));
            pouchNewAlgs=[...s].filter(a=>!alergStatus(a) && allergenFirstSeen(a,true)); }
        }
      }
      const before = state.recoveryDate ? null : nutrientsState(todayStr());
      toggleFood(day,id,!!state.recoveryDate);
      if(firstFormula){ state.profile.seenFormulaNote=true;
        // La fórmula introduce leche: marca su alérgeno como "probando" para no
        // volver a avisar "primera vez" con la otra fórmula, el yogur, el queso, etc.
        (f.allergens||[]).forEach(a=>{ if(!alergStatus(a)) setAlergStatus(a,'probando'); });
        saveProfile();
        state.sheet={type:'formulaInfo'}; render(); return; }
      // Si fue primera exposición, marcar como "probando" (se promueve a intro tras 48h)
      if(firstAlg){ setAlergStatus(firstAlg,'probando');
        state.sheet={type:'firstAllergen', allergen:firstAlg, foodId:id}; render(); return; }
      // Comida con alérgenos nuevos: alimenta el rastreador sin hoja de reacción.
      if(pouchNewAlgs.length){ pouchNewAlgs.forEach(a=>setAlergStatus(a,'probando'));
        toast(`Primer contacto con ${pouchNewAlgs.join(', ')} (en tu comida) · obsérvalo y consúltalo con tu pediatra`);
        render(); return; }
      if(before){
        const after=nutrientsState(todayStr());
        const justDone=after.find(n=>(n.key==='iron'||n.key==='vitC') && n.val>=n.target && (before.find(b=>b.key===n.key)?.val||0)<n.target);
        if(justDone){ toast(`${justDone.name} cubierto 🎉`); render(); return; }
      }
      render(); return;
    }
    // Fórmulas: + / − tomas (cada toma es una entrada; suman a los nutrientes del día)
    if(el.dataset.suggadd){ ev.stopPropagation(); const id=+el.dataset.suggadd; const f=FOOD[id]; const day=ensureDay(todayStr()); addEntry(day,id); toast('✓ '+(f?f.name.split('(')[0].trim():'Alimento')+' agregado a hoy'); render(); return; }
    if(el.dataset.foodplus){ ev.stopPropagation(); const day=ensureDay(state.recoveryDate||todayStr()); addEntry(day,+el.dataset.foodplus, !!state.recoveryDate); render(); return; }
    if(el.dataset.foodminus){ ev.stopPropagation(); const day=ensureDay(state.recoveryDate||todayStr()); removeEntry(day,+el.dataset.foodminus); render(); return; }
    // Crédito "otro" (nutriente fuera de catálogo). El "–" resta; el resto suma.
    if(el.dataset.othersub){ ev.stopPropagation(); const day=ensureDay(state.recoveryDate||todayStr()); subOther(day,el.dataset.othersub); render(); return; }
    if(el.dataset.other){ const day=ensureDay(state.recoveryDate||todayStr()); addOther(day,el.dataset.other); render(); return; }

    if(el.dataset.feed){ state._draft=state._draft||{}; state._draft.feeding=el.dataset.feed; render();
      if(el.dataset.feed==='Fórmula'||el.dataset.feed==='Mixta'){
        toast('💡 Registra cada toma de fórmula para sumar los nutrientes que aporta junto con los demás alimentos.', 4200); }
      else if(el.dataset.feed==='Materna'){
        toast('🤱 La leche materna es el mejor alimento del bebé: lo protege de infecciones, se adapta a sus necesidades y fortalece el vínculo. Suri no la suma a los nutrientes porque su composición varía y no se mide por toma; esas metas se cubren con los alimentos.', 7000); }
      return; }
    if(el.dataset.formplus){ state._draft=state._draft||{}; state._draft.formulaPerDay=Math.min(8,(state._draft.formulaPerDay||0)+1); render(); return; }
    if(el.dataset.formminus){ state._draft=state._draft||{}; state._draft.formulaPerDay=Math.max(0,(state._draft.formulaPerDay||0)-1); render(); return; }
    if(el.dataset.alg){ state._draft=state._draft||{allergies:[]}; state._draft.allergies=state._draft.allergies||[];
      const a=el.dataset.alg, cur=state._draft.allergies.find(x=>x.a===a);
      if(!cur) state._draft.allergies.push({a,s:'evitar'});
      else if(cur.s==='evitar') cur.s='intro';
      else state._draft.allergies=state._draft.allergies.filter(x=>x.a!==a);
      render(); return; }
    if(el.dataset.supp){ state._draft=state._draft||{}; state._draft.supplements=state._draft.supplements||[];
      const k=el.dataset.supp, i=state._draft.supplements.indexOf(k);
      i>=0? state._draft.supplements.splice(i,1) : state._draft.supplements.push(k);
      render(); return; }
    if(el.dataset.addavoid){ state._draft=state._draft||{}; state._draft.avoidFoods=[...(state._draft.avoidFoods||[])];
      const id=+el.dataset.addavoid; if(!state._draft.avoidFoods.includes(id)) state._draft.avoidFoods.push(id);
      render(); return; }
    if(el.dataset.avoidfood){ state._draft=state._draft||{}; state._draft.avoidFoods=(state._draft.avoidFoods||[]).filter(x=>x!==+el.dataset.avoidfood);
      render(); return; }
    if(el.dataset.histday){ state.historyDate=el.dataset.histday; state.sheet=null; render(); return; }
    if(el.dataset.recday){ state.recoveryDate=el.dataset.recday; state.sheet=null; state.tab='registrar'; render(); return; }
    if(el.dataset.pouchremove){
      // preservar nombre que el usuario está escribiendo antes del re-render
      const cur=document.getElementById('pouch-name')?.value;
      if(cur!=null) state.sheet.pouch.name=cur;
      const fid=+el.dataset.pouchremove;
      state.sheet.pouch.ingredients = state.sheet.pouch.ingredients.filter(x=>x!==fid);
      render(); return;
    }
    if(el.dataset.pouchadd){
      const cur=document.getElementById('pouch-name')?.value;
      if(cur!=null) state.sheet.pouch.name=cur;
      const fid=+el.dataset.pouchadd;
      if(!state.sheet.pouch.ingredients.includes(fid)) state.sheet.pouch.ingredients.push(fid);
      render(); return;
    }

    const act=el.dataset.act;
    const day=ensureDay(state.recoveryDate||todayStr());
    if(act==='goReg'){ state.tab='registrar'; state._regNut=null; state._regGrp=null; state._q=''; render(); }
    else if(act==='clearFilter'){ state._regNut=null; render(); }
    else if(act==='weekPrev'){ state._weekOffset=(state._weekOffset||0)+1; render(); }
    else if(act==='weekNext'){ state._weekOffset=Math.max(0,(state._weekOffset||0)-1); render(); }
    else if(act==='histPrev'){ if(state.historyDate){ const p=addDays(state.historyDate,-1); if(p>=histFloor()){ state.historyDate=p; render(); } } }
    else if(act==='histNext'){ if(state.historyDate){ const n=addDays(state.historyDate,1); if(n<=todayStr()){ state.historyDate=n; render(); } } }
    else if(act==='histClose'){ state.historyDate=null; state.tab='semana'; render(); }
    else if(act==='histEdit'){ const d=state.historyDate; state.historyDate=null;
      if(d===todayStr()){ state.recoveryDate=null; } else { state.recoveryDate=d; }
      state._regNut=null; state._regGrp=null; state._q=''; state.tab='registrar'; render(); }
    else if(act==='gohoy'){ state.tab='hoy'; state._regNut=null; state._regGrp=null; render(); }
    else if(act==='toggleEndOfDay'){ state.settings.endOfDayReminder = !(state.settings.endOfDayReminder!==false); saveSettings(); render(); }
    else if(act==='toggleDaysReminder'){ state.settings.daysReminder = !(state.settings.daysReminder!==false); saveSettings(); render(); }
    else if(act==='allowEarly'){ state.profile.allowEarly=true; saveProfile(); state.tab='registrar'; toast('Registro temprano activado'); render(); }
    else if(act==='recovery'){ state.sheet='recovery'; render(); }
    else if(act==='repeatPrev'){ const pk=lastLoggedBefore(todayStr());
      if(pk){ const d=ensureDay(todayStr()); let n=0;
        [...new Set(state.days[pk].entries.map(e=>e.foodId).filter(id=>id!==107&&id!==108))].forEach(id=>{ if(!hasFood(d,id)){ addEntry(d,id); n++; } });
        toast(n?`Se añadieron ${n} alimento${n===1?'':'s'} de ese día`:'Ya tenías todo lo de ese día'); }
      render(); }
    else if(act==='exitRecovery'){ state.recoveryDate=null; state._regNut=null; state._regGrp=null; render(); }
    else if(act==='firstAlgNext'){ state.sheet={...state.sheet, page:2}; render(); }
    else if(act==='firstAlgPrev'){ state.sheet={...state.sheet, page:1}; render(); }
    else if(act==='nutInfo'){ state.sheet={type:'nutInfo', page:1}; render(); }
    else if(act==='nutInfoNext'){ state.sheet={type:'nutInfo', page:2}; render(); }
    else if(act==='nutInfoPrev'){ state.sheet={type:'nutInfo', page:1}; render(); }
    else if(act && act.indexOf('info')===0 && INFO_SHEETS[act]){ state.sheet={type:'simpleInfo', key:act}; render(); }
    else if(act==='datosInfo'){ state.sheet={type:'simpleInfo', key:'datosInfo'}; render(); }
    else if(act==='hitosInfo'){ state.sheet={type:'simpleInfo', key:'hitosInfo'}; render(); }
    else if(act==='triedInfo'){ state.sheet={type:'simpleInfo', key:'triedInfo'}; render(); }
    else if(act==='cutGuide'){ state.sheet={type:'cutGuide'}; render(); }
    else if(act==='report'){ openReport(false); }
    else if(act==='reportFull'){ openReport(true); }
    else if(act==='babies'){ state.sheet={type:'babies'}; render(); }
    else if(act==='addBaby'){ _syncActive(); await sset('app:babies', state.babies);
      state.activeId=null; state.profile=null; state.days={}; state._draft=null; state.recoveryDate=null; state.sheet=null; state.tab='hoy'; render(); }
    else if(act && act.startsWith('switchBaby:')){ const id=+act.split(':')[1];
      _syncActive(); await sset('app:babies', state.babies);
      state.activeId=id; await sset('app:activeBaby', id); _bindActiveBaby();
      state.recoveryDate=null; state.sheet=null; state.tab='hoy'; render(); }
    else if(act && act.startsWith('delBaby:')){ const id=+act.split(':')[1];
      const bb=(state.babies||[]).find(x=>x.id===id);
      if(confirm(`¿Eliminar a ${bb?.profile?.name||'este bebé'} y todos sus registros? No se puede deshacer.`)){
        state.babies=state.babies.filter(x=>x.id!==id);
        if(state.activeId===id){ state.activeId=state.babies[0]?.id ?? null; _bindActiveBaby(); }
        await Promise.all([ sset('app:babies', state.babies), sset('app:activeBaby', state.activeId) ]);
        render(); } }
    else if(act==='printReport'){ window.print(); }
    else if(act==='toggleTried'){ state._showTried=!state._showTried; render(); }
    else if(act==='closeSheet'){ state.sheet=null; render(); }
    else if(act==='closeFirstAlg'){ state.sheet=null; render(); }
    else if(act==='reportReaction'){
      const fid=state.sheet?.foodId;
      if(fid){ state.sheet={type:'reactionSev', foodId:fid, sev:null, note:''}; render(); }
    }
    else if(act && act.startsWith('rxSev:')){
      const n=document.getElementById('rxNote'); if(n&&state.sheet) state.sheet.note=n.value;
      if(state.sheet) state.sheet.sev=act.split(':')[1];
      render();
    }
    else if(act==='retryYes'){ const fid=state.sheet?.foodId; if(fid && !retrySet().has(fid)) toggleRetry(fid); toast('Guardado en “Para reintentar” 🔁'); state.sheet=null; render(); }
    else if(act==='retryNo'){ toast('Anotado: no le gustó 👎'); state.sheet=null; render(); }
    else if(act==='saveReaction'){
      const fid=state.sheet?.foodId, sev=state.sheet?.sev;
      const n=document.getElementById('rxNote'); const note=n?n.value.trim():'';
      if(fid && sev){
        state.profile=state.profile||{}; state.profile.reactions=state.profile.reactions||[];
        if(!state.profile.reactions.includes(fid)) state.profile.reactions.push(fid);
        state.profile.reactionInfo=state.profile.reactionInfo||{};
        state.profile.reactionInfo[fid]={sev, note, date:todayStr()};
        await saveProfile();
        toast('Reacción registrada · coméntalo con tu pediatra'); state.sheet=null; render();
      } else { toast('Elige la intensidad de la reacción'); }
    }
    else if(act==='moveDay'){
      const fromStr = state.recoveryDate || todayStr();
      state.sheet={type:'moveDay', from:fromStr, to:''};
      render();
    }
    else if(act && act.startsWith('moveDayConfirm:')){
      const mode = act.split(':')[1];  // 'simple' | 'merge' | 'replace'
      const fromStr = state.sheet.from, toStr = state.sheet.to;
      if(!toStr || toStr===fromStr){ toast('Elige una fecha distinta'); return; }
      const fromDay = state.days[fromStr];
      if(!fromDay || !fromDay.entries.length){ toast('Nada que mover'); state.sheet=null; render(); return; }
      const toDay = state.days[toStr] || ensureDay(toStr);
      if(mode==='replace'){
        toDay.entries = [...fromDay.entries];
        toDay.others = {...(fromDay.others||{})};
      } else if(mode==='merge'){
        toDay.entries = [...(toDay.entries||[]), ...fromDay.entries];
        const o={...(toDay.others||{})};
        for(const k in (fromDay.others||{})){ o[k]=(o[k]||0)+(fromDay.others[k]||0); }
        toDay.others=o;
      } else {
        // 'simple': el destino estaba vacío
        toDay.entries = [...fromDay.entries];
        toDay.others = {...(fromDay.others||{})};
      }
      // Limpiar el día de origen
      fromDay.entries = [];
      fromDay.others = {};
      await saveDays();
      const toLabel=new Date(toStr+'T12:00:00').toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'});
      toast(`Día movido a ${toLabel}`);
      state.sheet=null;
      // Si estábamos en modo recuperación de la fecha de origen, salir
      if(state.recoveryDate===fromStr){ state.recoveryDate=null; state.tab='hoy'; }
      window.__lastNav=null;
      render();
    }
    else if(act==='editProfile'){ state._draft=JSON.parse(JSON.stringify(state.profile)); state.sheet='editProfile'; render(); }
    else if(act==='newPouch'){
      // siguiente id negativo libre
      const pouches=state.profile?.pouches||[];
      const nextId = Math.min(-1, ...pouches.map(p=>p.id-1));
      state.sheet={type:'editPouch', pouch:{id:nextId, name:'', emoji:'🍱', ingredients:[], _isNew:true}};
      render();
    }
    else if(act && act.startsWith('editPouch:')){
      const id=parseInt(act.split(':')[1],10);
      const p=(state.profile?.pouches||[]).find(x=>x.id===id);
      if(p) state.sheet={type:'editPouch', pouch:JSON.parse(JSON.stringify(p))};
      render();
    }
    else if(act==='savePouch'){
      const p=state.sheet.pouch;
      const name=document.getElementById('pouch-name')?.value.trim();
      if(!name){ toast('Ponle un nombre al pouch'); return; }
      if(!p.ingredients.length){ toast('Añade al menos un ingrediente'); return; }
      p.name=name; delete p._isNew;
      state.profile.pouches=state.profile.pouches||[];
      const i=state.profile.pouches.findIndex(x=>x.id===p.id);
      if(i>=0) state.profile.pouches[i]=p; else state.profile.pouches.push(p);
      await saveProfile(); state.sheet=null; toast('Pouch guardado ✓'); render();
    }
    else if(act==='deletePouch'){
      const id=state.sheet.pouch.id;
      if(confirm('¿Eliminar esta comida? Los registros que ya hiciste no se pierden, pero la comida dejará de aparecer.')){
        state.profile.pouches=(state.profile.pouches||[]).filter(x=>x.id!==id);
        await saveProfile(); state.sheet=null; render();
      }
    }
    else if(act==='newCustom'){
      // ids personalizados en rango propio (≤ −1001) para no colisionar con pouches.
      const items=state.profile?.customItems||[];
      const nextId = Math.min(-1001, ...items.map(c=>c.id-1));
      state.sheet={type:'editCustom', item:{id:nextId, name:'', emoji:'🥄',
        flags:{iron:null,zinc:null,vitA:null,vitC:null,dha:null,calcium:null,choline:null,iodine:null},
        daily:false, dailySince:null, _isNew:true}};
      render();
    }
    else if(act && act.startsWith('editCustom:')){
      const id=parseInt(act.split(':')[1],10);
      const c=(state.profile?.customItems||[]).find(x=>x.id===id);
      if(c) state.sheet={type:'editCustom', item:JSON.parse(JSON.stringify(c))};
      render();
    }
    else if(act && act.startsWith('cflag:')){
      // Preservar el nombre tecleado antes de re-renderizar el sheet.
      const _nm=document.getElementById('custom-name'); if(_nm) state.sheet.item.name=_nm.value;
      const [,k,v]=act.split(':');
      state.sheet.item.flags[k] = (v==='none') ? null : v;
      rerenderKeepSheetScroll();
    }
    else if(act==='cdaily'){
      const _nm=document.getElementById('custom-name'); if(_nm) state.sheet.item.name=_nm.value;
      state.sheet.item.daily=!state.sheet.item.daily;
      rerenderKeepSheetScroll();
    }
    else if(act && act.startsWith('cemoji:')){
      const _nm=document.getElementById('custom-name'); if(_nm) state.sheet.item.name=_nm.value;
      state.sheet.item.emoji=act.slice('cemoji:'.length);
      rerenderKeepSheetScroll();
    }
    else if(act==='saveCustom'){
      const c=state.sheet.item;
      const name=document.getElementById('custom-name')?.value.trim();
      if(!name){ toast('Ponle un nombre'); return; }
      const hasFlag=NUT_ORDER.some(k=>c.flags[k]);
      if(!hasFlag){ toast('Marca al menos un nutriente que aporte'); return; }
      c.name=name; delete c._isNew;
      // Fecha de inicio de siembra diaria: hoy en adelante (no reescribe historial).
      if(c.daily){ if(!c.dailySince) c.dailySince=todayStr(); }
      else { c.dailySince=null; }
      state.profile.customItems=state.profile.customItems||[];
      const i=state.profile.customItems.findIndex(x=>x.id===c.id);
      if(i>=0) state.profile.customItems[i]=c; else state.profile.customItems.push(c);
      await saveProfile(); seedCustom(todayStr()); state.sheet=null; toast('Guardado ✓'); render();
    }
    else if(act==='deleteCustom'){
      const id=state.sheet.item.id;
      if(confirm('¿Eliminar este alimento o suplemento? Los registros que ya hiciste no se pierden, pero dejará de aparecer en la lista.')){
        state.profile.customItems=(state.profile.customItems||[]).filter(x=>x.id!==id);
        await saveProfile(); state.sheet=null; render();
      }
    }
    else if(act==='saveProfile'){
      const p=readProfileForm(state._draft||state.profile||{});
      p.allergies=(state._draft||{}).allergies||state.profile?.allergies||[];
      p.feeding=(state._draft||{}).feeding||state.profile?.feeding||'';
      p.supplements=(state._draft||{}).supplements||state.profile?.supplements||[];
      p.avoidFoods=(state._draft||{}).avoidFoods||state.profile?.avoidFoods||[];
      if(!p.birth){ toast('Agrega la fecha de nacimiento'); return; }
      p.groupGoal=state.profile?.groupGoal||null;
      // Tomas de fórmula automáticas
      p.formulaPerDay = (state._draft||{}).formulaPerDay ?? state.profile?.formulaPerDay ?? 0;
      if(p.formulaPerDay>0){ p.formulaSince = state.profile?.formulaSince || todayStr(); }
      else { p.formulaSince = null; }
      state.profile=p; await saveProfile(); seedFormula(todayStr()); seedCustom(todayStr()); state.sheet=null; state._draft=null; state.tab='hoy'; window.__lastNav=null; render();
    }
    else if(act==='exportData'){
      _syncActive();
      const blob = new Blob([JSON.stringify({version:2, exportedAt:new Date().toISOString(),
        babies:state.babies, activeBaby:state.activeId, settings:state.settings}, null, 2)],
        {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href=url; a.download=`suri-respaldo-${todayStr()}.json`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
      toast('Respaldo descargado');
    }
    else if(act==='importData'){ document.getElementById('pf-importfile')?.click(); }
    else if(act==='reset'){
      const multi=(state.babies||[]).length>1;
      const msg = multi ? `¿Borrar a ${state.profile?.name||'este bebé'} y todos sus registros? No se puede deshacer.`
                        : '¿Borrar perfil, registros y ajustes? No se puede deshacer.';
      if(confirm(msg)){
        state.babies=(state.babies||[]).filter(b=>b.id!==state.activeId);
        if(state.babies.length){ state.activeId=state.babies[0].id; }
        else { state.activeId=null; state.settings={closeHour:22,reminderDays:2,endOfDayReminder:true,daysReminder:true}; await saveSettings(); }
        _bindActiveBaby();
        await Promise.all([ sset('app:babies', state.babies), sset('app:activeBaby', state.activeId) ]);
        state.tab='hoy'; state.sheet=null; render();
      }
    }
  };
}

/* ---------------- INIT --------------------------------------------- */
(async ()=>{
  const splashStart=Date.now();
  await loadAll(); seedFormula(todayStr()); seedCustom(todayStr()); render();
  // El splash se ve siempre al abrir; se desvanece tras un mínimo de 1.4s
  // (aunque la app ya esté lista) y se retira del DOM al terminar.
  const sp=document.getElementById('suri-splash');
  if(sp){
    const wait=Math.max(0, 1400-(Date.now()-splashStart));
    setTimeout(()=>{ sp.classList.add('hide'); setTimeout(()=>sp.remove(), 550); }, wait);
  }
})();
</script></body></html>
