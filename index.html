<style>:root{
  --peach:#C8896E; --wheat:#E0CDA8; --euca:#6E938B; --cream:#FFC678; --mint:#92D4BD;
  --euca-dark:#3F5A52; --euca-deep:#22382F;
  --peach-dark:#8B4630;
  --ink:#2A2521; --ink-soft:#5C534B; --ink-faint:#857A6F;
  /* Fondo: off-white cálido, casi blanco pero con un toque crema para no sentir hospital.
     Las cards son blanco puro y la diferenciación viene de la SOMBRA, no del fondo. */
  --bg:#FBFAF5; --bg2:#F2EDDF; --card:#FFFFFF; --line:#E8DFCC;
  --mint-tint:#C3E2D3; --wheat-tint:#EFE2C5; --cream-tint:#FFE0B6; --peach-tint:#E8C7B5; --euca-tint:#C8DCD4;
  --ok:#4E8474; --warn:#B97B2C;
  /* Sombra mucho más presente: cards "flotan" sobre el fondo claro como Apple Health/Headspace */
  --shadow:0 1px 3px rgba(60,50,35,.06), 0 8px 24px rgba(60,50,35,.10), 0 32px 64px rgba(60,50,35,.06);
  --r:14px; --r-lg:20px; --r-pill:999px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Quicksand','Nunito',system-ui,-apple-system,'Segoe UI',sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.55;
  font-size:18px; -webkit-font-smoothing:antialiased;
}
h1,h2,h3{font-family:'Fraunces','Quicksand',Georgia,serif; font-weight:600; line-height:1.2; color:var(--euca-deep)}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
input,select{font-family:inherit; font-size:16px}

#app{max-width:480px; margin:0 auto; min-height:100%; position:relative; padding-bottom:88px}
.screen{padding:20px 18px 10px; animation:enter .32s cubic-bezier(.22,.61,.36,1)}
@keyframes enter{
  from{opacity:0; transform:translateY(8px)}
  to{opacity:1; transform:none}
}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes up{from{transform:translate(-50%,12px);opacity:0}to{transform:translate(-50%,0);opacity:1}}

.topbar{display:flex; align-items:flex-start; justify-content:space-between; gap:10px; padding:8px 2px 18px}
.topbar > div:first-child{flex:1; min-width:0}
.hello{font-size:13.5px; color:var(--ink-soft); font-weight:600; letter-spacing:.01em; margin-bottom:2px}
.babyname{font-size:26px; font-family:'Fraunces',Georgia,serif; font-weight:600;
  color:var(--ink); letter-spacing:-.015em; line-height:1.1}
.age-pill{background:var(--euca-tint); color:var(--euca-deep); font-size:13px; font-weight:800;
  padding:6px 12px; border-radius:var(--r-pill); white-space:nowrap; margin-top:4px}

/* cards */
.card{background:var(--card); border:none; border-radius:20px;
  padding:18px; box-shadow:var(--shadow); margin-bottom:16px}
.card h3{font-size:19px; margin-bottom:4px; color:var(--euca-deep);
  font-family:'Fraunces',Georgia,serif; font-weight:600; letter-spacing:-.01em}
.muted{color:var(--ink-soft); font-size:15px; font-weight:500}
.faint{color:var(--ink-soft); font-size:13.5px; font-weight:500}

/* objective hero */
.objective{background:linear-gradient(160deg,var(--euca-tint),var(--mint-tint));
  border:1px solid #D5E3DE; position:relative; overflow:hidden}
.obj-tag{display:inline-flex; align-items:center; gap:6px; background:var(--euca);
  color:#fff; font-size:11.5px; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
  padding:5px 11px; border-radius:var(--r-pill); margin-bottom:10px}
.obj-title{font-size:21px; color:var(--euca-deep); margin-bottom:6px}
.obj-intent{font-size:12px; font-weight:700; letter-spacing:.02em; color:var(--euca-dark); opacity:.85; margin-bottom:9px}
.obj-msg{font-size:14.5px; color:var(--euca-dark); margin-bottom:14px}
.obj-suglabel{font-size:11.5px; font-weight:600; color:var(--euca-dark); opacity:.8; margin-bottom:8px}
.obj-foods{display:flex; gap:8px; flex-wrap:wrap}
.bar-supp{font-size:11px; color:var(--euca-dark); background:var(--euca-tint); border:1px solid #D5E3DE;
  border-radius:9px; padding:5px 9px; margin-top:6px; line-height:1.45}

/* food chips */
.chip{display:inline-flex; align-items:center; gap:8px; background:var(--wheat-tint);
  border:1px solid #E7DCC9; border-radius:var(--r-pill); padding:8px 14px 8px 10px;
  font-size:14.5px; font-weight:600; color:var(--ink);
  transition:transform .18s cubic-bezier(.34,1.56,.64,1), background .22s, border-color .22s, color .22s;
  touch-action:manipulation; -webkit-tap-highlight-color:transparent}
.chip .em{font-size:18px; line-height:1; filter:saturate(.85); transition:filter .22s, transform .22s}
.chip.tint-mint{background:var(--mint-tint); border-color:#CDE6DC}
.chip.tint-peach{background:var(--peach-tint); border-color:#E9CEC1}
.chip.tint-cream{background:var(--cream-tint); border-color:#F4DDB6}
.chip:active{transform:scale(.96)}
.chip.sel{background:var(--euca); border-color:var(--euca); color:#fff}
.chip.sel .em{filter:none}
.chip.given{background:var(--mint); border-color:#A6D6C6; color:var(--euca-deep)}
.chip.given .em{filter:none; transform:scale(1.05)}

/* progress bars */
.bar-row{display:flex; align-items:center; gap:11px; padding:9px 0}
.bar-ic{width:38px; height:38px; flex:none; border-radius:11px; display:flex; align-items:center; justify-content:center}
.bar-main{flex:1; min-width:0}
.bar-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px}
.bar-name{font-size:14.5px; font-weight:700; color:var(--ink)}
.bar-val{font-size:12px; font-weight:700; color:var(--ink-soft)}
.bar-track{height:9px; background:var(--bg2); border-radius:var(--r-pill); overflow:hidden}
.barseg-track{display:flex; gap:3px}
.barseg{flex:1; height:12px; background:#ECE3D4; border-radius:3px; overflow:hidden}
.barseg-fill{display:block; height:100%; border-radius:3px 0 0 3px}
.bar-fill{height:100%; border-radius:var(--r-pill); width:0; transition:width .5s cubic-bezier(.4,0,.2,1)}
.bar-fill.done{background:var(--euca)}
.bar-fill.part{background:var(--mint)}
.bar-fill.iron{background:var(--peach)}
.bar-fill.iron.done{background:var(--peach-dark)}
.bar-sub{font-size:13px; color:var(--ink-soft); margin-top:4px; font-weight:500}

.section-label{font-size:12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
  color:var(--ink-faint); margin:6px 2px 8px}

/* big register button */
.fab-reg{width:100%; background:var(--euca); color:#fff; font-weight:700; font-size:16px;
  padding:15px; border-radius:var(--r-lg); display:flex; align-items:center; justify-content:center; gap:9px;
  box-shadow:0 6px 18px rgba(82,113,106,.28); transition:transform .12s,background .15s}
.fab-reg:active{transform:scale(.985); background:var(--euca-dark)}

/* buttons */
.btn{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:11px 15px;
  font-weight:700; font-size:14px; color:var(--euca-dark);
  transition:background .15s, transform .12s cubic-bezier(.34,1.56,.64,1), box-shadow .15s;
  touch-action:manipulation; -webkit-tap-highlight-color:transparent; cursor:pointer}
.btn:active{transform:scale(.97)}
.btn.primary{background:linear-gradient(170deg, #7BA399 0%, var(--euca) 65%); color:#fff; border-color:transparent;
  box-shadow:0 2px 6px rgba(63,90,82,.18), 0 8px 20px rgba(63,90,82,.14)}
.btn.primary:active{box-shadow:0 1px 3px rgba(63,90,82,.18), 0 3px 8px rgba(63,90,82,.10)}
.btn.soft{background:var(--euca-tint); border-color:#D5E3DE; color:var(--euca-deep)}
.btn.ghost{background:transparent; border-color:var(--line)}
.btn.block{width:100%; display:flex; justify-content:center; gap:8px}
.btn.sm{padding:7px 12px; font-size:12.5px; border-radius:var(--r-pill)}
/* Defensa anti-doble-renglón: los botones de ancho completo mantienen su
   texto en una línea y lo recortan con … si no cabe; los pequeños no se parten. */
.btn.block{flex-wrap:nowrap}
.btn.block > *{min-width:0}
.btn.sm{white-space:nowrap}
.sec-head h3{min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.sec-head{gap:8px}
.btn.danger{color:var(--peach-dark); border-color:#E9CEC1}
.row{display:flex; gap:10px}
.row.wrap{flex-wrap:wrap}

/* day status */

/* tabs */
.tabbar{position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px;
  background:rgba(255,255,255,.95); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  border-top:1px solid rgba(229,220,200,.6);
  display:flex; padding:9px 6px calc(8px + env(safe-area-inset-bottom)); z-index:50}
.tab{flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 2px;
  font-size:10.5px; font-weight:700; color:var(--ink-faint); border-radius:12px; transition:color .15s; position:relative}
.tab svg{width:23px; height:23px; transition:transform .15s}
.tab.active{color:var(--euca-deep)}
.tab.active svg{transform:translateY(-1px)}
/* Indicador sutil debajo de la pestaña activa */
.tab.active::after{content:''; position:absolute; bottom:-9px; left:50%; transform:translateX(-50%);
  width:24px; height:3px; border-radius:2px; background:var(--euca)}

/* forms */
.field{margin-bottom:14px}
.field label{display:block; font-size:13px; font-weight:700; color:var(--euca-dark); margin-bottom:6px}
.field input,.field select{width:100%; height:48px; padding:0 13px; border:1px solid var(--line); border-radius:var(--r);
  background:var(--card); color:var(--ink); outline:none; transition:border .15s; font-size:16px;
  -webkit-appearance:none; appearance:none; box-sizing:border-box; line-height:normal;}
.field input[type=date]{display:flex; align-items:center; min-height:48px; line-height:48px; -webkit-appearance:none;}
.field input[type=date]::-webkit-date-and-time-value{text-align:left; margin:0; line-height:48px;}
.field input[type=date]::-webkit-datetime-edit{padding:0; line-height:48px;}
.field input[type=number]{-moz-appearance:textfield}
.field input:focus,.field select:focus{border-color:var(--euca)}
.seg{display:flex; gap:8px; flex-wrap:wrap}
.seg .opt{flex:1; min-width:fit-content; text-align:center; padding:11px 10px; border:1px solid var(--line);
  border-radius:var(--r); font-size:13.5px; font-weight:700; color:var(--ink-soft); background:var(--card); transition:.15s}
.seg .opt.on{background:var(--euca-tint); border-color:var(--euca); color:var(--euca-deep)}
.allergen-grid{display:flex; flex-wrap:wrap; gap:8px}
.alg{padding:8px 13px; border:1px solid var(--line); border-radius:var(--r-pill); font-size:13px;
  font-weight:600; background:var(--card); color:var(--ink-soft); transition:.15s}
.alg.avoid{background:var(--peach-tint); border-color:#E5C3B4; color:var(--peach-dark)}
.alg.intro{background:var(--mint-tint); border-color:#C6E2D8; color:var(--euca-deep)}

/* register screen */
.search{width:100%; padding:12px 15px; border:1px solid var(--line); border-radius:var(--r-pill);
  background:var(--card); outline:none; margin-bottom:14px}
.grp-block{margin-bottom:18px}
.grp-title{display:flex; align-items:center; gap:9px; margin-bottom:10px}
.grp-title .gname{font-size:14px; font-weight:700; color:var(--euca-dark)}
.food-grid{display:flex; flex-wrap:wrap; gap:8px}
.food-grid--3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;align-items:start}
.food-grid--3 .chip-wrap{flex-direction:column;align-items:stretch;gap:4px;width:auto;min-width:0}
.food-grid--3 .chip{flex-direction:column;width:100%;min-width:0;gap:3px;padding:11px 6px 9px;text-align:center;position:relative;justify-content:center;min-height:72px;overflow:hidden}
.food-grid--3 .chip>span:not(.em):not(.ck){line-height:1.15;overflow-wrap:anywhere}
.food-grid--3 .chip .em{font-size:22px}
.food-grid--3 .chip .ck{position:absolute;top:6px;right:7px;margin:0}
.food-grid--3 .react{justify-content:center}
.food-grid--3 .chip .lvl{margin:0}
.food-grid--3 .warn-badge{position:absolute;top:6px;left:6px}
.note-pill{display:inline-block; font-size:10.5px; font-weight:700; color:var(--warn);
  background:#FBF0DD; border:1px solid #F0DDB8; border-radius:var(--r-pill); padding:2px 8px; margin-left:6px}

/* weekly */
.tope{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0; border-top:1px solid var(--line)}
.tope:first-child{border-top:none}
.tope .st{font-size:12px; font-weight:700; padding:4px 10px; border-radius:var(--r-pill); white-space:nowrap; flex:none}
.st.ok{background:var(--mint-tint); color:var(--euca-deep)}
.st.over{background:var(--peach-tint); color:var(--peach-dark)}
.st.block{background:var(--bg2); color:var(--ink-soft)}

/* misc */
.banner{display:flex; gap:10px; align-items:flex-start; background:var(--cream-tint); border:1px solid #F4DDB6;
  border-radius:var(--r); padding:12px 14px; margin-bottom:14px; font-size:13px; color:#8A6A2E}
.disclaimer{font-size:11.5px; color:var(--ink-faint); text-align:center; padding:18px 24px 8px; line-height:1.6}
.modal-bg{position:fixed; inset:0; background:rgba(34,56,47,.45); backdrop-filter:blur(3px); z-index:100;
  display:flex; align-items:center; justify-content:center; padding:20px; animation:fade .2s}
.sheet{background:var(--card); width:100%; max-width:440px; border-radius:22px; padding:22px 20px 20px;
  max-height:85vh; overflow:auto; animation:pop .3s cubic-bezier(.4,0,.2,1); box-shadow:0 20px 60px rgba(34,56,47,.25)}
@keyframes pop{from{transform:scale(.94);opacity:.4}to{transform:none;opacity:1}}
.sheet h3{font-size:19px; margin-bottom:14px}
/* paginación de pop-ups con dos partes */
.sheet-pages{position:relative}
.sheet-page{display:none}
.sheet-page.active{display:block}
.sheet-pager{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px}
.sheet-dot{width:8px;height:8px;border-radius:50%;background:var(--line);transition:.2s}
.sheet-dot.active{background:var(--euca);width:22px;border-radius:4px}
.sheet-nav{display:flex;justify-content:space-between;gap:10px;margin-top:14px}
.sheet-nav .btn{flex:1}
.center{text-align:center}
.empty{text-align:center; color:var(--ink-soft); padding:36px 20px; font-size:14.5px; line-height:1.55}
.empty::before{content:''; display:block; width:48px; height:48px; margin:0 auto 14px;
  background:radial-gradient(circle at 30% 30%, rgba(110,147,139,.18), transparent 60%); border-radius:50%}
.spacer{height:8px}
.divider{height:1px; background:var(--line); margin:14px 0}
.linkbtn{color:var(--euca); font-weight:700; font-size:13.5px}
.toast{position:fixed; bottom:104px; left:50%; transform:translateX(-50%); background:var(--euca-deep);
  color:#fff; padding:12px 18px; border-radius:16px; font-size:13.5px; font-weight:600; z-index:120;
  max-width:86vw; width:max-content; text-align:center; line-height:1.4;
  box-shadow:0 8px 24px rgba(63,90,84,.3); animation:up .25s}
/* sección con conteo (dos ejes separados) */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
/* Variante que, si no cabe, baja el grupo de botones a otra línea en vez de
   recortar el título (usada en cabeceras con título largo + botones). */
.sec-head-wrap{flex-wrap:wrap;gap:6px 10px}
.sec-head-wrap h3{overflow:visible;text-overflow:clip;white-space:normal;flex:1 1 auto}
.sec-head h3{margin:0}
.sec-count{font-size:13px;font-weight:800;color:var(--ink-soft);background:var(--bg2);padding:4px 12px;border-radius:var(--r-pill)}
.sec-count.ok{background:var(--mint-tint);color:var(--euca-deep)}
.scope{font-weight:600;color:var(--ink-faint);font-size:11.5px}
.need-hint{font-size:13px;color:var(--ink-soft);margin-bottom:9px;line-height:1.45}

/* chips IDEA (no seleccionables; llevan a Registrar) */
.chip.idea{background:var(--wheat-tint);border-color:#E7DCC9;cursor:pointer}
.chip.idea:active{transform:scale(.96)}
.chip.more{background:transparent;border:1px dashed #C9BBA6;color:var(--euca-dark);font-weight:700}
.idea-row{display:flex;flex-direction:column;gap:6px}
.idea-lbl{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-faint)}

/* chips de grupo (eje variedad) */
.grp-chips{display:flex;flex-wrap:wrap;gap:8px}
.gchip{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);
  border-radius:var(--r-pill);padding:6px 13px 6px 7px;font-size:13px;font-weight:700;color:var(--ink-soft);transition:.12s}
.gchip:active{transform:scale(.96)}
.gchip.done{background:var(--mint);border-color:#A6D6C6;color:var(--euca-deep)}
.gchip .gck{font-weight:800}

/* grupos colapsables en Registrar */
.grp-title.tap{display:flex;align-items:center;gap:9px;width:100%;text-align:left;padding:10px 4px;border-radius:10px;transition:background .12s}
.grp-title.tap:active{background:var(--bg2)}
.grp-title .gname{flex:1}
.gcount{font-size:12px;font-weight:700;color:var(--ink-faint)}
.gcount b{color:var(--euca)}
.chev{font-size:13px;color:var(--ink-faint);width:16px;text-align:center}
.grp-block.focus{background:var(--euca-tint);border-radius:var(--r);padding:4px 8px;margin:0 -8px 18px}

/* filtro activo */
.filter-chip{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--cream-tint);
  border:1px solid #F0DDB8;border-radius:var(--r);padding:10px 13px;margin-bottom:14px;font-size:13px;color:#7A5A22;line-height:1.4}
.filter-chip>b{font-weight:800}
.filter-chip .linkbtn{margin-left:auto;flex:none}

.logo{display:flex;align-items:center;gap:9px}

/* fecha en Registrar */
.reg-date{font-size:14px;color:var(--ink-soft);font-weight:600;margin:0 2px 14px;text-transform:capitalize}

/* reacción 👍/👎 al registrar */
.chip-wrap{display:inline-flex;align-items:center;gap:5px}
.react{display:inline-flex;gap:3px}
.rb{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:var(--card);font-size:15px;
  display:inline-flex;align-items:center;justify-content:center;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1), background .18s, border-color .18s, filter .18s, opacity .18s;
  filter:grayscale(.6);opacity:.7; touch-action:manipulation; -webkit-tap-highlight-color:transparent}
.rb:active{transform:scale(.88)}
.rb.on{filter:none;opacity:1}
.rb.pressed{animation:rbpulse .42s cubic-bezier(.34,1.56,.64,1)}
.rb.on.like{background:var(--mint-tint);border-color:#8FC7B5}
.rb.on.dis{background:var(--peach-tint);border-color:#DDA48E}
@keyframes rbpulse{
  0%{transform:scale(1)}
  35%{transform:scale(1.22)}
  70%{transform:scale(.95)}
  100%{transform:scale(1)}
}
.chip .ck{font-weight:800;margin-left:3px;color:var(--euca-deep)}

/* alimentos con advertencia: borde naranja-rojo (riesgo notorio pero no alarmista) */
.chip.warn-age{border-color:#E89B5E;background:#FBEBD9}
.chip.warn-allergen{border-color:#D87A5E;background:#F8DDD2}
.chip.warn-choke{border-color:#D87A5E;background:#F8DDD2}
.chip.warn-reaction{border-color:#C7593E;background:#F6D6CC}
.chip.warn-reaction.given{background:#C7593E;border-color:#A8472F}
.warn-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:800;padding:2px 7px;
  border-radius:var(--r-pill);margin-left:3px;text-transform:uppercase;letter-spacing:.03em}
.warn-badge.warn-age{background:#E89B5E;color:#fff}
.warn-badge.warn-allergen{background:#C7593E;color:#fff}
.warn-badge.warn-choke{background:#C7593E;color:#fff}
.warn-badge.warn-reaction{background:#A8472F;color:#fff}

/* panel Tus datos en Ajustes */
.data-stat{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--line);font-size:14px;color:var(--ink-soft)}
.data-stat:first-of-type{border-top:none;padding-top:2px}
.data-stat b{color:var(--ink);font-weight:700}

/* Mover día */
.move-day-btn{color:var(--ink-soft);font-size:13.5px;font-weight:600}
.movedate{padding:2px 0}
.mv-warn{background:#FBEBD9;border:1.5px solid #E89B5E;border-radius:var(--r);padding:10px 13px;
  margin:10px 0;font-size:13.5px;color:#7E3F19;line-height:1.45;font-weight:600}
.mv-conflict{background:var(--wheat-tint);border:1px solid var(--line);border-radius:var(--r);
  padding:12px 13px;margin:14px 0 6px;font-size:14px;line-height:1.5}

/* Pouches: chip en catálogo */
.chip.pouch{background:var(--peach-tint);border-color:#D4A88E;align-items:flex-start;text-align:left;padding-top:8px;padding-bottom:8px;color:var(--ink)}
.chip.pouch.given{background:var(--euca);border-color:var(--euca-dark);color:#fff}
.chip.pouch.given .pouch-ing{color:rgba(255,255,255,.88)}
.pouch-edit{background:var(--bg2);border:1px solid var(--line);width:30px;height:30px;border-radius:8px;font-size:14px;
  display:inline-flex;align-items:center;justify-content:center;margin-left:6px;color:var(--ink-soft);font-weight:700}
.pouch-empty{padding:12px 4px 4px}
.pouch-empty .btn{font-size:14px}
.pouch-info{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0}
.pouch-name{font-weight:700;line-height:1.2}
.pouch-ing{font-size:11px;color:var(--ink-soft);line-height:1.2;font-weight:500}

/* Pouches: lista en Ajustes */
.pouch-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.pouch-row{display:flex;align-items:center;gap:11px;padding:9px 11px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r)}
.pouch-emoji{font-size:24px;flex:none}
.pouch-meta{flex:1;min-width:0}
.pouch-meta .pouch-name{font-weight:700;font-size:14px;color:var(--ink)}
.pouch-meta .pouch-ing{font-size:12px;color:var(--ink-soft);margin-top:2px;line-height:1.4}

/* Pouches: editor */
.pouch-editor .pouch-ings{display:flex;flex-wrap:wrap;gap:6px;padding:8px 0}
.ping{display:inline-flex;align-items:center;gap:6px;background:var(--euca-tint);border:1px solid #C6DCD3;
  border-radius:var(--r-pill);padding:5px 4px 5px 11px;font-size:13px;color:var(--euca-deep);font-weight:600}
.ping .em{font-size:14px}
.ping-x{background:rgba(0,0,0,.08);width:20px;height:20px;border-radius:50%;display:inline-flex;
  align-items:center;justify-content:center;font-size:11px;color:var(--ink-soft);font-weight:700}
.grp-icon-box{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex:none}

/* Alimentos/suplementos personalizados */
.chip.pouch.custom{background:var(--euca-tint);border-color:#BBD3CA}
.chip.pouch.custom.given{background:var(--euca);border-color:var(--euca-dark)}
.daily-tag{display:inline-block;margin-left:6px;font-size:10px;font-weight:700;letter-spacing:.3px;
  text-transform:uppercase;background:var(--cream-tint);border:1px solid #F0D6AC;color:var(--warn);
  border-radius:var(--r-pill);padding:1px 7px;vertical-align:middle}
.chip.pouch.given .daily-tag{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.35);color:#fff}
.supp-note{font-size:12px;color:var(--ink-soft);background:var(--cream-tint);border:1px solid #F0D6AC;
  border-radius:var(--r);padding:9px 11px;line-height:1.4;margin:0 0 10px}
.custom-flag-tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;
  color:var(--euca-dark);background:var(--euca-tint);border:1px solid #BBD3CA;border-radius:var(--r-pill);
  padding:3px 11px;margin-bottom:12px}
.emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
.emoji-pick{height:44px;border:1px solid var(--line);border-radius:11px;background:var(--bg);font-size:21px;
  display:flex;align-items:center;justify-content:center;cursor:pointer}
.emoji-pick.sel{background:var(--euca-tint);border-color:var(--euca);box-shadow:0 0 0 2px var(--euca-tint)}
.cnut-list{display:flex;flex-direction:column;gap:7px}
.cnut-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.cnut-name{font-size:14px;font-weight:600;color:var(--ink)}
.cnut-seg{display:inline-flex;border:1px solid var(--line);border-radius:var(--r-pill);overflow:hidden;flex:none}
.cseg{padding:7px 12px;font-size:12.5px;font-weight:700;background:var(--bg);color:var(--ink-soft);
  border:none;border-left:1px solid var(--line);cursor:pointer;min-width:46px}
.cseg:first-child{border-left:none}
.cseg.sel{background:var(--ink-soft);color:#fff}
.cseg.sel.me{background:var(--cream);color:var(--euca-deep)}
.cseg.sel.hi{background:var(--euca);color:#fff}
.cdaily{display:flex;align-items:flex-start;gap:11px;width:100%;text-align:left;margin-top:14px;
  padding:13px;border:1px solid var(--line);border-radius:var(--r);background:var(--bg);cursor:pointer}
.cdaily.on{background:var(--euca-tint);border-color:var(--euca)}
.cdaily-check{flex:none;width:24px;height:24px;border-radius:7px;border:1.5px solid var(--ink-faint);
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;background:var(--bg2)}
.cdaily.on .cdaily-check{background:var(--euca);border-color:var(--euca-dark)}
.cdaily-txt{display:flex;flex-direction:column;gap:2px}
.cdaily-txt b{font-size:14px;color:var(--ink)}
.cdaily-txt span{font-size:12px;color:var(--ink-soft);line-height:1.35}

/* Reintentar */
.repeat-prev{background:var(--euca-tint);border:1px solid #CFE0DA;color:var(--euca-deep);font-weight:600;margin-bottom:14px}
.repeat-prev:active{background:#D7E7E1}
.rb.retry.on{background:var(--cream);border-color:#E7C39B}
.retry-list{display:flex;flex-direction:column;gap:8px}
.retry-row{display:flex;align-items:center;gap:8px}
.retry-reg{flex:1;display:flex;align-items:center;gap:10px;text-align:left;border:1px solid var(--line);background:var(--card);border-radius:var(--r);padding:9px 12px;cursor:pointer;font-size:14px;color:var(--ink)}
.retry-reg:active{background:var(--euca-tint)}
.retry-reg .em{font-size:20px}
.retry-x{flex:none;width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--ink-faint);font-size:14px;cursor:pointer}
/* Cierra la brecha (sugerencias) */
.gap-list{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.gap-chip{display:flex;align-items:center;gap:12px;width:100%;text-align:left;border:1px solid var(--line);background:var(--card);border-radius:var(--r);padding:10px 12px;cursor:pointer;transition:background .12s,border-color .12s}
.gap-chip:active{background:var(--euca-tint)}
.gap-chip .gc-em{font-size:24px;flex:none;width:38px;height:38px;border-radius:10px;background:var(--peach-tint);display:flex;align-items:center;justify-content:center}
.gap-chip .gc-txt{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0}
.gap-chip .gc-txt b{font-size:14.5px;color:var(--ink)}
.gap-chip .gc-nuts{font-size:12px;color:var(--euca-dark);font-weight:600}
.gap-chip .gc-add{flex:none;width:30px;height:30px;border-radius:50%;background:var(--euca);color:#fff;font-size:19px;font-weight:700;display:flex;align-items:center;justify-content:center}
/* Alimentos probados */
.tf-list{display:flex;flex-direction:column}
/* Informe imprimible */
#report-overlay{display:none}
#report-overlay.show{display:block;position:fixed;inset:0;background:#fff;z-index:9999;overflow:auto}
.rep-actions{position:sticky;top:0;display:flex;gap:10px;padding:14px 18px;background:var(--euca);box-shadow:0 2px 10px rgba(0,0,0,.12)}
.rep-actions button{flex:1;padding:12px;border:none;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}
.rep-print{background:#fff;color:var(--euca-deep)}
.rep-close{background:rgba(255,255,255,.18);color:#fff}
.rep-doc{max-width:720px;margin:0 auto;padding:28px 22px 60px;color:#2A2521;font-family:'Quicksand',sans-serif}
.rep-doc .rep-logo{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.rep-doc .rep-logo b{font-family:'Fraunces',serif;font-size:20px;color:var(--euca-deep)}
.rep-title{font-family:'Fraunces',serif;font-size:26px;font-weight:600;margin:14px 0 2px;color:#2A2521}
.rep-sub{font-size:15px;font-weight:700;color:var(--euca-dark)}
.rep-meta{font-size:12.5px;color:#857A6F;margin-top:3px}
.rep-doc h2{font-family:'Fraunces',serif;font-size:17px;margin:24px 0 10px;padding-bottom:5px;border-bottom:1.5px solid #E8DFCC;color:var(--euca-deep)}
.rep-nrow{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13.5px}
.rep-nname{width:140px;flex:none;font-weight:600}
.rep-bar{flex:1;height:11px;background:#EFE8DA;border-radius:6px;overflow:hidden}
.rep-bar>span{display:block;height:100%;background:var(--euca);border-radius:6px}
.rep-npct{width:42px;flex:none;text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
.rep-p{font-size:13.5px;line-height:1.6;margin:6px 0}
.rep-tags{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 2px}
.rep-tag{font-size:12px;border:1px solid #E8DFCC;background:#FBFAF5;border-radius:999px;padding:3px 10px}
.rep-tag.warn{border-color:#E7C39B;background:#FFF3E2;color:#9A6418}
.rep-notes-blank{height:90px;border:1px dashed #D8CDB8;border-radius:8px;margin-top:6px}
/* Informe A/B */
.rep-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;border-bottom:2px solid #DDE5E1;padding-bottom:10px;margin-bottom:10px}
.rep-brand{display:flex;align-items:center;gap:7px;color:#3F5A52;font-weight:700;flex:none}
.rep-pills{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 14px}
.rep-pill{padding:7px 15px;border-radius:999px;border:1.5px solid #CDD8D3;background:#fff;font-size:13px;font-weight:700;color:#6B6259;cursor:pointer}
.rep-pill.on{background:var(--euca);border-color:var(--euca);color:#fff}
.ra-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px;margin:6px 0 8px}
.ra-cell{display:flex;align-items:center;gap:9px}
.ra-dot{width:11px;height:11px;border-radius:50%;flex:none}
.ra-lab{font-size:14.5px;color:#2A2521}
.ra-val{margin-left:auto;font-weight:700;font-size:14.5px;color:#2A2521}
.ra-val.l-hi{color:#3F7A5F}.ra-val.l-mid{color:#9A7B43}.ra-val.l-lo{color:#C2724E}
.rep-stats{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:4px 0 10px}
.rep-stat{background:#EEF3F0;border-radius:14px;padding:14px 10px;text-align:center}
.rep-stat b{display:block;font-size:26px;color:#3F5A52;font-family:'Fraunces',serif;line-height:1}
.rep-stat span{font-size:11.5px;color:#6B6259;display:block;margin-top:4px}
.rmap{overflow-x:auto;padding-bottom:2px}
.rmap-row{display:flex;align-items:center;gap:7px;margin:3px 0}
.rmap-lab{width:60px;flex:none;font-size:11.5px;font-weight:700;color:#5C534B;text-align:right}
.rmap-cells{display:flex;gap:3px}
.rmap-c{width:13px;height:13px;border-radius:50%;flex:none;background:#E9E0CF;box-sizing:border-box;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.rmap-c.s-f{background:var(--nc)}
.rmap-c.s-p{background:linear-gradient(to right,var(--nc) 50%,#E9E0CF 50%)}
.rmap-c.s-n{background:#E9E0CF}
.rmap-c.s-u{background:#fff;border:1.4px dashed #C9BEAA}
.rmap-n{width:13px;flex:none;text-align:center;font-size:9px;color:#9A8E7E}
.rmap-leg{display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-size:11px;color:#6B6259;margin:9px 0 2px}
.rmap-leg .rmap-c{margin-left:9px}
.rep-dayb{margin:9px 0;border-top:1px solid #ECE3D2;padding-top:8px;break-inside:avoid}
.rep-dayb-h{font-size:13px;font-weight:700;color:#3F5A52;margin-bottom:6px}
.rep-fpills{display:flex;flex-wrap:wrap;gap:6px}
.rep-fpill{background:#F3EDE1;border-radius:999px;padding:4px 11px;font-size:12.5px;color:#3A352F}
.rep-fpill.rx{background:#FBEEE8}
.rep-algrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #ECE3D2;font-size:13.5px}
.rep-algrow b{flex:1}
.rep-algrow>span{color:#6B6259;font-size:12.5px;flex:none}
.rep-algrow .rep-ok{color:#3F7A5F;font-weight:700}
.rep-algrow .rep-rx{color:#C2724E;font-weight:700}
.rep-cal-leg{font-size:11px;color:#6B6259;margin:2px 0 8px;display:flex;align-items:center;flex-wrap:wrap;gap:2px}
.rep-cal-leg .rep-cell{width:18px;height:18px;font-size:9px;margin:0 2px}
.rep-day{border:1px solid #ECE3D2;border-radius:12px;padding:9px 12px;margin:8px 0;background:#FCFAF5;break-inside:avoid}
.rep-day-h{font-weight:700;font-size:13.5px;color:var(--euca-deep);margin-bottom:5px;text-transform:capitalize}
.rep-day-empty{color:#B3A899;font-size:12.5px;font-style:italic}
.rep-cal{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.rep-cell{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;border:1.6px solid #DAD2C4;color:#B7AC9C;flex:none;box-sizing:border-box}
.rep-cell.l2{background:var(--nc);border-color:var(--nc);color:#fff}
.rep-cell.l1{border-color:var(--nc);color:var(--nc);background:#fff}
.rep-foods{display:flex;flex-wrap:wrap;gap:6px}
.rep-fchip{position:relative;width:30px;height:30px;border-radius:8px;background:#F3EDE1;display:flex;align-items:center;justify-content:center;font-size:17px}
.rep-fchip .rx{position:absolute;right:-5px;bottom:-6px;font-size:11px}
.rep-fmore{display:flex;align-items:center;font-size:12px;color:#857A6F;font-weight:700;padding:0 4px}
.rep-foot{margin-top:26px;padding-top:12px;border-top:1px solid #E8DFCC;font-size:11.5px;color:#857A6F;line-height:1.5}
@page{ margin: 14mm 12mm; }
@media print{
  html,body{height:auto !important;overflow:visible !important}
  #app,#suri-splash{display:none !important}
  #report-overlay{display:block !important;position:static !important;inset:auto !important;height:auto !important;overflow:visible !important;background:#fff}
  .rep-actions{display:none !important}
  .rep-doc{max-width:100%;padding:0}
  .rmap{overflow:visible !important}
  .rep-doc h2{break-after:avoid}
  .rep-dayb,.rep-algrow,.rmap-row,.cov-table tr,.rep-notes-box{break-inside:avoid}
  .rep-bar{border:1px solid #ccc}
  .rep-bar>span{background:#6E938B !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
/* Cortes seguros */
.cg-card{display:flex;align-items:center;gap:13px;width:100%;text-align:left;cursor:pointer;border:none}
/* Informe para el pediatra */
.report-overlay{position:fixed;inset:0;z-index:10000;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch}
/* Multi-bebé */
.baby-switch{cursor:pointer;border:none;background:var(--wheat-tint);color:var(--ink-soft);margin-left:6px}
.babies-list{display:flex;flex-direction:column;gap:8px}
.baby-row{display:flex;align-items:center;gap:8px}
.baby-pick{flex:1;display:flex;align-items:center;gap:11px;text-align:left;padding:12px;border:1px solid var(--line);border-radius:var(--r);background:var(--bg);cursor:pointer}
.baby-row.active .baby-pick{background:var(--euca-tint);border-color:var(--euca)}
.baby-em{font-size:22px;flex:none}
.baby-info{display:flex;flex-direction:column;gap:2px;flex:1}
.baby-info b{font-size:15px;color:var(--ink)}
.baby-info span{font-size:12.5px;color:var(--ink-soft)}
.baby-pick .ck{color:var(--euca-dark);font-weight:800}
.baby-del{flex:none;width:42px;height:42px;border-radius:var(--r);border:1px solid var(--line);background:var(--bg);font-size:16px;cursor:pointer}
.report-actions{position:sticky;top:0;display:flex;gap:10px;padding:14px 16px;background:var(--bg);border-bottom:1px solid var(--line);z-index:2}
.report-actions .btn{flex:1}
.print-report{max-width:640px;margin:0 auto;padding:22px 20px 60px;color:#1f1b17}
.print-report h1{font-family:'Fraunces',serif;font-size:26px;margin:0 0 2px;color:#1f1b17}
.print-report h2{font-family:'Fraunces',serif;font-size:17px;margin:22px 0 8px;border-bottom:1px solid #e5dcc9;padding-bottom:4px}
.rep-sub{color:#5C534B;font-size:13px;margin:0}
.rep-p{font-size:13.5px;line-height:1.5;margin:5px 0;color:#33302b}
.rep-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
.rep-table th,.rep-table td{text-align:left;padding:7px 8px;border-bottom:1px solid #ece4d3}
.rep-table th{font-weight:700;color:#5C534B;font-size:11.5px;text-transform:uppercase;letter-spacing:.3px}
.rep-table .r-ok{color:#3f7a5f;font-weight:700}
.rep-table .r-mid{color:#B97B2C;font-weight:700}
.rep-table .r-low{color:#9a8f82}
.rep-cols{display:flex;gap:24px;flex-wrap:wrap}
.rep-cols>div{flex:1;min-width:230px}
.rep-notes-box{border:1px solid #D8CDB8;border-radius:10px;min-height:120px;margin-top:8px;padding:12px}
.rep-disc{font-size:11px;color:#857A6F;line-height:1.45;margin-top:22px;border-top:1px solid #e5dcc9;padding-top:10px}
/* Cortes seguros (cont.) */
.cg-card-em{font-size:24px;flex:none;width:34px;height:34px;border-radius:9px;background:var(--peach-tint);display:flex;align-items:center;justify-content:center}
.cg-card-txt{display:flex;flex-direction:column;gap:2px;flex:1}
.cg-card-txt b{font-size:15px;color:var(--ink)}
.cg-card .chev{color:var(--ink-faint);font-size:20px}
.cut-guide .cg-panel{display:flex;gap:12px;align-items:center;padding:11px;border:1px solid var(--line);border-radius:var(--r);margin-bottom:9px;position:relative}
.cut-guide .cg-panel.now{border-color:var(--euca);background:var(--euca-tint)}
.cg-now-tag{position:absolute;top:-8px;right:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;background:var(--euca);color:#fff;border-radius:var(--r-pill);padding:2px 9px}
.cg-svg{width:96px;height:64px;flex:none;border-radius:10px}
.cg-txt{display:flex;flex-direction:column;gap:3px}
.cg-txt b{font-size:14.5px;color:var(--ink)}
.cg-txt span{font-size:12.5px;color:var(--ink-soft);line-height:1.4}
.cg-haz-head{font-size:13px;font-weight:700;color:var(--peach-dark);margin:16px 0 9px}
.om{display:inline-block;vertical-align:bottom}
.rxsev-list{display:flex;flex-direction:column;gap:8px}
.rxsev{display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:1.5px solid var(--line);background:var(--card);border-radius:var(--r);padding:11px 12px;cursor:pointer}
.rxsev.on{border-color:var(--sc);background:color-mix(in srgb,var(--sc) 9%,#fff)}
.rxsev-dot{width:13px;height:13px;border-radius:50%;background:var(--sc);flex:none}
.rxsev-txt{flex:1;display:flex;flex-direction:column;gap:1px}
.rxsev-txt b{font-size:14.5px;color:var(--ink)}
.rxsev-txt span{font-size:12px;color:var(--ink-soft)}
.rxsev-ck{color:var(--sc);font-weight:700;flex:none}
.rxsev-note-l{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin:14px 0 5px}
.rxsev-note{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:10px;font:inherit;font-size:14px;resize:vertical;box-sizing:border-box}
.cg-art{display:flex;align-items:flex-end;justify-content:center;gap:5px;flex:none;width:122px;padding:6px 2px 5px;background:radial-gradient(ellipse 80% 42% at 50% 90%,#E7DECB 0 70%,transparent 72%)}
.cutlines line{stroke:#2A2521;stroke-width:2.6;stroke-dasharray:3.5 3.5;stroke-linecap:round;opacity:.8}
.cg-dd{position:relative}
.cg-dd .om{width:50px;height:50px}
.cg-corner{position:absolute;top:6px;right:7px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;z-index:1}
.cg-corner.x{background:#C77A5E}.cg-corner.ok{background:#5E9C56}
.cg-grind{display:inline-flex;align-items:flex-end;gap:1px}
.cg-dd-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:6px}
.cg-dd-row .cg-dd-name{font-size:12.5px;font-weight:700;color:var(--ink-soft);margin-bottom:5px}
.cg-dd-pair{display:flex;gap:8px}
.cg-dd{flex:1;border:1px solid var(--line);border-radius:12px;padding:7px 4px 5px;text-align:center;background:var(--card)}
.cg-dd.no{background:#FBEEE8;border-color:#EAD2C6}
.cg-dd.yes{background:var(--euca-tint);border-color:#CFE0DA}
.cg-dd svg{width:64px;height:46px}
.cg-dd-lab{display:block;font-size:11px;font-weight:700;margin-top:1px}
.cg-dd.no .cg-dd-lab{color:#B5654A}
.cg-dd.yes .cg-dd-lab{color:var(--euca-deep)}
.cg-haz{display:flex;flex-direction:column;gap:9px}
.cg-haz-row{display:flex;gap:11px;align-items:flex-start}
.cg-haz-em{font-size:20px;flex:none;width:24px;text-align:center}
.cg-haz-row b{font-size:13.5px;color:var(--ink);display:block}
.cg-haz-fix{font-size:12.5px;color:var(--ink-soft);line-height:1.4}
.chip.flash{animation:chipflash 1.7s ease-out}
@keyframes chipflash{
  0%{box-shadow:0 0 0 0 rgba(110,147,139,.0)}
  12%{box-shadow:0 0 0 4px rgba(110,147,139,.55)}
  100%{box-shadow:0 0 0 0 rgba(110,147,139,0)}
}
.tf-row{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:9px 2px;
  background:none;border:none;border-top:1px solid var(--line);cursor:pointer}
.tf-row:first-child{border-top:none}
.tf-em{font-size:22px;flex:none;width:26px;text-align:center}
.tf-main{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.tf-name{font-size:14.5px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tf-fav{color:var(--cream);font-size:13px}
.tf-meta{font-size:12px;color:var(--ink-soft)}
.tf-react{font-size:15px;flex:none}
.tf-custom{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--euca-dark);
  background:var(--euca-tint);border:1px solid #BBD3CA;border-radius:var(--r-pill);padding:1px 7px}
.tf-algs{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
.tf-alg{font-size:10.5px;font-weight:600;color:var(--warn);background:var(--cream-tint);
  border:1px solid #F0D6AC;border-radius:var(--r-pill);padding:1px 7px}

/* logo de marca Suri */
.suri-mark{display:flex;justify-content:center;margin-bottom:14px}
.suri-mark svg{filter:drop-shadow(0 4px 14px rgba(58,51,46,.10))}
.mini-logo{display:inline-flex;vertical-align:-6px;margin-right:7px}
.mini-logo svg{display:block;border-radius:7px;filter:drop-shadow(0 1px 2px rgba(58,51,46,.10))}

/* primera exposición a alérgeno */
.first-alg{padding:4px 0}
.info-btn{width:24px;height:24px;border-radius:50%;background:var(--euca-tint);color:var(--euca-deep);
  font-weight:800;font-size:13px;flex:none;display:flex;align-items:center;justify-content:center;border:1px solid #C6DCD3}
.nutinfo p{font-size:14.5px;color:var(--ink);line-height:1.5}
.ni-row{display:flex;gap:11px;align-items:flex-start;margin-bottom:11px;font-size:13.5px;color:var(--ink-soft);line-height:1.45}
.ni-row>span{font-size:19px;flex:none}
.ni-row b{color:var(--ink)}
.fa-em{font-size:38px;text-align:center;margin-bottom:8px}
.fa-tx{font-size:15px;color:var(--ink);line-height:1.5;margin-bottom:14px;text-align:center}
.fa-tips{background:var(--euca-tint);border-radius:var(--r);padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.fa-tip{font-size:13.5px;color:var(--euca-deep);line-height:1.45}

/* aviso explicativo arriba del catálogo cuando hay alimentos con advertencia visibles */
.warn-info{background:#FBEBD9;border:1.5px solid #E89B5E;border-radius:var(--r);
  padding:10px 13px;margin-bottom:14px;font-size:13px;color:#7E3F19;line-height:1.45}

/* Vista plana cuando hay filtro de nutriente: secciones Alto / Medio */
.nf-sec{margin-bottom:18px}
.nf-head{display:flex;align-items:center;gap:9px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.nf-bullet{width:12px;height:12px;border-radius:50%;flex:none}
.nf-bullet.hi{background:var(--euca)}
.nf-bullet.me{background:var(--wheat);border:1px solid #D6C8AE}
.nf-title{font-weight:800;font-size:14px;color:var(--ink);text-transform:uppercase;letter-spacing:.03em}
.nf-count{margin-left:auto;font-size:12.5px;color:var(--ink-faint);font-weight:700}

/* filtro activo — verde contrastante, texto grande */
.filter-chip-v2{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--euca);
  border-radius:var(--r);padding:12px 15px;margin-bottom:16px;font-size:15px;color:#fff;font-weight:600;line-height:1.4;box-shadow:var(--shadow)}
.fc-clear{margin-left:auto;background:rgba(255,255,255,.25);color:#fff;font-weight:700;font-size:13px;
  padding:5px 11px;border-radius:var(--r-pill);flex:none}

/* recomendaciones del motor en Hoy — recuadro INFORMATIVO (no seleccionable) */
.rec-box{margin-top:11px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px}
.rec-box-h{font-size:12.5px;font-weight:800;color:var(--euca-deep);margin-bottom:9px;text-transform:none}
.ri-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.ri{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--ink)}
.ri-em{font-size:18px;flex:none;width:22px;text-align:center}
.ri-nm{font-weight:700;flex:1}
.ri-lvl{font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:var(--r-pill);text-transform:uppercase;letter-spacing:.03em}
.ri-lvl.hi{background:var(--euca);color:#fff}
.ri-lvl.me{background:var(--wheat);color:var(--ink-soft)}
.ri-fav{font-size:11px;font-weight:700;color:var(--peach-dark);background:var(--peach-tint);padding:2px 8px;border-radius:var(--r-pill)}
.rec-cta{margin-top:11px;width:100%;text-align:center;background:var(--euca-tint);color:var(--euca-deep);
  font-weight:700;font-size:13.5px;padding:9px;border-radius:10px}
.pair-tip{margin-top:9px;background:#FFF4E1;border:1px solid #E8D2A6;border-radius:10px;
  padding:10px 13px;font-size:13.5px;color:#5C3F0E;line-height:1.5;font-weight:500}

/* textarea de notas */
.pf-notes{width:100%;min-height:84px;padding:12px 13px;border:1px solid var(--line);border-radius:var(--r);
  background:var(--card);color:var(--ink);font-family:inherit;font-size:16px;line-height:1.5;resize:vertical;outline:none}
.pf-notes:focus{border-color:var(--euca)}

/* caja de ayuda (manitas) */
.hint-box{display:flex;gap:11px;align-items:flex-start;background:var(--euca-tint);border:1px solid #C6DCD3;
  border-radius:var(--r);padding:11px 14px;margin-bottom:16px;font-size:13.5px;color:var(--euca-dark);line-height:1.45}
.hint-box>span{font-size:18px;flex:none}

/* secciones del formulario de perfil */
.pf-sec{margin-top:26px;padding-top:4px}
.pf-sec:first-child{margin-top:0}
.pf-sec-title{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--euca-deep);margin-bottom:12px;
  padding-bottom:8px;border-bottom:1px solid var(--line)}
.babyname-btn{background:none;border:none;padding:0;display:inline-flex;align-items:center;gap:7px;cursor:pointer}
.edit-pencil{font-size:15px;color:var(--euca);opacity:.75;font-weight:400}
select{font-size:17px !important;min-height:50px;padding:0 14px}
.food-avoid-results{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.food-avoid-results .alg{background:var(--euca-tint);border-color:#C6DCD3;color:var(--euca-deep)}

/* micro-celebraciones */
.ach-card{background:linear-gradient(135deg,#FBEFD7,#FFF6E6);border:1.5px solid #F0DCB4}
.ach-list{display:flex;flex-direction:column;gap:10px}
.ach{display:flex;align-items:center;gap:11px}
.ach-em{font-size:22px;line-height:1;flex:none;width:30px;text-align:center}
.ach-tx{font-size:14px;font-weight:700;color:#7A5A22;line-height:1.35}

/* resumen con anillo + narrativa */
.ring-card{display:flex;align-items:center;gap:16px}
.ring-hero{display:flex;justify-content:center;margin:6px 0 8px}
.ring-wrap{flex:none}
.ring-side{flex:1;min-width:0}
.ring-sub{font-size:12px;color:var(--ink-soft);line-height:1.45;margin-bottom:6px}
.hito-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hito{background:var(--euca-tint);border-radius:var(--r-md,14px);padding:14px 12px;text-align:center}
.hito-n{font-family:Fraunces,serif;font-size:28px;font-weight:600;color:var(--euca-deep);line-height:1}
.hito-n .hito-sub{font-size:15px;color:var(--ink-soft);font-weight:600}
.hito-l{font-size:11.5px;color:var(--ink-soft);font-weight:600;margin-top:5px;line-height:1.3}
.ring-legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
.ring-legend{justify-content:center;gap:18px}
.ring-nleg{margin-top:9px}
.rl-cap{font-size:11px;font-weight:500;color:var(--ink-faint);text-align:center;margin-bottom:6px}
.rl-items{display:grid;grid-template-columns:repeat(4,auto);justify-content:center;gap:7px 9px}
.rl-n{display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:500;color:var(--ink-faint)}
.rl-n i{width:9px;height:9px;border-radius:2px;flex:0 0 auto}
.hist-sep{display:flex;align-items:center;gap:10px;margin:16px 6px 6px;color:var(--ink-faint);font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
.hist-sep::before,.hist-sep::after{content:"";flex:1;height:1px;background:var(--line)}
.rl3{display:inline-flex;align-items:center;gap:6px;font-weight:600;font-size:12px;color:var(--ink-faint)}
.nut-sub{font-weight:700;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-faint);margin:14px 2px 10px}
.nut-sub:first-child{margin-top:4px}
.tap-hint{display:flex;align-items:center;gap:8px;background:var(--mint-tint);border-radius:14px;padding:11px 13px;margin:6px 0 4px;font-weight:600;font-size:12px;color:var(--euca-deep)}
.nrowc{display:block;width:100%;text-align:left;background:none;border:none;padding:8px 2px 6px;cursor:pointer;font:inherit}
.nrowc:active{opacity:.7}
.nrc-top{display:flex;align-items:center;gap:11px}
.nrc-ic{width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nrc-ic>span{width:11px;height:11px;border-radius:50%;display:block}
.nrc-nm{flex:1;font-weight:600;font-size:14px;color:var(--ink)}
.nrc-sc{color:var(--ink-faint);font-weight:500;font-size:11px}
.nrc-lvl{font-weight:700;font-size:11.5px;padding:2px 9px;border-radius:11px;white-space:nowrap}
.nrc-lvl.hi{background:var(--mint-tint);color:var(--euca-deep)}
.nrc-lvl.me{background:#F0E6D5;color:#9A7B43}
.nrc-lvl.no{background:#F2ECE0;color:var(--ink-faint)}
.nrc-chev{color:#C9BFAE;font-size:18px;margin-left:4px}
.nrc-track{display:block;height:6px;border-radius:4px;background:#F0E9DD;overflow:hidden;margin:6px 0 0 41px}
.nrc-fill{display:block;height:100%;border-radius:4px}
.u6-sig{display:flex;align-items:flex-start;gap:11px;padding:9px 0;border-top:1px solid var(--line)}
.u6-sig:first-of-type{border-top:none}
.u6-sig>span{font-size:20px;line-height:1.2;flex-shrink:0}
.u6-sig>div{font-weight:600;font-size:13.5px;line-height:1.4;color:var(--ink)}
.grp-note{font-weight:500;font-size:12px;line-height:1.5;color:var(--ink-faint);background:var(--bg2,#F4EFE4);border-radius:12px;padding:9px 11px;margin:0 0 10px}
.fstep{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:5px}
.fbtn{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--euca);background:#fff;color:var(--euca-deep);font-size:14px;font-weight:800;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;flex:0 0 auto}
.fbtn:active{background:var(--mint-tint)}
.fnum{font-size:13px;font-weight:800;color:var(--ink);min-width:18px;text-align:center}
.fcard-hoy{display:flex;align-items:center;gap:12px;padding:13px 14px}
.fic-hoy{width:42px;height:42px;border-radius:13px;background:var(--euca-soft,#EAF1EE);display:flex;align-items:center;justify-content:center;font-size:22px;flex:0 0 auto}
.fmid-hoy{flex:1;min-width:0}
.ftit-hoy{font-size:14px;font-weight:700;color:var(--ink)}
.fsub-hoy{font-size:11.5px;color:var(--ink-soft);font-weight:600;margin-top:1px}
.fcard-hoy .fbtn{width:30px;height:30px;font-size:17px}
.fcard-hoy .fnum{font-size:17px;min-width:22px}
.sugg-card{border:1.5px solid var(--euca);background:rgba(110,147,139,.05)}
.sugg-lbl{font-size:11.5px;font-weight:800;color:var(--euca-dark);letter-spacing:.2px;margin-bottom:7px}
.sugg{display:flex;gap:8px;flex-wrap:wrap}
.sugg .fchip{display:flex;flex-direction:column;align-items:center;gap:4px;width:72px;padding:10px 5px;border-radius:14px;background:#EAF1EE}
.sugg .fchip .em{font-size:23px;line-height:1}
.sugg .fchip .nm{font-size:10.5px;font-weight:700;text-align:center;line-height:1.15;color:var(--ink)}
.sugg .fchip .plus{margin-top:2px;width:24px;height:24px;border-radius:50%;background:#fff;color:var(--euca);font-weight:800;font-size:15px;border:none;box-shadow:0 1px 2px rgba(60,53,47,.12);display:flex;align-items:center;justify-content:center;padding:0}
.food-grid--2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;align-items:start}
.food-grid--2 .chip-wrap{flex-direction:column;align-items:stretch;gap:4px;width:auto;min-width:0}
.food-grid--2 .chip{flex-direction:column;width:100%;min-width:0;gap:4px;padding:14px 10px 11px;text-align:center;position:relative;justify-content:center;min-height:76px}
.food-grid--2 .chip>span:not(.em):not(.ck){line-height:1.2}
.set-row{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:13px 0;border-top:1px solid var(--line)}
.set-row:first-of-type{border-top:none;padding-top:6px}
.set-tx b{font-weight:700;font-size:14px;color:var(--ink)}
.set-tx p{font-weight:500;font-size:12.5px;color:var(--ink-faint);margin:3px 0 0;line-height:1.45}
.switch{flex-shrink:0;width:46px;height:28px;border-radius:16px;border:none;background:#DDD3C2;position:relative;cursor:pointer;transition:background .2s;padding:0;margin-top:2px}
.switch>span{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.switch.on{background:var(--euca)}
.switch.on>span{left:21px}
.onb{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;background:var(--bg)}
.onb-top{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 4px}
.suri-mark-sm{font-family:Fraunces,serif;font-weight:900;font-size:18px;color:var(--euca-deep)}
.onb-skip{border:none;background:none;font-family:Quicksand,sans-serif;font-weight:700;font-size:13px;color:#5E6B65;cursor:pointer}
.onb-track{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;flex:1;scrollbar-width:none}
.onb-track::-webkit-scrollbar{display:none}
.onb-panel{flex:0 0 100%;width:100%;scroll-snap-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 30px;text-align:center;box-sizing:border-box}
.onb-ill{height:280px;display:flex;align-items:center;justify-content:center}
.onb-kick{font-family:Quicksand,sans-serif;font-weight:700;font-size:12px;letter-spacing:1.4px;color:var(--euca-deep);margin-bottom:10px}
.onb-title{font-family:Fraunces,serif;font-weight:900;font-size:25px;line-height:1.12;color:var(--ink);margin:0 0 12px}
.onb-desc{font-family:Quicksand,sans-serif;font-weight:500;font-size:14.5px;line-height:1.6;color:#5E6B65;max-width:320px;margin:0}
.onb-foot{padding:8px 30px max(30px, calc(env(safe-area-inset-bottom) + 14px))}
.onb-dots{display:flex;gap:7px;justify-content:center;margin:0 0 18px}
.onb-dot{width:7px;height:7px;border-radius:4px;background:#D8CEBE;transition:width .2s,background .2s}
.onb-dot.on{width:22px;background:var(--euca)}
.onb-btn{margin:0}
.onb-chips{display:flex;gap:12px}
.onb-chip{position:relative;background:#fff;border-radius:16px;padding:13px 12px;display:flex;flex-direction:column;align-items:center;gap:7px;box-shadow:0 6px 16px rgba(95,110,100,.1);min-width:76px}
.onb-chip.on{box-shadow:0 8px 18px rgba(146,173,164,.28);outline:2px solid var(--euca)}
.onb-chip .onb-em{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px}
.onb-chip>span:last-child{font-family:Quicksand,sans-serif;font-weight:600;font-size:12.5px;color:var(--ink)}
.onb-ck{position:absolute;top:6px;right:7px;width:18px;height:18px;border-radius:50%;background:var(--euca);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center}
.onb-mx{display:flex;flex-direction:column;gap:12px}
.onb-mxrow{display:flex;gap:14px}
.omx{width:18px;height:18px;border-radius:50%;display:inline-block}
.omx.none{border:2px solid #E6DCCC;box-sizing:border-box}
.onb-pcard{width:250px;background:#fff;border-radius:22px;padding:18px;box-shadow:0 14px 30px rgba(95,110,100,.14);text-align:left}
.onb-pc-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.onb-pc-av{width:46px;height:46px;border-radius:50%;background:var(--mint);display:flex;align-items:center;justify-content:center;font-size:24px}
.onb-pc-nm{font-family:Fraunces,serif;font-weight:600;font-size:16px;color:var(--ink)}
.onb-pc-age{font-family:Quicksand,sans-serif;font-weight:600;font-size:11px;color:var(--euca-deep);background:var(--mint-tint);padding:2px 9px;border-radius:12px;display:inline-block;margin-top:3px}
.onb-pc-row{display:flex;justify-content:space-between;font-family:Quicksand,sans-serif;font-size:12px;padding:5px 0}
.onb-pc-row span{color:var(--ink-faint);font-weight:600}
.onb-pc-row b{color:var(--ink)}
.rl-item{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--ink-soft)}
.rl-dot{width:11px;height:11px;border-radius:50%;flex:none}

/* nivel A/M en chip filtrado */
.lvl{font-size:10px;font-weight:800;padding:1px 7px;border-radius:var(--r-pill);margin-left:2px;text-transform:uppercase;letter-spacing:.03em}
.lvl.hi{background:var(--euca);color:#fff}
.lvl.me{background:var(--wheat);color:var(--ink-soft)}

/* header de registrar + cierre */
.reg-top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 2px 0}
.reg-finish{text-align:center;padding:4px 0 8px}
.rf-sum{font-size:13.5px;font-weight:700;color:var(--ink-soft);margin-bottom:12px}

/* navegador de semanas */
.weeknav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;
  background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:8px 10px}
.wn-btn{width:38px;height:38px;border-radius:11px;background:var(--euca-tint);color:var(--euca-deep);
  font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:.12s}
.wn-btn:active{transform:scale(.92)}
.wn-btn.disabled{background:var(--bg2);color:var(--ink-faint);opacity:.5}
.wn-label{flex:1;text-align:center;font-weight:700;font-size:15px;color:var(--euca-deep);display:flex;flex-direction:column;line-height:1.2}
.wn-range{font-size:11.5px;font-weight:600;color:var(--ink-faint)}

/* heatmap como tabla real — alineación garantizada en cualquier navegador */
.hmtable{width:100%;border-collapse:separate;border-spacing:4px;table-layout:fixed}
.hmtable th,.hmtable td{padding:0;margin:0}
.hm-th-corner{width:52px}
.hm-th{font-size:10.5px;font-weight:700;color:var(--ink-faint);line-height:1.1;text-align:center;padding-bottom:2px}
.hm-th.today{color:var(--euca);font-weight:800}
.hm-th .hm-dn{display:block;font-size:9px;font-weight:600;opacity:.7}
.hm-rlbl{width:52px;text-align:left;font-size:10.5px;font-weight:700;color:var(--ink-soft);line-height:1;white-space:nowrap}
.hm-rlbl svg{display:block;margin-bottom:2px}
.hm-rlbl span{display:block;font-size:9.5px}
.hm-c{height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
.hm-c.full{background:var(--c)}
.hm-c.part{background:#E6EEEA;color:var(--c)}
.hm-c.none{background:#F0E8DA}
.hm-c.empty{background:#FFFFFF;border:1.5px dashed #D8CCB6}
.hm-c.future{background:transparent}
.hm-legend{display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-size:13px;font-weight:600;color:var(--ink);margin-top:16px;line-height:1.4}
.hm-legend span{display:inline-flex;align-items:center;gap:7px;white-space:nowrap}

/* --- guía accionable (Hoy) --- */
.guide-intro{font-size:14px;color:var(--ink-soft);margin:-2px 2px 12px;line-height:1.55}
.need{padding:13px 0;border-top:1px solid var(--line)}
.need:first-child{border-top:none}
.need-head{display:flex;align-items:center;gap:11px;margin-bottom:8px}
.need-name{flex:1;font-weight:700;font-size:15.5px;color:var(--ink)}
.need-val{font-size:12px;font-weight:700;color:var(--ink-soft);white-space:nowrap}
.need-track{height:8px;background:var(--bg2);border-radius:var(--r-pill);overflow:hidden;margin-bottom:10px}
.need-fill{height:100%;border-radius:var(--r-pill);width:0;transition:width .5s cubic-bezier(.4,0,.2,1)}
.need-fill.done{background:var(--euca)} .need-fill.part{background:var(--mint)}
.need-fill.iron{background:var(--peach)} .need-fill.iron.done{background:var(--peach-dark)}
.need-foods{display:flex;flex-wrap:wrap;gap:7px}
.need-done{display:flex;align-items:center;gap:9px;color:#fff;font-weight:700;font-size:14.5px;
  background:linear-gradient(135deg,#7E9C92,#6E908560);background:var(--euca);border:1.5px solid var(--euca-dark);
  border-radius:var(--r);padding:12px 14px;width:100%;text-align:left}
.need-done .chev{margin-left:6px;font-size:20px;color:#fff;font-weight:400;opacity:.85}
.need-done .nd-ic{width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;flex:none}
.need-done .nd-check{margin-left:auto;font-size:16px;font-weight:800;color:#fff}
.need-supp{font-size:13.5px;color:#1A2D27;background:#E8F1ED;border:1px solid #B5D0C7;
  border-radius:9px;padding:8px 12px;margin-top:8px;line-height:1.5;font-weight:600}
.need-feed{font-size:13.5px;color:#5C2D1A;background:#FBE5D7;border:1px solid #E5B69B;
  border-radius:9px;padding:8px 12px;margin-top:8px;line-height:1.5;font-weight:600}
.need-head.tap{width:100%;text-align:left;background:none}
.need-head .chev{margin-left:auto;font-size:20px;color:var(--ink-faint);font-weight:400}
.meta-row{display:flex;align-items:center;gap:11px;padding:9px 0;flex-wrap:wrap;border-top:1px solid var(--line)}
.meta-row:first-of-type{border-top:none}
.meta-row .mname{flex:1;font-size:14px;font-weight:700;color:var(--ink)}
.meta-row .mval{font-size:13px;font-weight:800;color:var(--euca-deep);background:var(--euca-tint);padding:3px 11px;border-radius:var(--r-pill)}
.meta-row .mnote{flex-basis:100%;font-size:11px;color:var(--peach-dark);margin-left:41px}

/* objetivo como primera fila destacada */
.obj-card{background:linear-gradient(155deg,#B3D0C5 0%,#C8DDD3 45%,#E0EBE4 100%);
  border:none;
  box-shadow:0 2px 8px rgba(63,90,82,.12), 0 16px 40px rgba(63,90,82,.18);
  position:relative; overflow:hidden}
.obj-tag{display:inline-flex;align-items:center;gap:6px;background:var(--euca-deep);color:#fff;font-size:11px;
  font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:6px 12px;border-radius:var(--r-pill);margin-bottom:11px}
.obj-title{font-size:24px;color:var(--euca-deep);margin-bottom:8px;font-weight:600;
  font-family:'Fraunces',Georgia,serif;letter-spacing:-.015em;line-height:1.15}
.obj-msg{font-size:15px;color:#2D4138;margin-bottom:14px;line-height:1.55;font-weight:500}

/* botón "otro" (registro fuera de catálogo) */
.otro{display:inline-flex;align-items:center;gap:7px;border:1px dashed #C9BBA6;background:var(--wheat-tint);
  border-radius:var(--r-pill);padding:7px 12px;font-size:13px;font-weight:700;color:var(--ink-soft);transition:.12s}
.otro:active{transform:scale(.96)}
.otro.on{background:var(--cream-tint);border-color:#F0DDB8;border-style:solid;color:#8A6A2E}
.otro .mns{font-weight:800;font-size:16px;line-height:1;padding:0 3px;color:var(--peach-dark)}
.otro .cnt{font-weight:800;color:var(--euca-deep)}

/* strip semanal compacto */
.week-link{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.week-link .linkbtn{font-size:12.5px}

/* sección combos / registrar */
.combo-help{font-size:12px;color:var(--ink-soft);margin:-2px 2px 9px}
.otros-grid{display:flex;flex-wrap:wrap;gap:7px}
.logo .mark{width:34px;height:34px;border-radius:10px;background:var(--euca);display:flex;align-items:center;justify-content:center}
.welcome{padding:40px 22px 22px; text-align:center}
.welcome-restore{margin-top:16px;padding-top:16px;border-top:1px solid var(--line);text-align:center}
.welcome .mark{width:64px;height:64px;border-radius:18px;background:var(--euca);margin:0 auto 18px;display:flex;align-items:center;justify-content:center}
.welcome h1{font-size:30px; margin-bottom:8px}
.welcome p{color:var(--ink-soft); font-size:15px; margin-bottom:6px}
.steps-dots{display:flex;gap:6px;justify-content:center;margin:18px 0}
.steps-dots i{width:7px;height:7px;border-radius:50%;background:var(--line)}
.steps-dots i.on{background:var(--euca);width:18px;border-radius:4px}
#suri-splash{position:fixed;inset:0;z-index:9999;background:#6E938B;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;opacity:1;transition:opacity .5s ease;pointer-events:none}
#suri-splash.hide{opacity:0}
#suri-splash .ss-logo{filter:drop-shadow(0 6px 16px rgba(0,0,0,.18));animation:ssPop .6s cubic-bezier(.2,.8,.3,1.2) both}
#suri-splash .ss-name{font-family:Fraunces,serif;font-size:42px;font-weight:600;color:#FBF6EE;letter-spacing:.5px;animation:ssFade .7s ease .15s both}
#suri-splash .ss-tag{font-size:14.5px;font-weight:600;color:#E8F1ED;letter-spacing:.08em;text-transform:uppercase;animation:ssFade .7s ease .3s both}
@keyframes ssPop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes ssFade{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.hist-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.hist-back{font:inherit;font-weight:700;font-size:14px;color:var(--euca-deep);background:none;border:none;padding:6px 2px;touch-action:manipulation}
.hist-title{flex:1;text-align:center;font-weight:800;font-size:15px;color:var(--ink-soft);letter-spacing:.3px}
.hist-spacer{width:62px;flex:none}
.hist-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px}
.hist-arrow{width:46px;height:46px;border-radius:14px;border:1px solid var(--line);background:var(--card);font-size:22px;color:var(--ink);display:flex;align-items:center;justify-content:center;flex:none;touch-action:manipulation}
.hist-arrow:disabled{opacity:.32}
.hist-day{flex:1;text-align:center;min-width:0}
.hist-date{font-weight:800;font-size:17px;color:var(--ink);text-transform:capitalize;line-height:1.25}
.hist-today{display:inline-block;margin-top:3px;font-size:11.5px;font-weight:800;color:var(--euca-deep);background:var(--mint-tint);border-radius:999px;padding:2px 10px}
.hist-empty{text-align:center;padding:26px 18px}
.hist-empty-em{font-size:34px}
.hist-empty-tx{font-weight:800;font-size:16px;color:var(--ink);margin-top:8px}
.hist-chip{pointer-events:none}
.cov-table{width:auto;border-collapse:collapse;font-size:12.5px;margin-top:4px}
.cov-table th{text-align:center;font-size:10px;font-weight:700;color:#857A6F;text-transform:uppercase;letter-spacing:.3px;padding:3px 7px;border-bottom:1px solid #E8DFCC}
.cov-table th:first-child{text-align:left}
.cov-key{display:block;width:20px;height:6px;border-radius:3px;margin:3px auto 0;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.cov-key.f{background:#6E938B}
.cov-key.p{background:#E0B468}
.cov-key.n{background:#DBCFB8}
